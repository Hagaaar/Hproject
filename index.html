<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H PROJECT</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --y:#fcee0a; --bg:#0b1118; --pan:#141d26; --brd:#233242;
  --cy:#00f0ff; --rd:#ff003c; --tx:#e0e0e0; --mu:#6b7d8f;
  --gn:#00ff66; /* Vert Cyberpunk pur pour le bouton et le slide */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.15) 1px,transparent 1px);background-size:24px 24px;color:var(--tx)}
body{font-family:'Rajdhani',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.5px}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
#hw{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;filter:drop-shadow(0 8px 12px rgba(0,0,0,.85))}
#hd{background:var(--y);color:#000;padding:15px 20px 55px;clip-path:polygon(0 0,100% 0,100% calc(100% - 25px),99.3% calc(100% - 25px),99.3% calc(100% - 12.5px),99% calc(100% - 12.5px),99% calc(100% - 18px),99.3% calc(100% - 18px),99.3% calc(100% - 25px),97.5% calc(100% - 25px),97.5% calc(100% - 12.5px),97.2% calc(100% - 12.5px),97.2% calc(100% - 18px),97.5% calc(100% - 18px),97.5% calc(100% - 25px),94% calc(100% - 25px),94% calc(100% - 12.5px),93.2% calc(100% - 12.5px),93.2% calc(100% - 18px),94% calc(100% - 18px),94% calc(100% - 25px),50.8% calc(100% - 25px),50.8% calc(100% - 12.5px),49.2% calc(100% - 12.5px),50% calc(100% - 18.5px),50.8% calc(100% - 12.5px),50.8% calc(100% - 25px),50% calc(100% - 32.5px),49.2% calc(100% - 25px),33% calc(100% - 25px),28% calc(100% - 37.5px),26.2% calc(100% - 37.5px),26.2% calc(100% - 27.5px),25.9% calc(100% - 27.5px),25.9% calc(100% - 29.5px),26.2% calc(100% - 29.5px),26.2% calc(100% - 37.5px),24.7% calc(100% - 37.5px),24.7% calc(100% - 22.5px),24.4% calc(100% - 22.5px),24.4% calc(100% - 29.5px),24.7% calc(100% - 29.5px),24.7% calc(100% - 37.5px),23.2% calc(100% - 37.5px),23.2% calc(100% - 25.5px),22.9% calc(100% - 25.5px),22.9% calc(100% - 27.5px),23.2% calc(100% - 27.5px),23.2% calc(100% - 37.5px),21% calc(100% - 37.5px),17% calc(100% - 12.5px),11% calc(100% - 12.5px),9% calc(100% - 25px),0 calc(100% - 25px))}
.htop{font-size:12px;font-weight:700;opacity:.7;margin-bottom:10px;letter-spacing:1px}
.sync{position:absolute;top:15px;right:20px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:1px;color:#000}
.sdot{width:7px;height:7px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.sync.synched  .sdot{background:#27ae60;filter:drop-shadow(0 0 3px #27ae60) drop-shadow(0 0 6px rgba(39,174,96,.8))}
.sync.synching .sdot{background:#4da6ff;filter:drop-shadow(0 0 3px #4da6ff) drop-shadow(0 0 6px rgba(77,166,255,.8));animation:blink .8s infinite}
.sync.offline  .sdot{background:var(--rd);filter:drop-shadow(0 0 3px var(--rd))}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.h1{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.hname{font-size:28px;font-weight:700;line-height:1}
.hlv{font-size:13px;font-weight:600;opacity:.7}
.hrt{text-align:right}
.hip-container{display:flex;justify-content:flex-end;align-items:baseline;gap:4px;margin-bottom:2px}
.hip-val{font-size:24px;font-weight:900;line-height:1;color:#000}
.hip-cur{font-size:16px;font-weight:300;color:#000;opacity:0.8}
.hsk{font-size:16px;font-weight:800;color:#000;text-transform:uppercase}
#hsk-val{font-size:18px;font-weight:900;color:#000;margin-right:2px}
.xb{height:8px;background:rgba(0,0,0,.15);margin-bottom:4px;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.xbf{height:100%;background:#000;transition:width .5s}

/* GAINS FLOTTANTS */
.gain-float { position: fixed; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; z-index: 2500; left: 50%; transform: translateX(-50%); }
.gf-item { font-size: 16px; font-weight: 800; padding: 4px 10px; background: rgba(11,17,24,0.95); border: 1px solid currentColor; clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px); animation: gfPop 1s ease-out forwards; }
.gf-rep { color: var(--cy); box-shadow: 0 0 8px rgba(0,240,255,.3); }
.gf-ed  { color: var(--y); box-shadow: 0 0 8px rgba(252,238,10,.3); }

@keyframes gfPop { 0% { opacity: 0; transform: translateY(5px) scale(0.8); } 15% { opacity: 1; transform: translateY(0) scale(1.1); } 30% { transform: scale(1); } 80% { opacity: 1; transform: translateY(-10px); } 100% { opacity: 0; transform: translateY(-20px); } }

/* CONTENT + NAV */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:158px 16px 90px}
::-webkit-scrollbar{width:0}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);display:flex;z-index:1000;padding:10px;gap:5px;border-top:1px solid var(--brd)}
.nb{flex:1;background:var(--pan);border:none;color:var(--mu);cursor:pointer;padding:17px 4px;font-size:10px;font-weight:800;letter-spacing:.8px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);transition:.2s}
.nb.on{background:var(--y);color:#000}
.sec{display:none}
.sec.on{display:block;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* BANDEAUX SECTION */
.cph{display:flex;align-items:center;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 15px 0;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase}

/* ========================================= */
/* TÂCHES : ANIMATION SLIDE VERT 2 SECONDES  */
/* ========================================= */
.qi, .ex {
  display: flex; position: relative; overflow: hidden;
  background: rgba(252,238,10,0.05); border: 1px solid var(--y);
  margin-bottom: 12px; cursor: pointer; padding: 0;
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.qi:active, .ex:active { transform: scale(0.98); }
.qi.dn, .ex.dn { border-color: var(--gn); }

/* Fond glissant de droite à gauche, vert à la base */
.qi::before, .ex::before {
  content: ''; position: absolute; top: 0; right: 0; bottom: 0;
  width: 95px; background: var(--gn); z-index: 0; /* Base verte */
  /* Transition de 2 secondes */
  transition: width 2s cubic-bezier(0.25, 1, 0.5, 1);
}
.qi.dn::before, .ex.dn::before {
  width: 100%; /* Remplit toute la carte */
}
.qi.no-btn::before, .ex.no-btn::before { display: none; }

/* Contenu textuel positionné au-dessus de l'animation */
.qic, .ex-content {
  flex: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 1; transition: color 0.3s;
}
.qt, .et { font-size: 15px; font-weight: 700; margin-bottom: 3px; line-height: 1.2; display: flex; justify-content: space-between; gap: 8px; }
.qd, .etc { font-size: 11px; font-weight: 700; color: #777; text-transform: none; margin-bottom: 6px; letter-spacing: 0; }
.etc { color: var(--mu); text-transform: uppercase; margin-bottom: 10px; }
.qr, .erw { font-size: 13px; font-weight: 800; opacity: 0.9; }
.erw { color: var(--cy); }

/* Changement de couleur du texte quand le fond devient totalement vert */
.qi.dn .qt, .ex.dn .et { color: #000; opacity: 1; }
.qi.dn .qd, .ex.dn .etc { color: #111; font-weight: 800; opacity: 0.8; }
.qi.dn .qr, .ex.dn .erw { color: #000; }

.ex.boss { border-left: 4px solid var(--y); }
.ex.boss.dn { border-left: 4px solid var(--gn); }
.lk { opacity: 0.25; pointer-events: none; filter: grayscale(100%); }

/* Bouton à droite au-dessus du slide (toujours "EXECUTED") */
.qi-btn {
  width: 95px; position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 12px; color: #000; letter-spacing: 1px;
}

/* ACCORDIONS (Main) */
.ach{display:flex;align-items:center;justify-content:space-between;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 0;cursor:pointer;user-select:none;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px;transition:opacity .1s}
.ach:active{opacity:.85}
.achl{display:flex;align-items:center;gap:10px}
.acb{background:rgba(0,0,0,.18);padding:1px 8px;font-size:11px;font-weight:800;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.acbd{padding-top:12px}
.acbd.closed{display:none}

/* PROGRESS */
.pb{height:4px;background:rgba(20,29,38,.8);margin-bottom:20px}
.pbf{height:100%;background:var(--y);transition:width .5s}
.ph{display:flex;justify-content:space-between;margin-bottom:8px}
.ph span{font-size:13px;font-weight:600}

/* SHOP / BLACK MARKET */
.shop-filters{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.shop-filters::-webkit-scrollbar{display:none}
.sfb{background:var(--pan);border:1px solid var(--brd);color:var(--mu);padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:.15s}
.sfb.on{background:var(--y);color:#000;border-color:var(--y)}
.shi{display:flex;align-items:center;background:var(--pan);padding:14px 16px;margin-bottom:10px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);gap:12px}
.shi-info{flex:1;min-width:0}
.shin{font-size:14px;font-weight:600;line-height:1.2;text-transform:none;color:var(--tx)}
.shic{font-size:10px;font-weight:800;color:var(--mu);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
.shp{font-size:14px;color:var(--y);font-weight:800;white-space:nowrap;flex-shrink:0}
.shbtn{background:var(--bg);border:1px solid var(--brd);padding:8px 12px;font-size:11px;font-weight:800;color:var(--tx);cursor:pointer;font-family:inherit;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);white-space:nowrap;flex-shrink:0}
.shbtn.np{color:var(--mu);border-color:transparent;cursor:default}
.shbtn.ok{background:var(--cy);color:#000;border:none}
.sh-sect{font-size:11px;font-weight:800;color:var(--y);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(252,238,10,.3)}
.shi-b{display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;cursor:pointer;background:linear-gradient(110deg,rgba(252,238,10,.14) 0%,rgba(252,238,10,.05) 100%);border:1px solid var(--y);border-left:4px solid var(--y);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);animation:bPulse 2.8s ease-in-out infinite;position:relative;overflow:hidden}
.shi-b::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(252,238,10,.1),transparent);animation:bShimmer 2.8s ease-in-out infinite}
@keyframes bPulse{0%,100%{border-color:var(--y)}50%{border-color:rgba(252,238,10,.4)}}
@keyframes bShimmer{0%{left:-100%}50%,100%{left:150%}}
.shi-b .shi-info{flex:1;min-width:0}
.shi-b .shin{color:#fff;font-size:15px;font-weight:700}
.shi-b .shic{color:rgba(252,238,10,.6)}
.ubtn{background:var(--y);border:none;color:#000;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);letter-spacing:.5px}
.ubtn:active{background:#fff}
.shi-b.using{animation:bExit 3s ease-out forwards !important;pointer-events:none}
@keyframes bExit{0%{opacity:1;transform:scaleY(1)}30%{background:rgba(252,238,10,.35);transform:scaleY(1.04)}100%{opacity:0;transform:scaleY(0)}}

/* INPUTS */
.wrow{display:flex;gap:10px;margin-top:15px}
.winp{flex:1;background:var(--bg);border:1px solid var(--brd);padding:10px 15px;color:var(--tx);font-size:16px;font-family:inherit;font-weight:600;outline:none;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.winp:focus{border-color:var(--y)}
.wsave{background:var(--y);border:none;padding:10px 20px;color:#000;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}

/* ========================================= */
/* DATA LINK STATS REVAMP - CYBERPUNK AAA    */
/* ========================================= */
.sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
.sc {
  position: relative; background: linear-gradient(135deg, rgba(20,29,38,0.9) 0%, rgba(11,17,24,0.95) 100%);
  border: 1px solid rgba(0, 240, 255, 0.3); border-top: 2px solid var(--cy);
  padding: 22px 15px; text-align: left;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
  overflow: hidden;
}
.sc::before {
  content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,.03) 2px, rgba(0,240,255,.03) 4px); pointer-events: none;
}
.sc::after {
  content: ''; position: absolute; bottom: 0; right: 0; width: 30px; height: 30px;
  background: linear-gradient(135deg, transparent 50%, rgba(0, 240, 255, 0.2) 50%);
}
.sc.gold-badge { border-color: rgba(252,238,10,0.3); border-top-color: var(--y); }
.sc.gold-badge::after { background: linear-gradient(135deg, transparent 50%, rgba(252,238,10,0.2) 50%); }
.sc.gold-badge::before { background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(252,238,10,.03) 2px, rgba(252,238,10,.03) 4px); }

.sv-wrap { display: flex; align-items: baseline; gap: 5px; margin-bottom: 8px; position: relative; z-index: 2; }
.sv { font-size: 38px; font-weight: 900; color: var(--cy); line-height: 0.9; text-shadow: 0 0 10px rgba(0,240,255,0.4); }
.sc.gold-badge .sv { color: var(--y); text-shadow: 0 0 10px rgba(252,238,10,0.4); }
.sv-dec { font-size: 14px; font-weight: 500; color: var(--tx); opacity: 0.5; text-transform: none; }
.sl { font-size: 11px; color: var(--tx); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; position: relative; z-index: 2; border-left: 2px solid var(--cy); padding-left: 6px; }
.sc.gold-badge .sl { border-left-color: var(--y); }

.scamp {
  position: relative; background: linear-gradient(135deg, rgba(20,29,38,0.9) 0%, rgba(11,17,24,0.95) 100%);
  border: 1px solid rgba(0, 240, 255, 0.2); border-left: 4px solid var(--cy);
  padding: 18px 16px; margin-bottom: 15px;
  clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
}
.scamp::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,.02) 2px, rgba(0,240,255,.02) 4px);
}
.scr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; border-bottom: 1px solid rgba(0, 240, 255, 0.1); padding-bottom: 8px; position: relative; z-index: 2; }
.scr-title { font-size: 16px; font-weight: 800; color: var(--y); letter-spacing: 1px; }
.scr-pct { font-size: 24px; font-weight: 900; color: var(--cy); line-height: 1; }
.scamp-stats { display: flex; gap: 15px; margin-bottom: 15px; font-size: 11px; font-weight: 700; color: var(--tx); opacity: 0.8; position: relative; z-index: 2; }
.scamp-stat { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.scamp-stat-val { font-size: 16px; font-weight: 800; color: #fff; }
.pb-wrap { position: relative; z-index: 2; }

/* TOAST / MODALS */
#tc{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:400px;pointer-events:none}
.ts{padding:14px 18px;font-size:13px;font-weight:800;background:var(--bg);border-left:4px solid var(--cy);color:var(--tx);clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);box-shadow:0 5px 15px rgba(0,0,0,.8);animation:tsSlideUp .3s ease-out forwards}
.ts.gold{border-color:var(--y);color:var(--y)}
.ts.err{border-color:var(--rd);color:var(--rd)}
@keyframes tsSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

#mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,17,24,.9);z-index:3000;display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(3px)}
#mo.on{display:flex;animation:fadeIn .2s ease-out}
.mbox{background:var(--pan);border:2px solid var(--y);width:100%;max-width:350px;padding:20px;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);box-shadow:0 10px 30px rgba(0,0,0,.8)}
.mt{color:var(--y);font-size:18px;font-weight:800;margin-bottom:10px;letter-spacing:1px}
.mx{color:var(--tx);font-size:14px;margin-bottom:25px;font-weight:600;white-space:pre-line;text-transform:none}
.mb{display:flex;gap:10px}
.bok{flex:1;background:var(--y);color:#000;border:none;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bca{flex:1;background:transparent;color:var(--rd);border:1px solid var(--rd);padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bok:active{background:#fff}
.bca:active{background:rgba(255,0,60,.2)}

/* USED OVERLAY */
.used-ov{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center;animation:uOvFade 6s ease-out forwards}
@keyframes uOvFade{0%{background:rgba(11,17,24,0)}8%{background:rgba(11,17,24,.92)}67%{background:rgba(11,17,24,.92);opacity:1}100%{background:rgba(11,17,24,0);opacity:0}}
.used-scan{position:fixed;left:0;right:0;height:3px;background:var(--y);box-shadow:0 0 18px 6px var(--y),0 0 40px 10px rgba(252,238,10,.4);animation:uScan 0.3s cubic-bezier(.4,0,1,1) forwards}
@keyframes uScan{0%{top:-3px;opacity:1}100%{top:100%;opacity:.2}}
.used-in{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.used-lbl{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:800;color:var(--y);letter-spacing:8px;text-shadow:0 0 30px var(--y),0 0 60px rgba(252,238,10,.6);animation:uGlitch 4s ease-out forwards}
@keyframes uGlitch{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}80%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}
.used-nm{font-family:'Rajdhani',sans-serif;font-size:38px;font-weight:800;color:var(--cy);letter-spacing:3px;text-shadow:0 0 15px var(--cy);animation:uNm 4s ease-out forwards}
@keyframes uNm{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.used-c{position:fixed;width:24px;height:24px;border-color:var(--y);border-style:solid;opacity:0;animation:uCo 4s ease-out forwards}
.used-c.tl{top:20px;left:20px;border-width:2px 0 0 2px}
.used-c.tr{top:20px;right:20px;border-width:2px 2px 0 0}
.used-c.bl{bottom:80px;left:20px;border-width:0 0 2px 2px}
.used-c.br{bottom:80px;right:20px;border-width:0 2px 2px 0}
@keyframes uCo{0%,8%{opacity:0}15%{opacity:.7}80%{opacity:.7}100%{opacity:0}}

/* ========================================= */
/* LEVEL UP OVERLAY                          */
/* ========================================= */
.lvl-ov { position: fixed; inset: 0; z-index: 9500; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: lvOv 3.5s ease-out forwards; background: rgba(0,0,0,0.85); }
@keyframes lvOv { 0% { opacity: 0; } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
.lvl-badge-wrap { position: relative; width: 180px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: badgePop 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

/* Halo de lumière plus intense autour du badge */
.lvl-hex-bg { position: absolute; inset: 0; background: var(--y); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); box-shadow: 0 0 50px 15px rgba(252,238,10,0.7); animation: hexGlitch 3s infinite; }

/* Inset à 12px pour tripler l'épaisseur de la bordure jaune */
.lvl-hex-in { position: absolute; inset: 12px; background: #000; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(252,238,10,.05) 2px, rgba(252,238,10,.05) 4px); }

/* Texte STREET CRED placé plus haut (hors du masque noir) avec une ombre noire */
.lvl-label { position: absolute; top: -12px; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 3px; z-index: 10; text-shadow: 0 2px 4px #000, 0 0 10px rgba(0,0,0,0.8); }
.lvl-num { font-size: 120px; font-weight: 800; color: var(--y); line-height: 1; text-shadow: 0 0 20px var(--y); animation: syncPop 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; margin-top: 15px; }
.lvl-sub { font-size: 22px; font-weight: 800; color: var(--cy); letter-spacing: 12px; margin-top: 20px; text-shadow: 0 0 10px var(--cy); animation: syncPop 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-transform: uppercase; }

@keyframes badgePop { 0% { transform: scale(0) rotate(-30deg); opacity: 0; } 10% { transform: scale(1.05) rotate(5deg); opacity: 1; } 15% { transform: scale(1) rotate(0deg); } 85% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(1.2) translateY(-30px); opacity: 0; } }
@keyframes syncPop { 0% { transform: scale(0); opacity: 0; } 10% { transform: scale(1.05); opacity: 1; } 15% { transform: scale(1); } 85% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(1.2) translateY(-30px); opacity: 0; } }
@keyframes hexGlitch { 0%, 100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.4; } 94% { opacity: 1; } 96% { opacity: 0.2; } 98% { opacity: 1; } }

function migrate() {
  try {
    const old = localStorage.getItem('cp_rlg_v8');
    if (!old) return null;
    const d = JSON.parse(old);
    const out = JSON.parse(JSON.stringify(DS));
    if (d.player) out.player = {...out.player, ...d.player};
    ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent'].forEach(k => { if (d[k] !== undefined) out[k] = d[k]; });
    ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k => {
      if (d[k] && Array.isArray(d[k])) { out[k] = out[k].map(def => { const sv = d[k].find(x => x.id === def.id); return sv ? {...def, done: !!sv.done} : def; }); }
    });
    return out;
  } catch(e) { return null; }
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      S = JSON.parse(JSON.stringify(DS));
      if (saved.player) S.player = {...S.player, ...saved.player};
      ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent'].forEach(k => { if (saved[k] !== undefined) S[k] = saved[k]; });
      ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k => {
        if (saved[k] && Array.isArray(saved[k])) { S[k] = S[k].map(def => { const sv = saved[k].find(x => x.id === def.id); return sv ? {...def, done: !!sv.done} : def; }); }
      });
      if (saved.shop && Array.isArray(saved.shop)) { S.shop = S.shop.map(def => { const sv = saved.shop.find(x => x.id === def.id); return sv ? {...def, bought: !!sv.bought} : def; }); }
    } else { S = migrate() || JSON.parse(JSON.stringify(DS)); }
  } catch(e) { S = JSON.parse(JSON.stringify(DS)); }
  if (!S.shop || S.shop.length < DS.shop.length) { S.shop = DS.shop.map(def => { const sv = (S.shop||[]).find(x => x.id === def.id); return sv ? {...def, bought: !!sv.bought} : {...def}; }); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); triggerSync(); }

function setSy(st) { document.getElementById('syu').className = 'sync ' + st; document.getElementById('sytx').textContent = st.toUpperCase(); }
function triggerSync() { setSy('synching'); if (syncTmr) clearTimeout(syncTmr); syncTmr = setTimeout(() => { fetch(SURL, {method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain;charset=utf-8'}}).then(r => setSy(r.ok ? 'synched' : 'offline')).catch(() => setSy('offline')); }, 2500); }

function today() { const n=new Date(); return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate()); }
function p2(n)   { return String(n).padStart(2,'0'); }
function weekId(){ const d=new Date(),day=d.getDay()||7; d.setDate(d.getDate()+4-day); const y=d.getFullYear(),s=new Date(y,0,1); return y+'-W'+Math.ceil((((d-s)/86400000)+1)/7); }

function checkReset() {
  const td=today(), wid=weekId();
  if (S.lastDate !== td) {
    if (S.lastDate) { S.daysPlayed = (S.daysPlayed||0)+1; const frac = S.dailies.filter(d=>d.done).length / S.dailies.length; S.player.streak = frac >= 0.7 ? (S.player.streak||0)+1 : 0; }
    S.dailies.forEach(d => d.done=false); S.lastDate = td;
  }
  if (S.lastWeekId !== wid) { S.weeklies.forEach(w => w.done=false); S.practiceWeek = 0; S.lastWeekId = wid; }
  save();
}

function showConfirm(title, text, action, lbl) { document.getElementById('mo-t').textContent=title; document.getElementById('mo-x').innerHTML=text; document.getElementById('mo-ok').textContent=lbl||'EXECUTE'; cfmAction=action; document.getElementById('mo').classList.add('on'); }
function closeModal()  { document.getElementById('mo').classList.remove('on'); cfmAction=null; }
function execConfirm() { if (cfmAction) cfmAction(); closeModal(); }

function animVal(id, from, to) {
  const el = document.getElementById(id); if (!el) return;
  if (from===to) { el.textContent=to; return; }
  const dur=450, t0=performance.now();
  const tick = now => { const p = Math.min((now-t0)/dur, 1); el.textContent = Math.round(from + (to-from)*p); if (p<1) requestAnimationFrame(tick); else el.textContent=to; };
  requestAnimationFrame(tick);
}

function toast(msg, type) { const el = document.createElement('div'); el.className = 'ts'+(type?' '+type:''); el.textContent = msg; document.getElementById('tc').appendChild(el); setTimeout(() => el.remove(), 3500); }

function showGain(rep, ed, e) {
  const c = document.createElement('div'); c.className = 'gain-float'; c.style.top = '165px';
  if (rep > 0) c.innerHTML += '<div class="gf-item gf-rep">+' + rep + ' REP</div>';
  if (ed > 0)  c.innerHTML += '<div class="gf-item gf-ed">+' + ed + ' E$</div>';
  document.body.appendChild(c); setTimeout(() => c.remove(), 1000);
}

function showLevelUp(lvl) {
  const ov = document.createElement('div'); ov.className = 'lvl-ov';
  ov.innerHTML = '<div class="lvl-badge-wrap"><div class="lvl-hex-bg"></div><div class="lvl-hex-in"><div class="lvl-label">STREET CRED</div><div class="lvl-num">' + lvl + '</div></div></div><div class="lvl-sub">LEVEL UP</div>';
  document.body.appendChild(ov); setTimeout(() => ov.remove(), 3500);
}

function addXP(xp) {
  S.player.xp += xp;
  while (S.player.xp >= S.player.level*100 && S.player.level<50) { S.player.xp -= S.player.level*100; S.player.level++; showLevelUp(S.player.level); }
}

function rHdr() {
  const p=S.player, need=p.level*100, pct=Math.min(100,Math.round(p.xp/need*100));
  document.getElementById('hlv').textContent = 'LEVEL '+p.level+' / CORPO';
  document.getElementById('hsk-val').textContent = (p.streak||0);
  document.getElementById('xbf').style.width = pct+'%';
  document.getElementById('hxm').textContent = need;
  animVal('hip', prevIp, p.ip); animVal('hxv', prevXp, p.xp);
  prevIp=p.ip; prevXp=p.xp;
}

        '<div class="qr">+'+d.xp+' REP'+(d.ip>0?' / +'+d.ip+' E$':'')+'</div>'+
      '</div>'+
      '<div class="qi-btn"><span class="btn-tx-un">EXECUTED</span><span class="btn-tx-dn">EXECUTED</span></div>'+
    '</div>'
  ).join('');
}

function rDailies() { const dn=S.dailies.filter(d=>d.done).length; document.getElementById('dtt').textContent='MISSIONS '+dn+'/'+S.dailies.length; document.getElementById('dl').innerHTML=buildUI(S.dailies,'dailies'); }
function rHebdo()   { const dn=S.weeklies.filter(w=>w.done).length; document.getElementById('wtt').textContent='GIGS '+dn+'/'+S.weeklies.length; document.getElementById('wl').innerHTML=buildUI(S.weeklies,'weeklies'); }

function tTask(type, id, e) {
  const it=S[type].find(d=>d.id===id); if(!it) return;
  const el = document.getElementById('task-'+id);
  
  if (!it.done) {
    it.done=true; addXP(it.xp); S.player.ip+=it.ip; S.totalDone=(S.totalDone||0)+1; showGain(it.xp, it.ip, e);
    save(); rHdr();
    if(el) {
      el.classList.add('dn'); // Déclenche l'animation de slide vert
      setTimeout(() => { if (type==='dailies') rDailies(); else rHebdo(); }, 2100);
    } else {
      if (type==='dailies') rDailies(); else rHebdo();
    }
  } else {
    it.done=false; S.player.xp=Math.max(0,S.player.xp-it.xp); S.player.ip=Math.max(0,S.player.ip-it.ip); S.totalDone=Math.max(0,(S.totalDone||0)-1);
    save(); rHdr();
    if(el) el.classList.remove('dn');
    if (type==='dailies') rDailies(); else rHebdo();
  }
}

function exList(items, key) {
  return items.map((ex,i) => {
    const locked=(key==='portfolio'||key==='memoire')&&i>0&&!items[i-1].done;
    return '<div class="ex'+(ex.done?' dn':'')+(ex.boss?' boss':'')+(locked?' lk':'')+'" id="task-'+ex.id+'" onclick="tEx(\''+key+'\',\''+ex.id+'\', event)">'+
      '<div class="ex-content">'+
        '<div class="et">'+ex.desc+'</div>'+
        '<div class="etc">// '+ex.t+'</div>'+
        '<div class="erw">+'+ex.xp+' REP / +'+ex.ip+' E$</div>'+
      '</div>'+
      '<div class="qi-btn"><span class="btn-tx-un">EXECUTED</span><span class="btn-tx-dn">EXECUTED</span></div>'+
    '</div>';
  }).join('');
}

function tEx(key, id, e) {
  const it = S[key].find(x => x.id === id); if (!it) return;
  if (!it.done) valEx(key, id, e, it); else cancelEx(key, id, e, it);
}

function valEx(key, id, e, it) {
  const card = document.getElementById('task-'+id);
  it.done = true; addXP(it.xp); S.player.ip += it.ip; S.totalDone = (S.totalDone || 0) + 1;
  showGain(it.xp, it.ip, e); toast(it.boss ? 'OBJECTIVE REACHED' : 'MILESTONE VALIDATED', 'gold');
  save(); rHdr();
  if (card) {
    card.classList.add('dn'); // Déclenche l'animation
    setTimeout(() => { rCamps(); }, 2100);
  } else {
    rCamps();
  }
}

function cancelEx(key, id, e, it) {
  it.done = false; S.player.xp = Math.max(0, S.player.xp - it.xp); S.player.ip = Math.max(0, S.player.ip - it.ip); S.totalDone = Math.max(0, (S.totalDone || 0) - 1);
  toast('REVOKED', 'err'); save(); rHdr(); rCamps();
}

function toggleAcc(k) { accSt[k]=accSt[k]===true?false:true; rCamps(); }
function buildAcc(k, title, badge, content) {
  const open=accSt[k]===true;
  return '<div class="ach" onclick="toggleAcc(\''+k+'\')"><div class="achl"><span>'+title+'</span>'+(badge?'<span class="acb">'+badge+'</span>':'')+'</div><span style="font-size:10px;opacity:.7">'+(open?'&#9650;':'&#9660;')+'</span></div><div class="acbd'+(open?'':' closed')+'">'+content+'</div>';
}

function rCamps() {
  const pLoss=(S.weightStart&&S.weightCurrent)?Math.max(0,S.weightStart-S.weightCurrent):0;
  const gActive=S.guitare.find(g=>!g.done);
  let h='';
  const pfD=S.portfolio.filter(e=>e.done).length,pfT=S.portfolio.length,pfP=Math.round(pfD/pfT*100);
  h+=buildAcc('portfolio','PORTFOLIO',pfD+'/'+pfT,'<div class="ph"><span>'+pfD+'/'+pfT+' STAGES</span><span>'+pfP+'% COMPLETE</span></div><div class="pb"><div class="pbf" style="width:'+pfP+'%"></div></div>'+exList(S.portfolio,'portfolio'));
  const mD=S.memoire.filter(e=>e.done).length,mT=S.memoire.length,mP=Math.round(mD/mT*100);
  h+=buildAcc('memoire','MEMOIRE HMONP',mD+'/'+mT,'<div class="ph"><span>'+mD+'/'+mT+' STAGES</span><span>'+mP+'% COMPLETE</span></div><div class="pb"><div class="pbf" style="width:'+mP+'%"></div></div>'+exList(S.memoire,'memoire'));
  h+=buildAcc('biometrie','BIOMETRICS',pLoss.toFixed(1)+' KG',
    '<div class="ex no-btn" style="cursor:default;flex-direction:column;padding:16px"><div style="font-size:13px;font-weight:700;color:var(--tx)">'+
      (S.weightStart?'INIT: '+S.weightStart+' KG | CURRENT: '+S.weightCurrent+' KG | DIFF: '+pLoss.toFixed(1)+' KG':'ENTER INITIAL MASS (KG)')+
    '</div><div class="wrow"><input class="winp" type="number" id="winp" placeholder="'+(S.weightCurrent||'MASS')+'" step="0.1"><button class="wsave" onclick="logW(event)">SAVE</button></div></div>'+
    S.poids.map(m=>'<div class="ex'+(m.done?' dn':'')+(m.boss?' boss':'')+'" style="cursor:default"><div class="ex-content"><div class="et">'+m.desc+'</div><div class="etc">// '+m.t+'</div><div class="erw">+'+m.xp+' REP / +'+m.ip+' E$</div></div><div class="qi-btn" style="width:auto;background:none;color:'+(m.done?'var(--gn)':'var(--mu)')+'">'+(m.done?'OK':'INACTIVE')+'</div></div>').join(''));
  const gD=S.guitare.filter(g=>g.done).length,gP=Math.round(gD/S.guitare.length*100);
  h+=buildAcc('silverhand','SILVERHAND',gD+'/'+S.guitare.length,
    '<div class="ph"><span>'+gD+'/'+S.guitare.length+' TIERS</span><span>'+gP+'% COMPLETE</span></div><div class="pb"><div class="pbf" style="width:'+gP+'%"></div></div>'+
    '<div class="ex no-btn" style="cursor:default;flex-direction:column;padding:16px"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--tx)">'+
      (gActive?gActive.desc:'TOTAL MASTERY')+'</div>'+
    '<div style="display:flex;gap:10px;margin-bottom:12px">'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px" onclick="logG(15, event)">15 MIN</button>'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px" onclick="logG(30, event)">30 MIN</button>'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px;background:var(--cy)" onclick="logG(60, event)">1H+</button>'+
    '</div><div style="font-size:11px;font-weight:800;color:var(--y)">SESSIONS THIS WEEK : '+(S.practiceWeek||0)+'</div></div>'+
    exList(S.guitare,'guitare'));
  document.getElementById('cl').innerHTML=h;
}

function logW(e) {
  const v=parseFloat(document.getElementById('winp').value);
  if(isNaN(v)||v<30||v>300){toast('INVALID MASS','err');return;}
  if(!S.weightStart) S.weightStart=v; S.weightCurrent=v;
  const loss=Math.max(0,S.weightStart-v);
  S.poids.forEach(m=>{ if(!m.done&&loss>=m.kg){m.done=true;addXP(m.xp);S.player.ip+=m.ip;showGain(m.xp,m.ip,e);} });
  save();rCamps();rHdr();toast('BIOMETRICS UPDATED');
}

function logG(min, e) {
  const xp=min>=60?15:min>=30?10:5, ip=min>=60?5:0;
  addXP(xp);S.player.ip+=ip;S.practiceWeek=(S.practiceWeek||0)+1;
  save();rCamps();rHdr();showGain(xp,ip,e);
}

function setShopFilter(c) { shopFilter=c; rShop(); }
function rShop() {
  const bought=S.shop.filter(s=>s.bought), mp=S.mysteryPending||[]; let h='';
  if (bought.length>0||mp.length>0) {
    h+='<div class="sh-sect">PURCHASED</div>';
    mp.forEach(r=>{
      const isErr=r.type==='error';
      h+='<div class="shi-b" data-mid="'+r.uid+'" onclick="useMystery(\''+r.uid+'\')" style="'+(isErr?'border-color:var(--rd);border-left-color:var(--rd);background:linear-gradient(110deg,rgba(255,0,60,.12) 0%,rgba(255,0,60,.04) 100%)':'')+'">'+
        '<div class="shi-info"><div class="shin" style="'+(isErr?'color:var(--rd)':'')+'">'+r.desc+'</div><div class="shic">MYSTERY STASH</div></div>'+
        '<button class="ubtn" '+(isErr?'style="background:var(--rd)"':'')+'>USE</button></div>';
    });
    h+=bought.map(s=>'<div class="shi-b" data-sid="'+s.id+'" onclick="useItem(\''+s.id+'\')"><div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div><button class="ubtn">USE</button><button style="background:none;border:none;color:var(--rd);font-size:18px;font-weight:800;cursor:pointer;padding:0 4px;flex-shrink:0" onclick="event.stopPropagation();cancelPurchase(\''+s.id+'\')">✕</button></div>').join('');
    h+='<div style="height:8px"></div>';
  }
  const cats=[{id:'all',l:'ALL'},{id:'fun',l:'FUN'},{id:'gear',l:'GEAR'},{id:'xp',l:'EXP'}];
  h+='<div class="shop-filters">'+cats.map(c=>'<button class="sfb'+(shopFilter===c.id?' on':'')+'" onclick="setShopFilter(\''+c.id+'\')">'+c.l+'</button>').join('')+'</div>';
  const items=(shopFilter==='all'?S.shop:S.shop.filter(s=>s.cat===shopFilter)).filter(s=>!s.bought);
  h+=items.map(s=>{
    const can=S.player.ip>=s.cost;
    return '<div class="shi"><div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div><span class="shp">'+s.cost+' E$</span><button class="shbtn'+(can?' ok':' np')+'" onclick="'+(can?'buyIt(\''+s.id+'\')':'')+'">'+(can?'BUY':'NEED FUNDS')+'</button></div>';
  }).join('');
  document.getElementById('sl').innerHTML=h;
}

function cancelPurchase(id) { const it=S.shop.find(s=>s.id===id); if(!it) return; it.bought=false; S.player.ip+=it.cost; save(); rShop(); rHdr(); toast('PURCHASE CANCELED','err'); }
function buyIt(id) {
  const it=S.shop.find(s=>s.id===id); if(!it||S.player.ip<it.cost) return;
  showConfirm(it.desc,'<div style="font-size:36px;font-weight:800;color:var(--y);text-align:center;margin:10px 0">'+it.cost+' E$</div>',()=>{
    S.player.ip-=it.cost;
    if (id==='sm') {
      if(!S.mysteryPending) S.mysteryPending=[];
      const lo=[{type:'hack', desc:'HACK +150 E$', ip:150, xp:0},{type:'eclat',desc:'ECLAT +200 REP', ip:0, xp:200},{type:'pass', desc:'PASS VIP ENTERTAINMENT', ip:0, xp:0},{type:'error',desc:'ERROR -50 E$', ip:-50, xp:0}];
      const l=lo[Math.floor(Math.random()*lo.length)];
      if(l.ip>0) S.player.ip+=l.ip; if(l.ip<0) S.player.ip=Math.max(0,S.player.ip+l.ip); if(l.xp) addXP(l.xp);
      S.mysteryPending.push({uid:'m_'+Date.now()+'_'+Math.random().toString(36).slice(2), type:l.type, desc:l.desc});
    } else { it.bought=true; toast('PURCHASED — tap USE when ready','gold'); }
    save();rShop();rHdr();
  },'BUY');
}

function useItem(id) {
  const el=document.querySelector('[data-sid="'+id+'"]'), it=S.shop.find(s=>s.id===id); if(!el||!it) return;
  el.classList.add('using'); const ov=document.createElement('div'); ov.className='used-ov';
  ov.innerHTML='<div class="used-scan"></div><div class="used-c tl"></div><div class="used-c tr"></div><div class="used-c bl"></div><div class="used-c br"></div><div class="used-in"><div class="used-lbl">ACTIVATED</div><div class="used-nm">'+it.desc+'</div></div>';
  document.body.appendChild(ov); setTimeout(() => { it.bought = false; save(); rShop(); }, 3120); setTimeout(() => ov.remove(), 9000);
}

function useMystery(uid) {
  const el=document.querySelector('[data-mid="'+uid+'"]'), idx=(S.mysteryPending||[]).findIndex(r=>r.uid===uid); if(idx===-1) return;
  const r=S.mysteryPending[idx]; if(el) el.classList.add('using'); const ov=document.createElement('div'); ov.className='used-ov';
  ov.innerHTML='<div class="used-scan"></div><div class="used-c tl"></div><div class="used-c tr"></div><div class="used-c bl"></div><div class="used-c br"></div><div class="used-in"><div class="used-lbl">ACTIVATED</div><div class="used-nm">'+r.desc+'</div></div>';
  document.body.appendChild(ov); setTimeout(() => { S.mysteryPending.splice(idx,1); save(); rShop(); }, 3120); setTimeout(() => ov.remove(), 9000);
}

function rStats() {
  const p=S.player;
  document.getElementById('stg').innerHTML=
    '<div class="sc"><div class="sv-wrap"><div class="sv">'+p.level+'</div><div class="sv-dec">LVL</div></div><div class="sl">STREET CRED</div></div>'+
    '<div class="sc"><div class="sv-wrap"><div class="sv">'+p.ip+'</div><div class="sv-dec">E$</div></div><div class="sl">AVAILABLE FUNDS</div></div>'+
    '<div class="sc gold-badge"><div class="sv-wrap"><div class="sv">'+(p.streak||0)+'</div><div class="sv-dec">DAYS</div></div><div class="sl">ACTIVE STRIKE</div></div>'+
    '<div class="sc"><div class="sv-wrap"><div class="sv">'+(S.totalDone||0)+'</div><div class="sv-dec">GIGS</div></div><div class="sl">CONTRACTS DONE</div></div>';
  
  document.getElementById('stc').innerHTML=[
    {n:'PORTFOLIO',items:S.portfolio},
    {n:'MEMOIRE HMONP',items:S.memoire},
    {n:'SILVERHAND',items:S.guitare},
    {n:'BIOMETRICS',items:S.poids}
  ].map(c=>{
    const dItems = c.items.filter(e=>e.done);
    const d = dItems.length;
    const t = c.items.length;
    const pct = t > 0 ? Math.round((d/t)*100) : 0;
    const catXp = dItems.reduce((sum, item) => sum + (item.xp || 0), 0);
    const catIp = dItems.reduce((sum, item) => sum + (item.ip || 0), 0);

    return '<div class="scamp">'+
             '<div class="scr">'+
               '<span class="scr-title">'+c.n+'</span>'+
               '<span class="scr-pct">'+pct+'%</span>'+
             '</div>'+
             '<div class="scamp-stats">'+
               '<div class="scamp-stat"><span>PROGRESS</span><span class="scamp-stat-val">'+d+'/'+t+'</span></div>'+
               '<div class="scamp-stat"><span>REP EARNED</span><span class="scamp-stat-val" style="color:var(--cy)">+'+catXp+'</span></div>'+
               '<div class="scamp-stat"><span>FUNDS EARNED</span><span class="scamp-stat-val" style="color:var(--y)">+'+catIp+' E$</span></div>'+
             '</div>'+
             '<div class="pb-wrap">'+
               '<div class="pb"><div class="pbf" style="width:'+pct+'%"></div></div>'+
             '</div>'+
           '</div>';
  }).join('');
}

function go(tab) {
  checkReset();
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('content').scrollTop=0;
  if(tab==='d')rDailies(); else if(tab==='h')rHebdo(); else if(tab==='c')rCamps(); else if(tab==='s')rShop(); else if(tab==='st')rStats();
}

load(); prevIp=S.player.ip; prevXp=S.player.xp;
checkReset(); rHdr(); rDailies();
</script>
</body>
</html>
