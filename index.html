<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H PROJECT - TERMINAL LOCKED</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700;800;900&family=Doto:wght@100..900&family=Bungee+Hairline&display=swap" rel="stylesheet">
<style>
:root{--y:#fcee0a;--bg:#0b1118;--pan:#141d26;--brd:#233242;--cy:#00cfff;--rd:#ff003c;--tx:#e0e0e0;--mu:#6b7d8f;--gn:#00cfff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.15) 1px,transparent 1px);background-size:24px 24px;color:var(--tx)}
body{font-family:'Rajdhani',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.5px}

/* ─── AUTH ─── */
#auth-screen{position:fixed;inset:0;z-index:10000;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.08) 1px,transparent 1px);background-size:20px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;pointer-events:all;-webkit-user-select:none;user-select:none}
.auth-box{width:100%;max-width:280px;background:rgba(11,17,24,0.97);padding:35px 20px 25px;text-align:center;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);border:1px solid rgba(252,238,10,0.2);box-shadow:0 0 40px rgba(0,0,0,0.9),0 0 20px rgba(252,238,10,0.05);display:flex;flex-direction:column}
.auth-title{color:var(--y);font-size:20px;font-weight:900;letter-spacing:3px;margin-bottom:2px;text-shadow:0 0 12px rgba(252,238,10,.6)}
.auth-sub{color:var(--mu);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:25px}
#auth-pin-display{height:40px;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.auth-action-area{position:relative;height:245px;width:100%;display:flex;justify-content:center}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:180px;position:absolute;top:0}
.key{aspect-ratio:1/1;background:rgba(20,29,38,.8);border:1px solid var(--brd);color:var(--mu);font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:all 0.1s ease;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);user-select:none}
.key:active,.key.pressed{background:rgba(252,238,10,.15);color:var(--y);border-color:var(--y);box-shadow:0 0 15px var(--y),inset 0 0 10px rgba(252,238,10,.2);transform:scale(0.95)}
.key-0{grid-column:2}
#hacker-load{display:none;position:absolute;top:0;width:180px;font-family:'Courier New',Courier,monospace;color:#c0c0c0;font-size:13px;line-height:1.8;text-align:left;letter-spacing:0px;text-shadow:none;white-space:nowrap}
.cursor{display:inline-block;width:2px;height:1em;background-color:#c0c0c0;vertical-align:text-bottom;margin-left:2px;animation:blinkCursor 0.8s step-end infinite;box-shadow:none}
@keyframes blinkCursor{0%,100%{opacity:1}50%{opacity:0}}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1px solid var(--mu);background:transparent;transition:background 0.15s, border-color 0.15s, box-shadow 0.15s}
.pin-dot.filled{background:var(--y);border-color:var(--y);box-shadow:0 0 8px var(--y),0 0 16px rgba(252,238,10,.4)}
.auth-trust{margin-top:14px;display:flex;justify-content:center}
.auth-trust-lbl{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:8px;font-weight:800;letter-spacing:2px;color:var(--mu);opacity:.6;transition:opacity .15s}
.auth-trust-lbl:active{opacity:1}
.auth-trust-lbl input{display:none}
.lock-icon{width:13px;height:16px;flex-shrink:0;color:var(--mu);transition:color .2s,filter .2s}
.lock-open{display:none}
.auth-trust-lbl input:checked~.lock-closed{display:none}
.auth-trust-lbl input:checked~.lock-open{display:block;color:var(--cy);filter:drop-shadow(0 0 4px var(--cy))}
.auth-trust-lbl input:checked~span{color:var(--cy);opacity:1}

/* ─── BTN EXECUTED → + immédiat grand → tourne en ✕ ─── */
.btn-lbl{position:absolute;opacity:1;transform:scale(1);transition:opacity 0.15s,transform 0.15s}
.qi.dn .btn-lbl,.ex.dn .btn-lbl{opacity:0;transform:scale(0.4);transition:opacity 0.12s ease 0s,transform 0.12s ease 0s}
.btn-plus{
  position:absolute;
  font-size:38px;font-weight:900;color:#000;
  opacity:0;
  line-height:1;
  font-family:'Rajdhani',sans-serif;
  transform:rotate(0deg);
}
.btn-x{display:none}
@keyframes plusToX{
  0%    {opacity:0;transform:rotate(0deg)}
  2%    {opacity:1;transform:rotate(0deg)}
  80%   {opacity:1;transform:rotate(0deg);animation-timing-function:ease-out}
  100%  {opacity:1;transform:rotate(45deg)}
}
.qi.anim-lock .btn-plus,.ex.anim-lock .btn-plus{
  animation: plusToX 2.5s linear forwards;
}
.qi.dn:not(.anim-lock) .btn-plus,.ex.dn:not(.anim-lock) .btn-plus{opacity:1;transform:rotate(45deg)}
.qi.dn .qi-btn:hover .btn-plus,.ex.dn .qi-btn:hover .btn-plus{color:#000}
.qi.dn .qi-btn,.ex.dn .qi-btn{pointer-events:none;cursor:default}
.anim-lock{pointer-events:none!important;cursor:default!important}
.ex.inactive-w{border-color:var(--brd);filter:grayscale(100%);opacity:0.6}
.ex.inactive-w::before{background:var(--pan)}
.ex.inactive-w .qi-btn{color:var(--mu);display:flex;justify-content:center;align-items:center}

/* ─── STATS DRAWER ─── */
#stats-drawer{
  position:fixed;top:0;left:50%;
  transform:translateX(-50%) translateY(-100%);
  width:100%;max-width:430px;height:100%;
  background:var(--bg);
  background-image:radial-gradient(rgba(252,238,10,.15) 1px,transparent 1px);
  background-size:24px 24px;
  z-index:1001;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:transform 0.45s cubic-bezier(0.25,1,.5,1);
  padding:135px 16px 16px;
}
#stats-drawer.open{transform:translateX(-50%) translateY(0)}
#hd{cursor:pointer;-webkit-user-select:none;user-select:none}
#nb-s{}

/* ─── MAIN APP ─── */
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
#hw{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;min-width:350px;max-width:430px;z-index:9001;filter:drop-shadow(0 8px 12px rgba(0,0,0,.85))}
#hd{
  background:var(--y);
  color:#000;
  padding:4px 20px 18px;
  -webkit-clip-path:polygon(0% 0%, 100% 0%, 100% 100%, calc(100% - 15px) 100%, calc(100% - 15px) calc(100% - 8px), calc(100% - 18px) calc(100% - 8px), calc(100% - 18px) 100%, calc(100% - 26px) 100%, calc(100% - 26px) calc(100% - 8px), calc(100% - 28px) calc(100% - 8px), calc(100% - 28px) 100%, calc(100% - 33px) 100%, calc(100% - 33px) calc(100% - 8px), calc(100% - 38px) calc(100% - 8px), calc(100% - 38px) 100%, calc(100% - 47px) 100%, calc(100% - 47px) calc(100% - 8px), calc(100% - 49px) calc(100% - 8px), calc(100% - 49px) 100%, calc(66.6% + 15px) 100%, 66.6% calc(100% - 10px), calc(66.6% - 15px) 100%, 185px 100%, 170px calc(100% - 12px), 35px calc(100% - 12px), 20px 100%, 0% 100%);
  clip-path:polygon(0% 0%, 100% 0%, 100% 100%, calc(100% - 15px) 100%, calc(100% - 15px) calc(100% - 8px), calc(100% - 18px) calc(100% - 8px), calc(100% - 18px) 100%, calc(100% - 26px) 100%, calc(100% - 26px) calc(100% - 8px), calc(100% - 28px) calc(100% - 8px), calc(100% - 28px) 100%, calc(100% - 33px) 100%, calc(100% - 33px) calc(100% - 8px), calc(100% - 38px) calc(100% - 8px), calc(100% - 38px) 100%, calc(100% - 47px) 100%, calc(100% - 47px) calc(100% - 8px), calc(100% - 49px) calc(100% - 8px), calc(100% - 49px) 100%, calc(66.6% + 15px) 100%, 66.6% calc(100% - 10px), calc(66.6% - 15px) 100%, 185px 100%, 170px calc(100% - 12px), 35px calc(100% - 12px), 20px 100%, 0% 100%);
}
.htop{font-size:10px;font-weight:700;opacity:.7;margin-bottom:0;letter-spacing:1px;line-height:1;position:relative;top:5px}
.sync{position:absolute;top:4px;right:12px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:1px;color:#000;cursor:pointer;padding:8px;}
.sdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.sync.synched .sdot{background:#27ae60;box-shadow:0 0 6px rgba(39,174,96,1),0 0 14px rgba(39,174,96,.6),0 0 26px rgba(39,174,96,.22)}
.sync.synching .sdot{animation:led-sync .9s ease-in-out infinite}
.sync.offline .sdot{animation:led-warn 1.8s ease-in-out infinite}
@keyframes led-sync{
  0%,100%{background:#1a6ab5;box-shadow:0 0 4px rgba(77,166,255,.5),0 0 10px rgba(77,166,255,.2)}
  50%{background:#8dd0ff;box-shadow:0 0 8px rgba(77,166,255,1),0 0 18px rgba(77,166,255,.55),0 0 30px rgba(77,166,255,.18)}
}
@keyframes led-warn{
  0%,100%{background:#b0001a;box-shadow:0 0 5px rgba(255,0,60,.6),0 0 12px rgba(255,0,60,.22)}
  50%{background:#ff2a52;box-shadow:0 0 10px rgba(255,0,60,1),0 0 22px rgba(255,0,60,.55),0 0 36px rgba(255,0,60,.15)}
}
.hlv{font-size:10px;font-weight:700;opacity:.8;margin-bottom:0;letter-spacing:.5px;color:#000;line-height:1}
.h1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1px}
.hname{font-size:38px;font-weight:700;line-height:1}
.hip-container{display:flex;align-items:baseline;gap:6px}
.hip-val{font-size:38px;font-weight:700;line-height:1;color:#000}
.hip-cur{font-size:38px;font-weight:300;color:#000;opacity:.8}
.xp-block{margin-top:0}
.xp-bottom-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.xp-rep-val{font-size:12px;font-weight:800;color:#000;opacity:.75;letter-spacing:.3px}
.xb{height:8px;background:rgba(0,0,0,.18);clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.xbf{height:100%;background:var(--cy);transition:width .5s}
.streak-badge{display:flex;align-items:baseline;gap:4px;font-size:12px;font-weight:800;color:#000;opacity:.75;letter-spacing:.3px;position:relative}
@keyframes streak-bump{0%{transform:scale(1)}45%{transform:scale(1.4)}100%{transform:scale(1)}}
.streak-bump{animation:streak-bump .45s ease-out}
@keyframes streak-plus{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-18px)}}
.streak-plus{position:absolute;left:0;top:-4px;font-size:10px;font-weight:900;color:#000;pointer-events:none;animation:streak-plus .65s ease-out forwards}

/* ─── GAIN FLOTTANT ─── */
.gain-float{position:fixed;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;z-index:9100;left:50%;transform:translateX(-50%);top:50px}
.gf-item{font-size:16px;font-weight:800;padding:4px 10px;background:rgba(11,17,24,.95);border:1px solid currentColor;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);animation:gfPop 1s ease-out forwards}
.gf-rep{color:var(--cy);box-shadow:0 0 8px rgba(0,207,255,.3)}
.gf-ed{color:var(--y);box-shadow:0 0 8px rgba(252,238,10,.3)}
@keyframes gfPop{0%{opacity:0;transform:translateY(10px) scale(0.8)}15%{opacity:1;transform:translateY(0) scale(1.1)}30%{opacity:1;transform:translateY(-2px) scale(1)}65%{opacity:1;transform:translateY(-6px)}100%{opacity:0;transform:translateY(-12px)}}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:130px 16px calc(100px + env(safe-area-inset-bottom,0px))}
#offline-banner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100%;background:rgba(11,17,24,.97);z-index:9500;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease-out}
.ofb-inner{text-align:center;padding:32px 24px;max-width:320px}
.ofb-icon{margin-bottom:18px;filter:drop-shadow(0 0 18px rgba(255,0,60,.6))}
.ofb-title{font-size:26px;font-weight:900;letter-spacing:4px;color:var(--rd);text-shadow:0 0 20px rgba(255,0,60,.5);margin-bottom:14px}
.ofb-msg{font-size:13px;color:var(--tx);opacity:.75;line-height:1.75;margin-bottom:24px}
.ofb-btns{display:flex;flex-direction:column;gap:10px}
.ofb-btn{background:transparent;border:1px solid;padding:13px 24px;font-family:inherit;font-weight:800;font-size:11px;letter-spacing:2px;cursor:pointer;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.ofb-retry{border-color:var(--cy);color:var(--cy)}
.ofb-skip{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.4)}
@keyframes ofbRetrying{0%,100%{opacity:.65;border-color:rgba(0,207,255,.35)}50%{opacity:1;border-color:var(--cy)}}
.ofb-retry.retrying{animation:ofbRetrying .7s ease-in-out infinite;pointer-events:none;}
::-webkit-scrollbar{width:0}

/* ─── NAV ─── */
#nav-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:1000;
  filter:drop-shadow(0 -6px 14px rgba(0,0,0,.9));
}
#nav{
  background:var(--y);
  display:flex;
  padding:0;
  gap:0;
  align-items:stretch;
  clip-path:polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%, 0 12px);
  overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
  flex:1;
  background:transparent;
  border:none;
  color:rgba(0,0,0,0.5);
  cursor:pointer;
  padding:18px 8px calc(28px + env(safe-area-inset-bottom,0px));
  font-size:14px;font-weight:800;letter-spacing:1px;
  font-family:inherit;
  transition:background-color .15s ease,color .15s ease,font-size .15s ease;
  position:relative;
  z-index:1;
  text-align:center;
  overflow:hidden;
}
.nb+.nb::before{
  content:'';position:absolute;left:0;
  top:25%;height:50%;width:1px;
  background:rgba(0,0,0,0.12);
  transition:opacity .3s;
}
.nb.on+.nb::before,.nb+.nb.on::before{opacity:0}
.nb.on{
  background:var(--cy);
  color:#000;
  text-shadow:0 1px 0 rgba(255,255,255,.45),0 -1px 1px rgba(0,0,0,.18);
  z-index:2;
}
.nb.on::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:55%;
  background:linear-gradient(to bottom,rgba(0,207,255,.55) 0%,transparent 100%);
  pointer-events:none;
  z-index:1;
}

.sec{display:none}
.sec.on{display:block;animation:fadeIn .2s ease-out}
.gigs-acc-hdr{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:800;letter-spacing:2px;padding:14px 0 8px;margin-top:4px}
.gigs-acc-hdr::after{content:'';flex:1;height:1px;background:currentColor;opacity:.25}
.gigs-acc-done{color:var(--gn)}
.gigs-acc-pending{color:var(--cy)}
.gig-count-badge{display:inline-block;background:var(--cy);color:#000;font-size:9px;font-weight:900;padding:1px 6px;margin-left:6px;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);letter-spacing:.5px;vertical-align:middle;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cph{display:flex;align-items:center;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 15px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px}
.cph.cph-search{justify-content:space-between;padding:8px 16px;font-weight:900;letter-spacing:2px}
.cph-title{flex:1}
.header-search{position:relative;width:150px}
.header-search input{width:100%;background:rgba(0,0,0,0.1);border:none;color:#000;padding:6px 26px 6px 10px;font-family:inherit;font-weight:800;font-size:12px;outline:none;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);transition:background 0.2s}
.header-search input::placeholder{color:rgba(0,0,0,0.4)}
.header-search input:focus{background:rgba(0,0,0,0.18)}
.search-action{position:absolute;right:6px;top:50%;transform:translateY(-50%);cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;border:none;padding:0;color:#000;opacity:0.7}
.search-action:hover{opacity:1}
.search-action svg{width:14px;height:14px}
.no-results{text-align:center;padding:30px 10px;color:var(--mu);font-size:14px;font-weight:700;letter-spacing:1px}
.no-results span{color:var(--rd);font-size:20px;display:block;margin-bottom:5px}

.qi,.ex{display:flex;position:relative;overflow:hidden;background:rgba(0,0,0,0.8);border:1px solid var(--y);margin-bottom:10px;cursor:pointer;padding:0;clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);transition:border-color .67s ease;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;}
.qi:not(.no-btn):active,.ex:not(.no-btn):active{transform:scale(.98)}
.qi.dn,.ex.dn{border-color:var(--gn)}
.qi::before,.ex::before{content:'';position:absolute;top:0;right:0;bottom:0;width:95px;background:var(--y);z-index:0;transition:background-color .67s ease,width 1.33s cubic-bezier(.25,1,.5,1) .67s}
.qi.dn::before,.ex.dn::before{background:var(--gn);width:100%}
.qi.no-btn::before,.ex.no-btn::before{display:none}
.qic{flex:1;padding:7px 12px;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1;min-width:0}
.ex-content{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
.qi-rewards{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 7px;flex-shrink:0;position:relative;z-index:1;min-width:68px}
.qt,.et{font-size:14px;font-weight:700;margin-bottom:1px;line-height:1.15;display:flex;justify-content:space-between;gap:8px;transition:color .2s .8s}
.qd,.etc{font-size:10px;font-weight:700;color:#777;text-transform:none;margin-bottom:0;letter-spacing:0;transition:color .2s .8s;line-height:1.2}
.etc{color:var(--mu);text-transform:uppercase;margin-bottom:10px}
.qr,.erw{font-size:11px;font-weight:800;opacity:.9;transition:color .2s .8s;text-align:right;line-height:1.3}
.qr,.erw{color:var(--cy)}
.qi.dn .qt,.ex.dn .et{color:#000}
.qi.dn .qd,.ex.dn .etc{color:#111;font-weight:800;opacity:.8}
.qi.dn .qr,.ex.dn .erw{color:#000}
.ex.boss{border-left:4px solid var(--y)}
.ex.boss.dn{border-left:4px solid var(--gn)}
.lk{opacity:.25;pointer-events:none;filter:grayscale(100%)}
.qi-btn{width:95px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#000;letter-spacing:1px}
.ach{display:flex;align-items:center;justify-content:space-between;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 0;cursor:pointer;user-select:none;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px;transition:opacity .1s}
.ach:active{opacity:.85}
.achl{display:flex;align-items:center;gap:10px;flex:1}
.ach-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.acb{
  font-size:13px;font-weight:900;color:#000;letter-spacing:1px;
  border-left:3px solid rgba(0,0,0,0.35);
  padding-left:10px;
  opacity:.85;
  font-variant-numeric:tabular-nums;
}
.ach-arrow{font-size:9px;opacity:.55;flex-shrink:0}
.acbd{padding-top:12px}
.acbd.closed{display:none}
.pb{height:4px;background:rgba(20,29,38,.8);margin-bottom:20px}
.pbf{height:100%;background:var(--y);transition:width .5s}
.ph{display:flex;justify-content:space-between;margin-bottom:8px}
.ph span{font-size:13px;font-weight:600}

/* BIOMETRICS ROADMAP — SVG parallelogram tickets */
.bio-roadmap{margin:0}
.bio-road-svg-wrap{width:100%;overflow:visible}

/* SHOP */
.shop-filters{display:flex;flex-wrap:nowrap;gap:4px;margin-bottom:18px}
.sfb{background:var(--pan);border:1px solid var(--brd);color:var(--mu);padding:6px 1px;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;flex:1;min-width:0;text-align:center;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:.15s}
.sfb.on{background:var(--y);color:#000;border-color:var(--y)}
.shi{display:flex;align-items:center;background:var(--pan);padding:14px 16px;margin-bottom:10px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);gap:12px;border:1px solid transparent}
.shi:hover{border-color:rgba(252,238,10,0.2)}
.shi-info{flex:1;min-width:0}
.shin{font-size:14px;font-weight:700;line-height:1.2;text-transform:none;color:var(--tx)}
.shic{font-size:10px;font-weight:800;color:var(--mu);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
.shp{font-size:18px;color:var(--y);font-weight:800;white-space:nowrap;flex-shrink:0}
.shbtn{background:var(--bg);border:1px solid var(--brd);padding:8px 12px;font-size:11px;font-weight:800;color:var(--tx);cursor:pointer;font-family:inherit;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);white-space:nowrap;flex-shrink:0}
.shbtn.np{color:rgba(255,255,255,0.25);background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.05);cursor:not-allowed;pointer-events:none}
.shbtn.ok{background:var(--cy);color:#000;border:none}
.shbtn.ok:active{background:#fff;color:#000}
.sh-sect{font-size:22px;font-weight:900;color:var(--y);letter-spacing:2px;margin-bottom:12px;margin-left:23px;padding-bottom:8px;border-bottom:1px solid rgba(252,238,10,.3)}
#sp:not(:empty){margin-bottom:24px}
.shi-b{display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;cursor:pointer;background:linear-gradient(110deg,rgba(252,238,10,.14) 0%,rgba(252,238,10,.05) 100%);border:1px solid var(--y);border-left:4px solid var(--y);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);animation:bPulse 2.8s ease-in-out infinite;position:relative;overflow:hidden}
.shi-b::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(252,238,10,.1),transparent);animation:bShimmer 2.8s ease-in-out infinite}
@keyframes bPulse{0%,100%{border-color:var(--y)}50%{border-color:rgba(252,238,10,.4)}}
@keyframes bShimmer{0%{left:-100%}50%,100%{left:150%}}
.shi-b .shi-info{flex:1;min-width:0}
.shi-b .shin{color:#fff;font-size:15px;font-weight:700}
.shi-b .shic{color:rgba(252,238,10,.6)}
.ubtn{background:var(--y);border:none;color:#000;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);letter-spacing:.5px}
.ubtn:active{background:#fff}
.shi-b.using{animation:bExit 3s ease-out forwards !important;pointer-events:none}
@keyframes bExit{0%{opacity:1;transform:scaleY(1)}30%{background:rgba(252,238,10,.35);transform:scaleY(1.04)}100%{opacity:0;transform:scaleY(0)}}
.wrow{display:flex;gap:10px;margin-top:15px}
.winp{flex:1;background:var(--bg);border:1px solid var(--brd);padding:10px 15px;color:var(--tx);font-size:16px;font-family:inherit;font-weight:600;outline:none;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.winp:focus{border-color:var(--y)}
.wsave{background:var(--y);border:none;padding:10px 20px;color:#000;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}

/* STATS */
#s-st{padding-top:0px}
.st-hero{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(110deg,rgba(252,238,10,.12) 0%,rgba(252,238,10,.04) 100%);border:1px solid rgba(252,238,10,.4);border-left:4px solid var(--y);padding:52px 14px 10px;margin-bottom:8px;margin-top:-50px;clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);position:relative;overflow:hidden}
.st-hero::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(252,238,10,.03) 3px,rgba(252,238,10,.03) 4px);pointer-events:none}
.st-hero-label{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--y);opacity:.7}
.st-hero-lv{font-size:56px;font-weight:900;color:var(--y);line-height:.9;text-shadow:0 0 20px rgba(252,238,10,.5),0 0 50px rgba(252,238,10,.2)}
.st-hero-right{text-align:right}
.st-hero-class{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:1px}
.st-hero-xp{font-size:13px;font-weight:800;color:var(--y);margin-top:4px}
.st-hero-xpbar{width:90px;height:5px;background:rgba(252,238,10,.15);margin-top:4px;margin-left:auto;clip-path:polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%)}
.st-hero-xpfill{height:100%;background:var(--y);transition:width .5s}
.st-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.st-kpi{background:linear-gradient(135deg,rgba(20,29,38,.95) 0%,rgba(11,17,24,1) 100%);border:1px solid rgba(0,207,255,.2);border-top:2px solid var(--cy);padding:8px 10px;clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);position:relative;overflow:hidden}
.st-kpi::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,207,255,.02) 3px,rgba(0,207,255,.02) 4px);pointer-events:none}
.st-kpi.gold{border-color:rgba(252,238,10,.2);border-top-color:var(--y)}
.st-kpi-val{font-size:22px;font-weight:900;color:var(--cy);line-height:1;text-shadow:0 0 10px rgba(0,207,255,.4);margin-bottom:3px}
.st-kpi.gold .st-kpi-val{color:var(--y);text-shadow:0 0 10px rgba(252,238,10,.4)}
.st-kpi-lbl{font-size:8px;font-weight:800;letter-spacing:1px;color:var(--mu);border-left:2px solid var(--cy);padding-left:4px}
.st-kpi.gold .st-kpi-lbl{border-left-color:var(--y)}
.st-camp-label{font-size:9px;font-weight:800;letter-spacing:3px;color:var(--cy);opacity:.5;margin-bottom:6px}
.scamp{position:relative;display:flex;flex-direction:row;background:linear-gradient(110deg,rgba(14,22,31,.98) 0%,rgba(11,17,24,.95) 100%);border:1px solid rgba(0,207,255,.12);border-left:3px solid var(--cy);margin-bottom:7px;padding:0;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);overflow:hidden}
.scamp-left{flex:1;min-width:0;display:flex;flex-direction:column}
.scamp::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,207,255,.012) 3px,rgba(0,207,255,.012) 4px)}
.scamp.cat-portfolio{border-left-color:var(--cy)}
.scamp.cat-memoire{border-left-color:var(--y)}
.scamp.cat-guitar{border-left-color:#c084fc}
.scamp.cat-bio{border-left-color:var(--gn)}
.scamp-top{display:flex;align-items:center;gap:6px;padding:9px 12px 5px;position:relative;z-index:2}
.scamp-name{font-size:20px;font-weight:900;letter-spacing:1.5px;flex:1;min-width:0}
.scamp-inline-meta{display:flex;gap:4px;align-items:center;flex-shrink:0}
.sim-rep{font-size:8px;font-weight:800;letter-spacing:.5px;color:var(--cy);background:rgba(0,207,255,.08);border:1px solid rgba(0,207,255,.22);padding:2px 5px}
.sim-funds{font-size:8px;font-weight:800;letter-spacing:.5px;color:var(--y);background:rgba(252,238,10,.08);border:1px solid rgba(252,238,10,.22);padding:2px 5px}
.scamp.cat-portfolio .scamp-name{color:var(--cy)}
.scamp.cat-memoire .scamp-name{color:var(--y)}
.scamp.cat-guitar .scamp-name{color:#c084fc}
.scamp.cat-bio .scamp-name{color:var(--gn)}
.scamp-pct{flex-shrink:0;width:58px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;line-height:1;border-left:1px solid rgba(255,255,255,.06);position:relative;z-index:2}
.scamp.cat-portfolio .scamp-pct{color:var(--cy);text-shadow:0 0 12px rgba(0,207,255,.5);border-left-color:rgba(0,207,255,.15)}
.scamp.cat-memoire .scamp-pct{color:var(--y);text-shadow:0 0 12px rgba(252,238,10,.5);border-left-color:rgba(252,238,10,.15)}
.scamp.cat-guitar .scamp-pct{color:#c084fc;text-shadow:0 0 12px rgba(192,132,252,.5);border-left-color:rgba(192,132,252,.15)}
.scamp.cat-bio .scamp-pct{color:var(--gn);text-shadow:0 0 12px rgba(0,207,255,.5);border-left-color:rgba(0,207,255,.15)}
.scamp-segs{display:flex;gap:2px;padding:0 10px 6px;position:relative;z-index:2}
.seg{flex:1;height:9px;clip-path:polygon(2px 0,100% 0,calc(100% - 2px) 100%,0 100%);transition:background .4s}
.seg.done-seg{background:var(--cy)}
.scamp.cat-memoire .seg.done-seg{background:var(--y)}
.scamp.cat-guitar .seg.done-seg{background:#c084fc}
.scamp.cat-bio .seg.done-seg{background:var(--gn)}
.seg.empty-seg{background:rgba(255,255,255,.07)}
.scamp-bot{display:flex;border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:2}
.scamp-stat{flex:1;padding:5px 10px;border-right:1px solid rgba(255,255,255,.04)}
.scamp-stat:last-child{border-right:none}
.scamp-stat-lbl{font-size:8px;font-weight:800;letter-spacing:1px;color:var(--mu)}
.scamp-stat-val{font-size:12px;font-weight:800;color:#fff}
.scamp-stat-val.rep{color:var(--cy);text-shadow:0 0 14px rgba(0,207,255,.8),0 0 28px rgba(0,207,255,.35)}
.scamp-stat-val.funds{color:var(--cy);text-shadow:0 0 14px rgba(0,207,255,.8),0 0 28px rgba(0,207,255,.35)}
.wt-chart-wrap{padding:6px 14px 10px;position:relative;z-index:2}
.wt-chart-label{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--mu);margin-bottom:6px}
.wt-chart{width:100%;height:55px}
.wt-chart svg{width:100%;height:100%}

/* STAT CHARTS */
.st-section-title{font-size:9px;font-weight:800;letter-spacing:3px;color:var(--cy);opacity:.5;margin:14px 0 6px}
.st-chart-box{background:linear-gradient(110deg,rgba(14,22,31,.98) 0%,rgba(11,17,24,.95) 100%);border:1px solid rgba(0,207,255,.12);border-left:3px solid var(--cy);padding:10px 12px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);margin-bottom:7px;position:relative;overflow:hidden}
.st-chart-box::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,207,255,.01) 3px,rgba(0,207,255,.01) 4px)}
.scr-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;position:relative;z-index:1}
.scr-row:last-child{margin-bottom:0}
.scr-label{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--mu);width:26px;flex-shrink:0}
.scr-track{flex:1;height:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);clip-path:polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%);position:relative;overflow:hidden}
.scr-fill{height:100%;position:absolute;inset-block:0;left:0;transition:width .6s}
.scr-track-txt{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:7px;font-weight:800;color:rgba(255,255,255,.3);line-height:1;pointer-events:none}
.scr-reward{font-size:8px;font-weight:800;color:var(--mu);white-space:nowrap;flex-shrink:0;min-width:128px;text-align:right}
.scr-earned{color:var(--gn)!important;text-shadow:0 0 8px rgba(0,207,255,.4)}
.st-daily-chart{padding:10px 12px 8px}
.dc-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;position:relative;z-index:1}
.dc-row:last-child{margin-bottom:0}
.dc-day{font-size:7px;font-weight:800;color:var(--mu);width:16px;flex-shrink:0;text-align:right;opacity:.55}
.dc-track{flex:1;height:6px;background:rgba(255,255,255,.04);position:relative;overflow:hidden;clip-path:polygon(2px 0,100% 0,calc(100% - 2px) 100%,0 100%)}
.dc-fill{height:100%;background:var(--cy);opacity:.75;position:absolute;inset-block:0;left:0;transition:width .5s}
.dc-cnt{font-size:7px;font-weight:800;color:var(--cy);width:16px;flex-shrink:0;opacity:.8}

/* ─── GIG LONG PRESS ─── */
.gig-lp-bar{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:2;}
.gig-lp-fill{position:absolute;inset:0;background:var(--rd);clip-path:circle(0% at var(--gx,50%) var(--gy,50%));opacity:.88;}
@keyframes gigLpFill{from{clip-path:circle(0% at var(--gx,50%) var(--gy,50%))}to{clip-path:circle(150% at var(--gx,50%) var(--gy,50%))}}
.camp-block{user-select:none;-webkit-user-select:none;touch-action:pan-y;-webkit-touch-callout:none;}
.cb-drag-icon{font-size:13px;color:rgba(0,0,0,.32);margin-right:4px;flex-shrink:0;font-weight:900;line-height:1;}
@keyframes gigBtnPop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
.gig-cntbtn{font-size:38px;font-weight:900;line-height:1;letter-spacing:-.5px;}
.qi.gig-hold{transition:none!important;animation:gigBorderFill .8s .2s ease-out forwards;}
@keyframes gigBorderFill{from{border-color:var(--y)}to{border-color:var(--rd)}}

/* TOAST */
#tc{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:400px;pointer-events:none}
.ts{padding:14px 18px;font-size:13px;font-weight:800;background:var(--bg);border-left:4px solid var(--cy);color:var(--tx);clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);box-shadow:0 5px 15px rgba(0,0,0,.8);animation:tsSlideUp .3s ease-out forwards}
.ts.gold{border-color:var(--y);color:var(--y)}
.ts.err{border-color:var(--rd);color:var(--rd)}
@keyframes tsSlideUp{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
#mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,17,24,.9);z-index:3000;display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(3px)}
#mo.on{display:flex;animation:fadeIn .2s ease-out}
.mbox{background:var(--pan);border:2px solid var(--y);width:100%;max-width:350px;padding:20px;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);box-shadow:0 10px 30px rgba(0,0,0,.8);text-align:center}
.mt{color:var(--y);font-size:18px;font-weight:800;margin-bottom:10px;letter-spacing:1px;text-align:center;width:100%}
.mx{color:var(--tx);font-size:14px;margin-bottom:25px;font-weight:600;white-space:pre-line;text-transform:none;text-align:center}
/* DANGER modal */
.mbox.danger{background:rgba(55,0,0,.98);border:2px solid var(--rd);box-shadow:0 0 30px rgba(255,0,60,.2),0 10px 30px rgba(0,0,0,.9)}
.mbox.danger .mt{color:var(--rd);text-align:center;letter-spacing:3px}
.mbox.danger .mx{color:rgba(255,140,140,.9);font-size:13px;font-weight:700;line-height:1.55;text-align:center;white-space:normal}
.mbox.danger .bok{background:var(--rd);color:#fff;border:none}
.mbox.danger .bok:active{background:#ff5577}
.mbox.danger .bca{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.6)}
.danger-icon{display:flex;justify-content:center;margin-bottom:14px}
.danger-icon svg{filter:drop-shadow(0 0 10px rgba(255,0,60,.7))}
.mb{display:flex;gap:10px}
.bok{flex:1;background:var(--y);color:#000;border:none;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bca{flex:1;background:transparent;color:var(--y);border:1px solid var(--y);padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bok:active{background:#fff}
.bca:active{background:rgba(252,238,10,.12)}

/* OVERLAYS */
.used-ov{position:fixed;inset:0;z-index:9000;pointer-events:all;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;animation:uOvFade 6s ease-out forwards}
@keyframes uOvFade{0%{background:rgba(11,17,24,0)}8%{background:rgba(11,17,24,.92)}67%{background:rgba(11,17,24,.92);opacity:1}100%{background:rgba(11,17,24,0);opacity:0}}
.used-scan{position:fixed;left:0;right:0;height:3px;background:var(--y);box-shadow:0 0 18px 6px var(--y),0 0 40px 10px rgba(252,238,10,.4);animation:uScan .3s cubic-bezier(.4,0,1,1) forwards}
@keyframes uScan{0%{top:-3px;opacity:1}100%{top:100%;opacity:.2}}
.used-lbl{font-size:30px;font-weight:800;color:var(--y);letter-spacing:12px;text-shadow:0 0 30px var(--y),0 0 60px rgba(252,238,10,.6);animation:uGlitch 4.5s ease-out forwards}
.used-nm{font-size:30px;font-weight:800;color:var(--cy);letter-spacing:1px;text-shadow:0 0 18px var(--cy);animation:uNm 4.5s ease-out forwards;text-align:center;padding:0 24px;line-height:1.2}
.used-sub{font-size:12px;font-weight:600;color:rgba(252,238,10,.45);letter-spacing:2px;text-transform:none;animation:uGlitch 4.5s ease-out forwards;margin-top:4px;text-align:center}
@keyframes uGlitch{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}
@keyframes uNm{0%{opacity:0;transform:scale(.9)}12%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.04) translateY(-8px)}}
.used-msg-wrap{position:relative;width:100%;padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px}
.used-c{position:absolute;width:24px;height:24px;border-color:var(--y);border-style:solid;opacity:0;animation:uCo 4s ease-out forwards}
.used-c.tl{top:0;left:20px;border-width:2px 0 0 2px}
.used-c.tr{top:0;right:20px;border-width:2px 2px 0 0}
.used-c.bl{bottom:0;left:20px;border-width:0 0 2px 2px}
.used-c.br{bottom:0;right:20px;border-width:0 2px 2px 0}
.badluck-ov{position:fixed;inset:0;z-index:9000;pointer-events:all;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;animation:blFade 5s ease-out forwards}
@keyframes blFade{0%{background:rgba(11,17,24,0)}8%{background:rgba(11,17,24,.95)}67%{background:rgba(11,17,24,.95);opacity:1}100%{background:rgba(11,17,24,0);opacity:0}}
.bl-scan{position:fixed;left:0;right:0;height:3px;background:var(--rd);box-shadow:0 0 18px 6px var(--rd),0 0 40px 10px rgba(255,0,60,.4);animation:uScan .3s cubic-bezier(.4,0,1,1) forwards}
.bl-main{font-size:30px;font-weight:900;color:var(--rd);letter-spacing:4px;text-shadow:0 0 25px var(--rd),0 0 50px rgba(255,0,60,.5);animation:blTxt 4.5s ease-out forwards;text-align:center}
.bl-next{font-size:18px;font-weight:800;color:rgba(255,60,60,.7);letter-spacing:3px;text-shadow:0 0 12px rgba(255,0,60,.4);animation:blTxt 4.5s ease-out forwards;margin-top:4px}
@keyframes blTxt{0%{opacity:0;transform:scale(.9)}10%{opacity:1;transform:scale(1.03)}16%{transform:scale(1)}75%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}
.bl-msg-wrap{position:relative;width:100%;padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px}
.bl-c{position:absolute;width:24px;height:24px;border-color:var(--rd);border-style:solid;opacity:0;animation:uCo 4.5s ease-out forwards}
.bl-c.tl{top:0;left:20px;border-width:2px 0 0 2px}
.bl-c.tr{top:0;right:20px;border-width:2px 2px 0 0}

const BKEY='cp_rlg_bak';

const DEV_RECAP=false;
const MOCK_RECAP={
  month:'2025-05',

  avgGigsPerWeek:4.2,

};

// ─── AUTH ───
let pinBuffer='';
let isAuthChecking=false;

document.addEventListener('DOMContentLoaded',()=>{
  const display = document.getElementById('auth-pin-display');
  for(let i=0; i<5; i++){
    const d = document.createElement('div');
    d.className = 'pin-dot';
    display.appendChild(d);
  }

  if(sessionStorage.getItem('cp_auth')==='true'||localStorage.getItem('cp_trusted')==='true'){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.pointerEvents='all';
    setTimeout(_checkHashImport,400);
  }
});

function updatePinDisplay(){
  const dots = document.querySelectorAll('#auth-pin-display .pin-dot');
  dots.forEach((dot, index) => {
    if(index < pinBuffer.length) {
      dot.classList.add('filled');
    } else {
      dot.classList.remove('filled');
    }
  });
}

function pressKey(k){
  if(isAuthChecking)return;
  pinBuffer+=k;
  updatePinDisplay();
  if(pinBuffer.length===5){isAuthChecking=true;submitPin();}
}

function deleteKey(){
  if(isAuthChecking)return;
  if(pinBuffer.length>0){pinBuffer=pinBuffer.slice(0,-1);updatePinDisplay();}
}

function submitPin(){
  const startTime=Date.now();
  const minAnimTime=3000;
  let fetchResult=null;
  let animDone=false;
  let animPrintedHTML='';

  fetch(SURL,{method:'POST',body:JSON.stringify({action:'auth',pin:pinBuffer}),headers:{'Content-Type':'text/plain;charset=utf-8'}})
    .then(r=>r.text())
    .then(text=>{fetchResult=(text.trim()==='AUTH_SUCCESS');checkBothDone();})
    .catch(()=>{fetchResult=false;checkBothDone();});

  const terminal=document.getElementById('hacker-load');
  const keypad=document.getElementById('auth-keypad');
  keypad.style.display='none';
  terminal.style.display='block';

  const lines=[
    {t:'> PINGING LOCAL SUBNET', spd:18, pause:180},
    {t:'> BREACHING BLACK ICE',  spd:28, pause:420},
    {t:'> UPLOADING DAEMON',     spd:12, pause:250},
    {t:'> NEUROPORT SYNC',       spd:22, pause:300},
  ];
  let currentLine=0,currentChar=0,printedHTML='';

  function typeWriter(){
    if(currentLine<lines.length){
      const line=lines[currentLine];
      const isLast=(currentLine===lines.length-1);
      if(currentChar<line.t.length){
        const partial=line.t.substring(0,currentChar+1);
        terminal.innerHTML=printedHTML+partial+"<span class='cursor'></span>";
        currentChar++;
        setTimeout(typeWriter, line.spd + Math.floor(Math.random()*12));
      }else{
        if(isLast){
          terminal.innerHTML=printedHTML+line.t+"<span class='cursor'></span>";
          animDone=true;
          animPrintedHTML=printedHTML+line.t+'<br>';
          setTimeout(checkBothDone, line.pause);
        }else{
          printedHTML+=line.t+'<br>';
          terminal.innerHTML=printedHTML+"<span class='cursor'></span>";
          currentLine++;currentChar=0;
          setTimeout(typeWriter, line.pause);
        }
      }
    }
  }

  function checkBothDone(){
    if(!animDone||fetchResult===null)return;
    const elapsed=Date.now()-startTime;
    if(elapsed<minAnimTime){setTimeout(finalizeAccess,minAnimTime-elapsed);}
    else{finalizeAccess();}
  }

  function finalizeAccess(){
    if(fetchResult===true){
      terminal.innerHTML=animPrintedHTML+`<span style="color:#c0c0c0;font-family:'Courier New',Courier,monospace;text-shadow:none;">> ACCESS GRANTED</span>`;
      sessionStorage.setItem('cp_auth','true');
      if(document.getElementById('auth-trust-check').checked)localStorage.setItem('cp_trusted','true');
      document.getElementById('app').style.pointerEvents='all';
      setTimeout(()=>{
        const screen=document.getElementById('auth-screen');
        screen.style.opacity='0';
        setTimeout(()=>{
          screen.style.display='none';
          _checkHashImport();
          if(!_hasMeaningfulData(S))pullFromCloud(true);
        },450);
      },2500);
    }else{
      terminal.innerHTML=animPrintedHTML+`<span style="color:var(--rd);font-family:'Courier New',Courier,monospace;text-shadow:none;">> ACCESS FAILED</span>`;
      setTimeout(()=>{
        terminal.style.display='none';
        terminal.innerHTML='';
        keypad.style.display='grid';
        pinBuffer='';
        isAuthChecking=false;
        updatePinDisplay();
      }, 1500);
    }
  }
  typeWriter();
}

function migrate(){
  try{
    const old=localStorage.getItem('cp_rlg_v8');
    if(!old)return null;
    const d=JSON.parse(old),out=JSON.parse(JSON.stringify(DS));
    if(d.player)out.player={...out.player,...d.player};
    ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent','kiroshiWeek','lastKiroshiXp','lastKiroshiIp','lastKiroshiDate'].forEach(k=>{if(d[k]!==undefined)out[k]=d[k];});
    ['dailies','weeklies','portfolio','memoire','poids','guitare','conduite','kiroshi'].forEach(k=>{
      if(d[k]&&Array.isArray(d[k]))out[k]=out[k].map(def=>{const sv=d[k].find(x=>x.id===def.id);if(!sv)return def;if(k==='weeklies')return {...def,done:!!sv.done,count:sv.count||(sv.done?1:0)};return {...def,done:!!sv.done};});
    });
    return out;
  }catch(e){return null;}
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    const braw=localStorage.getItem(BKEY);
    let snap=raw?JSON.parse(raw):null;
    // If main slot is empty or zeroed, try backup slot
    if(!_hasMeaningfulData(snap)&&braw){const bd=JSON.parse(braw);if(_hasMeaningfulData(bd))snap=bd;}
    if(snap){_applySnapshot(snap);}else{S=migrate()||JSON.parse(JSON.stringify(DS));}
  }catch(e){S=JSON.parse(JSON.stringify(DS));}
  if(!S.shop||S.shop.length<DS.shop.length)S.shop=DS.shop.map(def=>{const sv=(S.shop||[]).find(x=>x.id===def.id);return sv?{...def,bought:!!sv.bought}:{...def};});
  if(!S.weightLog)S.weightLog=[];
  if(!S.streakV){
    if(!S.lastStreakDate&&S.lastDate)S.lastStreakDate=S.lastDate;
    if(wasYesterday(S.lastStreakDate)||S.lastStreakDate===today())S.player.streak=(S.player.streak||0)+1;
    S.streakV=1;
  }
}

const _RETRY_DELAYS=[3000,6000,12000,24000,48000,90000];

function _score(d){if(!d||!d.player)return 0;return (d.player.xp||0)+(d.player.ip||0)+((d.totalDone||0)*10);}

    .then(r=>{

        _hideOfflineBanner();
        if(_wasOffline){_wasOffline=false;toast('BACKUP CLOUD MIS À JOUR','win');}

function today(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function weekId(){const d=new Date(),day=d.getDay()||7;d.setDate(d.getDate()+4-day);const y=d.getFullYear(),s=new Date(y,0,1);return y+'-W'+Math.ceil((((d-s)/86400000)+1)/7);}
function wasYesterday(dateStr){const y=new Date();y.setDate(y.getDate()-1);return dateStr===y.getFullYear()+'-'+p2(y.getMonth()+1)+'-'+p2(y.getDate());}

function checkReset(){
  const td=today(),wid=weekId();
  if(S.lastDate!==td){
    if(S.lastDate)S.daysPlayed=(S.daysPlayed||0)+1;
    // New month detection — must run before S.lastDate is updated
    if(S.lastDate&&S.lastDate.slice(0,7)!==td.slice(0,7)){
      const prevYm=S.lastDate.slice(0,7);
      const prevLog=(S.dailyTaskLog||[]).filter(e=>e.d.startsWith(prevYm));
      const days=prevLog.length;
      const avgD=days>0?Math.round((prevLog.reduce((s,e)=>s+e.count,0)/days)*10)/10:0;
      const ms=S.monthlyStats||{};const wkDone=ms.weeklyDone||{};
      const wkKeys=Object.keys(wkDone);const wkTotal=wkKeys.reduce((s,k)=>s+wkDone[k],0);
      const avgG=wkKeys.length>0?Math.round((wkTotal/wkKeys.length)*10)/10:0;
      S.lastMonthRecap={month:prevYm,maxStreak:ms.maxStreak||0,avgDailies:avgD,avgGigsPerWeek:avgG,
        tasksCompleted:ms.tasksCompleted||0,xpGained:ms.xpGained||0,xpLost:ms.xpLost||0,ipGained:ms.ipGained||0,ipLost:ms.ipLost||0};
      S.monthlyStats={xpGained:0,xpLost:0,ipGained:0,ipLost:0,tasksCompleted:0,maxStreak:0,weeklyDone:{}};
      S.showMonthRecap=true;
    }
    if(S.lastStreakDate&&S.lastStreakDate!==td&&!wasYesterday(S.lastStreakDate)){S.player.streak=0;S.streakMilestonesEarned=[];}
    S.dailies.forEach(d=>d.done=false);S.lastDate=td;
  }
  if(td.slice(0,7)!==S.iceProtocolMonth){S.iceProtocolUsed=0;S.iceProtocolMonth=td.slice(0,7);}
  if(S.lastWeekId!==wid){S.weeklies.forEach(w=>{w.done=false;w.count=0;});S.practiceWeek=0;S.conduiteWeek=0;S.portfolioWeek=0;S.memoireWeek=0;S.kiroshiWeek=0;S.lastWeekId=wid;}
  save();
}

function showLevelUp(lvl){
  const ov = document.createElement('div');
  ov.className = 'lvl-ov';

  const tCongrats = document.createElement('div');
  tCongrats.className = 'lvl-txt-congrats';
  tCongrats.textContent = 'CONGRATULATIONS';

  const tReach = document.createElement('div');
  tReach.className = 'lvl-txt-reach';
  tReach.textContent = "YOU'VE REACHED LEVEL";

  const halo = document.createElement('div');
  halo.className = 'cyber-hex-halo';
  halo.style.cssText = 'position:relative;width:240px;height:280px;overflow:visible;';

  const svgWrap = document.createElement('div');
  svgWrap.innerHTML = '<svg width="240" height="280" viewBox="-20 -25 240 280" style="overflow:visible;display:block"><defs><filter id="neon-glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/><feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/><feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b3"/><feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="scan" width="200" height="4" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="200" height="2" fill="rgba(252,238,10,0.18)"/></pattern><clipPath id="hex-clip"><polygon points="100,8 192,54 192,176 100,222 8,176 8,54"/></clipPath></defs><polygon points="100,8 192,54 192,176 100,222 8,176 8,54" fill="#0b1118"/><rect x="8" y="8" width="184" height="214" fill="url(#scan)" clip-path="url(#hex-clip)"/><polygon class="hex-neon-stroke" points="100,8 192,54 192,176 100,222 8,176 8,54" fill="none" stroke="#fcee0a" stroke-width="5" filter="url(#neon-glow)"/><polygon points="100.0,24.0 178.7,62.8 178.7,167.2 100.0,206.0 21.3,167.2 21.3,62.8" fill="none" stroke="#fcee0a" stroke-width="1.2" opacity="0.7"/><polygon points="100.0,18.0 183.7,59.5 183.7,170.5 100.0,212.0 16.3,170.5 16.3,59.5" fill="none" stroke="#fcee0a" stroke-width="2.5" opacity="0.5"/></svg>';
  halo.appendChild(svgWrap.firstChild);

  // Canvas pour l'animation glitch du chiffre
  const CW = 200, CH = 200;
  const glitchCanvas = document.createElement('canvas');
  glitchCanvas.width  = CW * 2; // retina
  glitchCanvas.height = CH * 2;
  glitchCanvas.style.cssText = 'width:' + CW + 'px;height:' + CH + 'px;';
  glitchCanvas.className = 'cyber-hex-canvas';
  halo.appendChild(glitchCanvas);

  const tChoom = document.createElement('div');
  tChoom.className = 'lvl-txt-choom';
  tChoom.textContent = 'KEEP UP CHOOM !';

  ov.appendChild(tCongrats);
  ov.appendChild(tReach);
  ov.appendChild(halo);
  ov.appendChild(tChoom);
  document.body.appendChild(ov);

  // ── Glitch engine ────────────────────────
  setTimeout(()=>{
    const gc  = glitchCanvas.getContext('2d');
    const GW  = glitchCanvas.width;
    const GH  = glitchCanvas.height;
    const TEXT = String(lvl);
    const FONT_SZ = 240;
    const FONT = '900 ' + FONT_SZ + 'px "Rajdhani", Arial Black, sans-serif';

    // Offscreen bitmap avec neon glow
    const ofc  = document.createElement('canvas');
    ofc.width  = GW; ofc.height = GH;
    const oCtx = ofc.getContext('2d');
    oCtx.shadowColor = '#00cfff';
    oCtx.shadowBlur  = 28;
    oCtx.font         = FONT;
    oCtx.textBaseline = 'middle';
    oCtx.textAlign    = 'center';
    oCtx.fillStyle    = '#00cfff';
    oCtx.fillText(TEXT, GW / 2, GH / 2);

    glitchCanvas.style.opacity = '1';

    const CLEAR_START = 2000;
    const CLEAR_END   = 2500;
    let startTime = null;

    function globalEnvelope(now) {
      const t = now - startTime;
      if (t >= CLEAR_START) return 0;
      const p = t / CLEAR_START;
      const eased = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      return 1 - eased;
    }

    let slices = [];
    function buildSlices(brokenness) {
      slices = [];
      const numCuts = 4 + Math.floor(brokenness * 16);
      const cuts = [0];
      for (let i = 0; i < numCuts; i++) cuts.push(Math.random() * GH);
      cuts.push(GH);
      cuts.sort((a,b) => a-b);
      for (let i = 0; i < cuts.length-1; i++) {
        const y0 = cuts[i], y1 = cuts[i+1];
        if (y1-y0 < 1) continue;
        const big = Math.random() < brokenness * 0.5;
        const dx = big ? (Math.random()-.5)*brokenness*GW*0.10 : (Math.random()-.5)*brokenness*14;
        const dy = big ? (Math.random()-.5)*brokenness*GH*0.22 : (Math.random()-.5)*brokenness*2;
        const alpha = big ? Math.max(0, 1-Math.random()*brokenness*1.4) : 1;
        const chroma = Math.random() < brokenness * 0.9;
        if (chroma && big) {
          slices.push({y0,y1,dx:dx+(Math.random()-.5)*14,dy:dy+(Math.random()-.5)*4,alpha:alpha*.85,r:255,g:0,b:0});
          slices.push({y0,y1,dx:dx-(Math.random()-.5)*14,dy:dy+(Math.random()-.5)*4,alpha:alpha*.85,r:0,g:255,b:255});
          if (Math.random()<0.4) slices.push({y0,y1,dx:dx+(Math.random()-.5)*22,dy,alpha:.7,r:220,g:255,b:0});
        } else {
          slices.push({y0,y1,dx,dy,alpha,r:255,g:255,b:255});
        }
      }
    }

    function drawFrame(intensity) {
      gc.clearRect(0,0,GW,GH);
      const baseAlpha = Math.max(0, 1 - intensity * 1.15);
      gc.globalAlpha = baseAlpha;
      gc.drawImage(ofc, 0, 0);
      gc.globalAlpha = 1;

      if (intensity > 0.005) {
        gc.globalCompositeOperation = 'screen';
        for (const s of slices) {
          const sy = Math.round(s.y0);
          const sh = Math.max(1, Math.round(s.y1-s.y0));
          const tmp = document.createElement('canvas');
          tmp.width = GW; tmp.height = sh;
          const tc = tmp.getContext('2d');
          tc.drawImage(ofc, 0, -sy);
          if (s.r !== 255 || s.g !== 255 || s.b !== 255) {
            tc.globalCompositeOperation = 'source-atop';
            tc.fillStyle = 'rgb('+s.r+','+s.g+','+s.b+')';
            tc.fillRect(0,0,GW,sh);
          }
          gc.globalAlpha = s.alpha;
          gc.drawImage(tmp, s.dx, sy+s.dy, GW, sh);
        }
        gc.globalCompositeOperation = 'source-over';
        gc.globalAlpha = 1;
        if (intensity > 0.2) {
          const nLines = Math.floor(intensity * 10);
          gc.fillStyle = 'rgba(0,207,255,0.03)';
          for (let i = 0; i < nLines; i++) gc.fillRect(0, Math.random()*GH, GW, 1+Math.random()*2);
        }
      }
    }

    const PH = {IDLE:0,BREAKING:1,HOLD:2,REASSEMBLE:3};
    let phase=PH.IDLE, phaseStart=0, intensity=0, idleDuration=0;
    let microTimer=0, microIntensity=0;
    function computeIdle(env){ return (100+Math.random()*300)+(1-env)*(700+Math.random()*2700); }

    let lastNow = null;
    let rafId = null;

    function update(now) {
      if (!startTime) startTime = now;
      const dt = lastNow ? now-lastNow : 0;
      lastNow = now;
      const env = globalEnvelope(now);

      if (now-startTime > CLEAR_END) {
        cancelAnimationFrame(rafId);
        gc.clearRect(0,0,GW,GH);
        gc.shadowColor = '#00cfff';
        gc.shadowBlur  = 30;
        gc.font        = FONT;
        gc.textBaseline = 'middle';
        gc.textAlign   = 'center';
        gc.fillStyle   = '#00cfff';
        gc.fillText(TEXT, GW/2, GH/2);
        return;
      }

      switch(phase) {
        case PH.IDLE:
          microTimer -= dt;
          if (microTimer <= 0) {
            microIntensity = env*(0.04+Math.random()*0.12);
            if (env<0.1) microIntensity*=0.3;
            microTimer = 50+Math.random()*150;
          } else { microIntensity *= 0.80; }
          intensity = microIntensity;
          if (now-phaseStart > idleDuration) {
            if (env>0.05) { phase=PH.BREAKING; phaseStart=now; }
            else { phaseStart=now; idleDuration=computeIdle(env); }
          }
          break;
        case PH.BREAKING:
          const breakDur=80+Math.random()*120;
          const raw=(now-phaseStart)/breakDur;
          intensity=Math.min(1,raw)*env;
          if (raw>=1){ phase=PH.HOLD; phaseStart=now; }
          break;
        case PH.HOLD:
          intensity=env;
          const holdDur=50+Math.random()*200*env;
          if (now-phaseStart>holdDur){ phase=PH.REASSEMBLE; phaseStart=now; }
          break;
        case PH.REASSEMBLE:
          const dur=150+Math.random()*250;
          intensity=Math.max(0,env-(now-phaseStart)/dur*env);
          if (now-phaseStart>=dur){ phase=PH.IDLE; phaseStart=now; idleDuration=computeIdle(env); intensity=0; }
          break;
      }

      if (intensity>0.008) buildSlices(intensity);
      else slices=[];

      drawFrame(intensity);
      rafId = requestAnimationFrame(update);
    }

    rafId = requestAnimationFrame(update);
  }, 0);

  const _dismiss=()=>{if(ov.parentNode)ov.remove();};
  ov.onclick=_dismiss;
  ov.addEventListener('touchstart',(e)=>{e.preventDefault();_dismiss();},{passive:false});
  setTimeout(_dismiss, 4000);
}

const _gigLP={};
function _gigReset(id){
  const st=_gigLP[id];if(!st)return;
  clearTimeout(st.tmr);
  const f=document.getElementById('lpfill-'+id);
  if(f){if(st.endListener)f.removeEventListener('animationend',st.endListener);f.style.animation='none';}
  const c=document.getElementById('task-'+id);if(c)c.classList.remove('gig-hold');
  delete _gigLP[id];
}
function gigDown(id,e){
  _gigLP[id]={t:Date.now(),done:false,cx:e.clientX||0,cy:e.clientY||0,moved:false};
  const card=document.getElementById('task-'+id);
  const f=document.getElementById('lpfill-'+id);
  if(f){
    const rect=card?card.getBoundingClientRect():null;
    const gx=rect?Math.round(((e.clientX||0)-rect.left)/rect.width*100):50;
    const gy=rect?Math.round(((e.clientY||0)-rect.top)/rect.height*100):50;
    f.style.setProperty('--gx',gx+'%');
    f.style.setProperty('--gy',gy+'%');
    f.style.animation='none';void f.offsetWidth;
    f.style.animation='gigLpFill 1s ease-out forwards';
    const onEnd=()=>{
      f.removeEventListener('animationend',onEnd);
      const st=_gigLP[id];
      if(st&&!st.moved){
        st.done=true;
        f.style.animation='none';
        if(card)card.classList.remove('gig-hold');
        delete _gigLP[id];
        gigSub(id);
      }
    };
    f.addEventListener('animationend',onEnd);
    _gigLP[id].endListener=onEnd;
  }
  if(card)card.classList.add('gig-hold');
  _gigLP[id].tmr=setTimeout(()=>{
    const st=_gigLP[id];
    if(st&&!st.moved&&!st.done){st.done=true;_gigReset(id);gigSub(id);}
  },1600);
}
function gigMove(id,e){
  const st=_gigLP[id];if(!st)return;
  if(Math.abs((e.clientX||0)-st.cx)>8||Math.abs((e.clientY||0)-st.cy)>8){st.moved=true;_gigReset(id);}
}
function gigUp(id){_gigReset(id);}
function gigTap(id,e){
  const st=_gigLP[id];delete _gigLP[id];
  if(st&&(st.done||st.moved))return;
  gigAdd(id,e);
}

function gigSub(id){

function tTask(type,id,e,action){
  const it=S[type].find(d=>d.id===id);if(!it)return;
  const el=document.getElementById('task-'+id);
  if(!it.done){
    it.done=true;addXP(it.xp);S.player.ip+=it.ip;S.totalDone=(S.totalDone||0)+1;
    const taskDate=today();
    if(!S.dailyTaskLog)S.dailyTaskLog=[];
    const dle=S.dailyTaskLog.find(x=>x.d===taskDate);
    if(dle)dle.count++;else S.dailyTaskLog.push({d:taskDate,count:1});
    if(!S.monthlyStats)S.monthlyStats={xpGained:0,xpLost:0,ipGained:0,ipLost:0,tasksCompleted:0,maxStreak:0,weeklyDone:{}};
    S.monthlyStats.xpGained=(S.monthlyStats.xpGained||0)+it.xp;
    S.monthlyStats.ipGained=(S.monthlyStats.ipGained||0)+it.ip;
    S.monthlyStats.tasksCompleted=(S.monthlyStats.tasksCompleted||0)+1;
    if(S.player.streak>(S.monthlyStats.maxStreak||0))S.monthlyStats.maxStreak=S.player.streak;
    if(type==='dailies'){
      if(S.lastStreakDate!==taskDate){
        S.player.streak=wasYesterday(S.lastStreakDate)?(S.player.streak||0)+1:1;
        S.lastStreakDate=taskDate;
        const mils=[{n:7,xp:150,ip:100},{n:15,xp:350,ip:250},{n:30,xp:800,ip:600}];
        mils.forEach(m=>{
          if(S.player.streak>=m.n&&!(S.streakMilestonesEarned||[]).includes(m.n)){
            if(!S.streakMilestonesEarned)S.streakMilestonesEarned=[];
            S.streakMilestonesEarned.push(m.n);
            addXP(m.xp);S.player.ip+=m.ip;
            setTimeout(()=>toast(m.n+'-DAY STREAK! +'+m.xp+' REP  +'+m.ip+' E$','win'),700);
          }
        });
        save();rHdr();triggerStreakAnim();
      }
    }
    showGain(it.xp,it.ip,e);save();rHdr();
    if(el){el.classList.add('dn');el.classList.add('anim-lock');setTimeout(()=>{el.classList.remove('anim-lock');},2700);}
    updateCount(type);
  }else{
    it.done=false;subXP(it.xp);S.player.ip=Math.max(0,S.player.ip-it.ip);
    S.totalDone=Math.max(0,(S.totalDone||0)-1);
    const taskDate2=today();const dle2=(S.dailyTaskLog||[]).find(x=>x.d===taskDate2);
    if(dle2&&dle2.count>0)dle2.count--;
    if(!S.monthlyStats)S.monthlyStats={xpGained:0,xpLost:0,ipGained:0,ipLost:0,tasksCompleted:0,maxStreak:0,weeklyDone:{}};
    S.monthlyStats.xpLost=(S.monthlyStats.xpLost||0)+it.xp;
    S.monthlyStats.ipLost=(S.monthlyStats.ipLost||0)+it.ip;
    save();rHdr();
    if(el)el.classList.remove('dn');
    updateCount(type);
  }
}

const _CB_ORDER_DEFAULT=['portfolio','memoire','silverhand','conduite','biometrie','kiroshi'];
let _cbDrag=null,_cbDragJustEnded=false;
function cbDragInit(key,e){
  if(_cbDrag)return;
  _cbDrag={key,startY:e.clientY,active:false,insertIdx:undefined};
  _cbDrag.longTmr=setTimeout(()=>{
    if(!_cbDrag)return;
    _cbDrag.active=true;
    const el=document.getElementById('cb-'+key);
    if(el){_cbDrag.cardH=el.getBoundingClientRect().height;el.style.transition='none';el.style.position='relative';el.style.zIndex='50';el.style.filter='brightness(0.78)';}
    document.addEventListener('pointermove',cbDragMove,{passive:false});
    document.addEventListener('pointerup',cbDragEnd);
    document.addEventListener('pointercancel',cbDragEnd);
    if(navigator.vibrate)navigator.vibrate(25);
  },600);
}
function cbDragCancel(e){
  if(!_cbDrag||_cbDrag.active)return;
  if(e.type==='pointermove'&&Math.abs(e.clientY-_cbDrag.startY)<=12)return;
  clearTimeout(_cbDrag.longTmr);_cbDrag=null;
}
function cbDragMove(e){
  if(!_cbDrag||!_cbDrag.active)return;
  e.preventDefault();
  const dy=e.clientY-_cbDrag.startY;
  const el=document.getElementById('cb-'+_cbDrag.key);
  if(el)el.style.transform='translateY('+dy+'px)';
  const order=(S.mainOrder&&S.mainOrder.length===_CB_ORDER_DEFAULT.length)?[...S.mainOrder]:[..._CB_ORDER_DEFAULT];
  const fromIdx=order.indexOf(_cbDrag.key);
  const filtered=order.filter(k=>k!==_cbDrag.key);
  const elR=el?el.getBoundingClientRect():null;
  const mid=elR?elR.top+elR.height/2:e.clientY;
  let ins=filtered.length;
  for(let i=0;i<filtered.length;i++){
    const oe=document.getElementById('cb-'+filtered[i]);
    if(!oe)continue;
    const r=oe.getBoundingClientRect();
    if(mid<r.top+r.height/2){ins=i;break;}
  }
  _cbDrag.insertIdx=ins;
  const h=(_cbDrag.cardH||0)+12;
  filtered.forEach((k)=>{
    const oe=document.getElementById('cb-'+k);if(!oe)return;
    oe.style.transition='transform .18s ease';
    const origIdx=order.indexOf(k);
    let shift=0;
    if(fromIdx<ins){if(origIdx>fromIdx&&origIdx<=ins)shift=-h;}
    else if(fromIdx>ins){if(origIdx>=ins&&origIdx<fromIdx)shift=h;}
    oe.style.transform='translateY('+shift+'px)';
  });
}
function cbDragEnd(){
  if(!_cbDrag)return;
  clearTimeout(_cbDrag.longTmr);
  document.removeEventListener('pointermove',cbDragMove);
  document.removeEventListener('pointerup',cbDragEnd);
  document.removeEventListener('pointercancel',cbDragEnd);
  const {key,active,insertIdx}=_cbDrag;_cbDrag=null;
  document.querySelectorAll('[id^="cb-"]').forEach(c=>{c.style.transform='';c.style.transition='';c.style.filter='';c.style.zIndex='';c.style.position='';});
  if(!active)return;
  _cbDragJustEnded=true;setTimeout(()=>{_cbDragJustEnded=false;},400);
  if(insertIdx!==undefined){
    const order=[...((S.mainOrder&&S.mainOrder.length===_CB_ORDER_DEFAULT.length)?S.mainOrder:_CB_ORDER_DEFAULT)];
    const fromIdx=order.indexOf(key);
    if(fromIdx!==-1){
      order.splice(fromIdx,1);
      order.splice(Math.max(0,Math.min(order.length,insertIdx)),0,key);
      S.mainOrder=order;save();
    }
  }
  rCamps();
}

function rCamps(){
  const pLoss=(S.weightStart&&S.weightCurrent)?Math.max(0,S.weightStart-S.weightCurrent):0;
  const gActive=S.guitare.find(g=>!g.done);const blks={};
  
  // ── BIOMETRICS EN PREMIER ──
  const wLog=(S.weightLog||[]).slice(-10);let chartSvg='';
  if(wLog.length>=2){
    const vals=wLog.map(e=>e.v);
    const mn=Math.min(...vals)-0.5, mx=Math.max(...vals)+0.5;
    const W=340, H=110, PAD=22; 
    const toX=(i)=>PAD+(i/(vals.length-1))*(W-PAD*2);
    const toY=(v)=>H-35-((v-mn)/(mx-mn))*(H-50);
    const pts=vals.map((v,i)=>toX(i)+','+toY(v)).join(' ');
    const fillPts=toX(0)+','+(H)+' '+pts+' '+toX(vals.length-1)+','+(H);

    const mkLbl=(x,y,val,dStr,anchor)=>{
      // anchor='start' = premier point (gauche), anchor='end' = dernier point (droite)
      let ta = anchor==='start'?'start':'end';
      let dx = anchor==='start'? 6 : -6;
      let dForm = dStr;
      if(dStr && dStr.includes('-')){
        let p = dStr.split('-');
        dForm = p[2]+'/'+p[1];
      }
      return '<g transform="translate('+(x+dx)+','+(y+18)+')">'
      +'<text x="0" y="0" font-size="14" fill="#00cfff" font-weight="900" text-anchor="'+ta+'" font-family="Rajdhani,sans-serif">'+val.toFixed(1)+'</text>'
      +'<text x="0" y="12" font-size="10" fill="#6b7d8f" font-weight="700" text-anchor="'+ta+'" font-family="Rajdhani,sans-serif">'+dForm+'</text>'
      +'</g>';
    };

    let innerMinMax = '';
    let actualMax = Math.max(...vals);
    let actualMin = Math.min(...vals);
    let maxDrawn=false, minDrawn=false;
    
    for(let i=1; i<vals.length-1; i++){
      if(vals[i] === actualMax && !maxDrawn){
         innerMinMax += '<text x="'+toX(i)+'" y="'+(toY(vals[i])-8)+'" font-size="10" fill="#00cfff" opacity="0.8" font-weight="800" text-anchor="middle" font-family="Rajdhani,sans-serif">'+vals[i].toFixed(1)+'</text>';
         maxDrawn=true;
      }
      if(vals[i] === actualMin && !minDrawn && vals[i] !== actualMax){
         innerMinMax += '<text x="'+toX(i)+'" y="'+(toY(vals[i])+14)+'" font-size="10" fill="#00cfff" opacity="0.8" font-weight="800" text-anchor="middle" font-family="Rajdhani,sans-serif">'+vals[i].toFixed(1)+'</text>';
         minDrawn=true;
      }
    }

function adjustW(delta){
  const inp=document.getElementById('winp');
  const cur=parseFloat(inp.value)||S.weightCurrent||80;
  inp.value=(Math.round((cur+delta)*10)/10).toFixed(1);
}
function logW(e){
  const v=parseFloat(document.getElementById('winp').value);
  if(isNaN(v)||v<30||v>300){toast('INVALID MASS','err');return;}
  if(!S.weightStart)S.weightStart=v;S.weightCurrent=v;
  if(!S.weightLog)S.weightLog=[];S.weightLog.push({d:today(),v:v});
  if(S.weightLog.length>30)S.weightLog=S.weightLog.slice(-30);
  const loss=Math.max(0,(S.weightStart||v)-v);
  S.poids.forEach(m=>{if(!m.done&&loss>=m.kg){m.done=true;addXP(m.xp);S.player.ip+=m.ip;showGain(m.xp,m.ip,e);}});
  save();rCamps();rHdr();toast('BIOMETRICS UPDATED');
}
function logG(min,e){
  const xp=min>=30?15:min>=20?10:min>=15?7:5,ip=min>=30?5:0;
  addXP(xp);S.player.ip+=ip;S.practiceWeek=(S.practiceWeek||0)+1;
  S.lastGuitarXp=xp;S.lastGuitarIp=ip;S.lastGuitarMin=min;S.lastGuitarDate=today();
  save();rCamps();rHdr();showGain(xp,ip,e);
}
function undoG(){
  if(!(S.practiceWeek>0)){toast('NO SESSION TO CANCEL','err');return;}
  const xp=S.lastGuitarXp||5,ip=S.lastGuitarIp||0;

}

      bonusXp+=m.xp;bonusIp+=m.ip;
      setTimeout(()=>toast((m.n>=1000?(m.n/1000)+'K':m.n)+' PHOTOS — +'+m.xp+' REP +'+m.ip+' E$','win'),300);
    }
  });
  if(bonusXp>0){addXP(bonusXp);S.player.ip+=bonusIp;}
  if(inp)inp.value='';
  save();rCamps();rHdr();
}
function undoKiroshiPhotos(){
  const n=S.lastKiroshiPhotosAdded||0;
  if(!n){toast('RIEN À ANNULER','err');return;}
  const after=S.kiroshiPhotos||0;
  const before=Math.max(0,after-n);
  S.kiroshiPhotos=before;
  S.lastKiroshiPhotosAdded=0;
  const lost=(S.kiroshiPhotoMilestones||[]).filter(reached=>reached>before&&reached<=after);
  lost.forEach(reached=>{
    const m=_KP_MILESTONES.find(mm=>mm.n===reached);
    if(m){subXP(m.xp);S.player.ip=Math.max(0,S.player.ip-m.ip);}
    S.kiroshiPhotoMilestones=S.kiroshiPhotoMilestones.filter(x=>x!==reached);
  });
  save();rCamps();rHdr();toast('-'+n+' PHOTOS ANNULÉES','err');
}
function undoM(){
  if(!(S.memoireWeek>0)){toast('NO SESSION TO CANCEL','err');return;}
  const xp=S.lastMemoireXp||18,ip=S.lastMemoireIp||12;
  const dt=S.lastMemoireDate||'';
  const dtFmt=dt?dt.split('-').reverse().slice(0,2).join('/'):'';
  subXP(xp);
  S.player.ip=Math.max(0,S.player.ip-ip);
  S.memoireWeek=Math.max(0,S.memoireWeek-1);
  S.lastMemoireXp=0;S.lastMemoireIp=0;S.lastMemoireDate='';
  save();rCamps();rHdr();toast('SESSION CANCELED'+(dtFmt?' / '+dtFmt:''),'err');
}

      }

  }

  const arrowEl=document.getElementById('shop-acc-arrow');
  if(arrowEl)arrowEl.style.transform=showShopItems?'rotate(180deg)':'rotate(0deg)';

  // NOUVELLES CATÉGORIES ICI
  const cats=[{id:'all',l:'ALL'},{id:'fun',l:'FUN'},{id:'gear',l:'GEAR'},{id:'body',l:'BODY'},{id:'out',l:'OUT'},{id:'travel',l:'TRAVEL'}];

  if(showShopItems){
    h+='<div class="shop-filters">'+cats.map(c=>'<button class="sfb'+(shopFilter===c.id?' on':'')+'" onclick="setShopFilter(\''+c.id+'\')">'+c.l+'</button>').join('')+'</div>';
    const filteredItems=S.shop.filter(s=>{
      if(s.bought)return false;
      const matchCat=(shopFilter==='all'||s.cat===shopFilter);

      if(searchQ===''){matchSearch=true;}
      else if(isNumSearch){matchSearch=s.cost<=searchNum;}
      else{matchSearch=s.desc.toLowerCase().includes(searchQ)||s.t.toLowerCase().includes(searchQ);}
      return matchCat&&matchSearch;
    }).sort((a,b)=>a.cost-b.cost);
    if(filteredItems.length===0&&searchQ!==''){
      h+='<div class="no-results"><span>⚠</span>NO MATCHING FILES IN DATABASE</div>';
    }else{
      h+=filteredItems.map(s=>{

      h+='</div>';
    }
  }
  document.getElementById('sl').innerHTML=h;

function useItem(id){

  el.classList.add('using');

    S.consumed.push({id:it.id,t:it.t,desc:it.desc,usedAt:Date.now()});

function useMystery(uid){
  const el=document.querySelector('[data-mid="'+uid+'"]'),idx=(S.mysteryPending||[]).findIndex(r=>r.uid===uid);
  if(idx===-1)return;
  const r=S.mysteryPending[idx];
  if(el)el.classList.add('using');
  if(r.ip>0)S.player.ip+=r.ip;
  if(r.ip<0)S.player.ip=Math.max(0,S.player.ip+r.ip);
  if(r.xp)addXP(r.xp);
  S.mysteryPending.splice(idx,1);
  save();rShop();rHdr();
  if(r.type==='error'){showBadLuckOverlay();}else{showUsedOverlay(r.desc);}
}

function rStats(){
  const p=S.player,need=p.level*100,xpPct=Math.min(100,Math.round(p.xp/need*100));
  const catMap={
    portfolio:{name:'PORTFOLIO',cls:'cat-portfolio',items:S.portfolio},
    memoire:{name:'THESIS',cls:'cat-memoire',items:S.memoire},
    silverhand:{name:'SILVERHAND',cls:'cat-guitar',items:S.guitare},
    conduite:{name:'NOMAD DRIVER',cls:'cat-conduite',items:S.conduite},
    kiroshi:{name:'KIROSHI',cls:'cat-kiroshi',items:S.kiroshi},
    biometrie:{name:'BIOMETRICS',cls:'cat-bio',items:S.poids},
  };
  const campOrder=(S.mainOrder&&S.mainOrder.length===_CB_ORDER_DEFAULT.length)?S.mainOrder:_CB_ORDER_DEFAULT;
  const cats=campOrder.map(k=>catMap[k]).filter(Boolean);
  const activeCats=cats.filter(c=>c.items.length===0||!c.items.every(i=>i.done));
  const doneCats=cats.filter(c=>c.items.length>0&&c.items.every(i=>i.done));
  // ── Daily activity chart — full month ──
  const td=today(),ym=td.slice(0,7),todayDay=parseInt(td.slice(8,10));
  const daysInMonth=new Date(parseInt(ym.slice(0,4)),parseInt(ym.slice(5,7)),0).getDate();
  const log=S.dailyTaskLog||[];
  const mLog=log.filter(e=>e.d.startsWith(ym));
  const maxC=Math.max(1,...mLog.map(e=>e.count));
  const monthLabel=ym.replace('-','.');
  const barMaxH=44;
  let h='<div class="st-hero"><div class="st-hero-left"><div class="st-hero-label">STREET CRED</div><div class="st-hero-lv">'+p.level+'</div></div><div class="st-hero-right"><div class="st-hero-class">CORPO CLASS</div><div class="st-hero-xp">'+p.xp+' / '+need+' REP</div><div class="st-hero-xpbar"><div class="st-hero-xpfill" style="width:'+xpPct+'%"></div></div></div></div>';
  h+='<div class="st-section-title">DAILY ACTIVITY — '+monthLabel+'</div>';
  h+='<div style="display:flex;gap:2px;align-items:flex-end;padding:0 0 4px;margin-bottom:16px">';
  for(let day=1;day<=daysInMonth;day++){
    const ds=ym+'-'+String(day).padStart(2,'0');
    const entry=log.find(x=>x.d===ds);
    const cnt=entry?entry.count:0;
    const isFuture=day>todayDay;
    const barH=cnt>0?Math.max(3,Math.round((cnt/maxC)*barMaxH)):2;
    const isWeekMark=day%7===0;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end'+(isWeekMark?';border-right:1px solid rgba(255,255,255,.08)':'')+'">'+
      (cnt>0?'<div style="font-size:7px;font-weight:800;color:var(--cy);line-height:1;margin-bottom:2px">'+cnt+'</div>':'')+
      '<div style="width:100%;height:'+barH+'px;background:'+(cnt>0?'var(--cy)':isFuture?'rgba(255,255,255,.03)':'rgba(255,255,255,.06)')+'"></div>'+
      '</div>';
  }
  h+='</div>';

  // ── Streak milestones ──
  const sk=S.player.streak||0,earned=S.streakMilestonesEarned||[];
  const mils=[{n:7,xp:150,ip:100,col:'var(--cy)'},{n:15,xp:350,ip:250,col:'#c084fc'},{n:30,xp:800,ip:600,col:'var(--y)'}];
  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  mils.forEach(m=>{
    const isDone=earned.includes(m.n);
    const pct=Math.min(100,Math.round((sk/m.n)*100));
    const bg=isDone?'var(--gn)':'rgba(255,255,255,.05)';
    const brd=isDone?'var(--gn)':'rgba(255,255,255,.1)';
    const txtMain=isDone?'#000':m.col;
    const txtSub=isDone?'rgba(0,0,0,0.65)':'rgba(255,255,255,.4)';
    h+='<div style="flex:1;background:'+bg+';border:1px solid '+brd+';padding:5px 4px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);position:relative;overflow:hidden">'+
      (isDone?'':`<div style="position:absolute;bottom:0;left:0;width:${pct}%;height:3px;background:${m.col};opacity:.7"></div>`)+
      '<div style="display:flex;align-items:baseline;justify-content:center;gap:3px">'+
      '<span style="font-size:12px;font-weight:900;color:'+txtMain+';line-height:1">'+m.n+'</span>'+
      '<span style="font-size:7px;font-weight:700;color:'+txtMain+';opacity:.8;letter-spacing:.5px">days</span>'+
      '</div>'+
      '<div style="font-size:7px;font-weight:800;color:'+txtSub+';letter-spacing:.3px;text-align:center;margin-top:1px">+'+m.xp+'REP +'+m.ip+'E$</div>'+
      '</div>';
  });
  h+='</div>';

  h+=[...activeCats,...doneCats].map(c=>{
    const done=c.items.filter(e=>e.done),d=done.length,t=c.items.length;
    const cpct=t>0?Math.round((d/t)*100):0;
    const catXp=done.reduce((s,e)=>s+(e.xp||0),0),catIp=done.reduce((s,e)=>s+(e.ip||0),0);
    return '<div class="scamp '+c.cls+'"><div class="scamp-left"><div class="scamp-top"><div class="scamp-name">'+c.name+'</div><div class="scamp-inline-meta"><span class="sim-rep">+'+catXp+' REP</span><span class="sim-funds">E$ +'+catIp+'</span></div></div>'+buildSegs(d,t)+'</div><div class="scamp-pct">'+cpct+'%</div></div>';
  }).join('');

  h+='<div style="display:flex;gap:8px;margin-top:20px"><button onclick="exportData()" style="flex:1;background:rgba(0,207,255,.12);border:1px solid rgba(0,207,255,.3);color:rgba(0,207,255,.9);padding:14px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)">EXPORT DATA</button><button onclick="importData()" style="flex:1;background:rgba(0,207,255,.12);border:1px solid rgba(0,207,255,.3);color:rgba(0,207,255,.9);padding:14px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)">IMPORT DATA</button></div>';
  h+='<div style="margin-top:8px;padding-bottom:4px"><button onclick="resetAll()" style="width:100%;background:rgba(160,0,28,0.45);border:1px solid rgba(255,0,60,0.3);color:rgba(255,140,140,0.85);padding:14px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)">SYSTEM PURGE — RESET ALL DATA</button></div>';
  document.getElementById('st-all').innerHTML=h;
}

function _cpCode(){
  const ta=document.getElementById('exp-ta');if(!ta)return;
  const txt=ta.value;ta.select();
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(txt):Promise.reject())
    .then(()=>toast('CODE COPIÉ ✓','win'))
    .catch(()=>{try{document.execCommand('copy');toast('CODE COPIÉ ✓','win');}catch(e){toast('Sélectionne et copie manuellement','err');}});
}
function _cpLink(){

let _snRaf=null,_snPhase=0,_snLastTs=null,_snInFlicker=false,_snNextFlicker=5e3,_snElapsed=0,_snGI=1,_snOn=false;
function _snBuild(gi){
  if(!_snOn)return;
  const el=document.getElementById('nb-s');
  if(!el||!el.classList.contains('on'))return;
  const i=Math.max(0,Math.min(1.05,gi)),i2=i*i,i3=i2*i;
  const bi=i*(2/3),bi2=bi*bi,bi3=bi2*bi;
  
  el.style.color = '#00cfff';

  el.style.textShadow=[
    `0 0 2px rgba(255,255,255,${+(0.95*i).toFixed(3)})`,
    `0 0 7px rgba(0,207,255,${+(1.0*i).toFixed(3)})`,
    `0 0 15px rgba(0,207,255,${+(0.90*i2).toFixed(3)})`,
    `0 0 28px rgba(0,207,255,${+(0.72*i2).toFixed(3)})`,
    `0 0 46px rgba(0,207,255,${+(0.46*i3).toFixed(3)})`,
  ].join(',');

  el.style.boxShadow=[
    `0 0 7px rgba(0,207,255,${+(0.65*bi).toFixed(3)})`,
    `0 0 18px rgba(0,207,255,${+(0.42*bi2).toFixed(3)})`,
    `0 0 35px rgba(0,207,255,${+(0.22*bi3).toFixed(3)})`,
    `inset 0 0 10px rgba(0,207,255,${+(0.55*bi).toFixed(3)})`,
    `inset 0 0 22px rgba(0,207,255,${+(0.30*bi2).toFixed(3)})`,
  ].join(',');
}
  function _snBreathe(ts){
  if(!_snLastTs)_snLastTs=ts;
  const dt=Math.min(ts-_snLastTs,50);_snLastTs=ts;
  _snPhase+=dt*0.00032;_snElapsed+=dt;
  if(!_snInFlicker){const noise=(Math.random()-0.5)*0.10;_snGI=Math.max(0.52,Math.min(1.0,0.74+0.26*(0.5+0.5*Math.sin(_snPhase))+noise));_snBuild(_snGI);}
  if(_snElapsed>=_snNextFlicker&&!_snInFlicker){_snElapsed=0;_snNextFlicker=2e3+Math.random()*6e3;_snFlicker();}
  _snRaf=requestAnimationFrame(_snBreathe);
}
function _snFlicker(){
  _snInFlicker=true;
  const r=Math.random();let seq;
  if(r<0.35)seq=[[0.05,20],[0.92,28],[0.05,14],[1.0,55]];
  else if(r<0.65){
    seq=[];const n=2+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){seq.push([0.05+Math.random()*.15,18+Math.random()*40]);seq.push([0.85+Math.random()*.15,28+Math.random()*55]);}
    seq.push([1.0,80]);
  }else{
    seq=[];for(let v=1;v>0.08;v-=0.1+Math.random()*.08)seq.push([Math.max(0.02,v),25+Math.random()*35]);
    seq.push([0.02,25],[0.4,18],[0.02,12],[1.0,70]);
  }
  _snRunSeq(seq,0,()=>{_snInFlicker=false;});
}
function _snRunSeq(seq,idx,done){
  if(idx>=seq.length){done();return;}
  _snBuild(seq[idx][0]);
  setTimeout(()=>_snRunSeq(seq,idx+1,done),seq[idx][1]);
}
function initShopNeon(){
  stopShopNeon();_snOn=true;if(window._startOpFlicker)_startOpFlicker();
  _snLastTs=null;_snPhase=0;_snElapsed=0;_snInFlicker=true;
  _snNextFlicker=1e3+Math.random()*2e3;
  const pow=[[0,18],[0.95,28],[0.15,18],[1.0,32],[0.35,16],[0.0,14],[1.0,42],[0.55,18],[1.0,65]];
  _snBuild(0);
  _snRunSeq(pow,0,()=>{_snInFlicker=false;_snRaf=requestAnimationFrame(_snBreathe);});
}

// autoMode=true : s'exécute au démarrage — restaure UNIQUEMENT si données locales nulles
// autoMode=false : initié par l'utilisateur — restaure toujours le meilleur snapshot cloud
function pullFromCloud(autoMode){
  if(!autoMode){document.getElementById('sytx').textContent='PULLING...';setSy('synching');}
  fetch(SURL)
    .then(r=>r.json())
    .then(resp=>{
      // Préférer current (dernier push) directement — sans comparaison de score
      // Les snapshots historiques peuvent avoir un score plus élevé (plus de totalDone)
      // et écraser des données récentes avec streak correct
      let best=null,bestScore=-1;
      function _try(d){if(!d||!d.player)return;const sc=_score(d);if(sc>bestScore){bestScore=sc;best=d;}}
      if(resp&&resp.current&&resp.current.player&&_hasMeaningfulData(resp.current)){
        best=resp.current;bestScore=_score(resp.current);
      }else if(resp&&(resp.current!==undefined||resp.snapshots)){
        _try(resp.current);
        (resp.snapshots||[]).forEach(s=>_try(s&&s.data));
      }else if(resp&&resp.player){
        _try(resp);
      }

      const localEmpty=!_hasMeaningfulData(S);

      if(autoMode&&!localEmpty){
        // Mode auto : données locales présentes → ne rien écraser, juste syncer si besoin
        setSy('synched');
        return;
      }

      if(best&&bestScore>0){
        S=best;
        const snap=JSON.stringify(S);
        localStorage.setItem(KEY,snap);
        localStorage.setItem(BKEY,snap);
        localStorage.removeItem('cp_sync_pending');
        prevIp=S.player.ip;prevXp=S.player.xp;
        checkReset();rHdr();
        setTimeout(()=>alert('DEBUG CLOUD\nstreak dans cloud: '+_dbgStreak+'\nlastStreakDate: '+_dbgDate+'\nstreak après checkReset: '+S.player.streak+'\nlastDate cloud: '+(best&&best.lastDate||'?')),800);
        const activeTab=document.querySelector('.nb.on');
        if(activeTab)go(activeTab.id.replace('nb-',''));
        setSy('synched');_hideOfflineBanner();
        toast(localEmpty?'DONNÉES RESTAURÉES DEPUIS LE CLOUD ✓':'BACKUP CLOUD RESTAURÉ ✓','win');
      }else{
        setSy('synched');
        if(!autoMode)toast('AUCUN BACKUP CLOUD DISPONIBLE','err');
      }
    })
    .catch(()=>{setSy('offline');if(_hasMeaningfulData(S))_showOfflineBanner();});
}

let _opActive=false;
(function(){

    const dim=(0.60+Math.random()*0.12).toFixed(3);
    const downDur=80+Math.random()*420;
    const holdDur=60+Math.random()*640;
    const upDur=120+Math.random()*480;
    ease(dim,downDur,()=>{
      setTimeout(()=>{
        ease('1',upDur,()=>{
          if(Math.random()<0.25){
            const delay2=100+Math.random()*800;
            setTimeout(()=>{
              const dim2=(0.65+Math.random()*0.12).toFixed(3);
              ease(dim2,60+Math.random()*180,()=>{
                setTimeout(()=>ease('1',100+Math.random()*300,schedule),80+Math.random()*300);
              });
            },delay2);
          }else{
            schedule();
          }
        });
      },holdDur);
    });
  }
  window._startOpFlicker=function(){_opActive=true;schedule();};
  window._stopOpFlicker=function(){_opActive=false;btn.style.opacity='1';};
})();
</script>
</body>
