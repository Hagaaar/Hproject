<style>

html, body { height: 100%; overflow: hidden; background-color: var(--cp-bg); background-image: radial-gradient(rgba(252, 238, 10, 0.15) 1px, transparent 1px); background-size: 24px 24px; color: var(--cp-text); }
body { font-family: 'Rajdhani', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
#app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }

.h-top { font-size: 12px; font-weight: 700; opacity: 0.8; margin-bottom: 10px; letter-spacing: 1px; }
.sync-status { position: absolute; top: 15px; right: 20px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 5px; letter-spacing: 1px; }
.sync-dot { width: 6px; height: 6px; background: #000; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
.sync-status.synching .sync-dot { animation: blink 0.8s infinite; }
.sync-status.offline { color: var(--cp-red); }
.sync-status.offline .sync-dot { background: var(--cp-red); }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.h1 { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
.h-name { font-size: 28px; font-weight: 700; line-height: 1; }
.h-lv { font-size: 13px; font-weight: 600; opacity: 0.7; }
.h-right { text-align: right; }
.h-ip { font-size: 22px; font-weight: 700; line-height: 1.1; }
.h-streak { font-size: 12px; font-weight: 700; opacity: 0.85; margin-top: 2px; }
.xb { height: 4px; background: rgba(0,0,0,0.15); margin-bottom: 4px; clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); }
.xbf { height: 100%; background: #000; transition: width 0.4s; }
.xl { font-size: 11px; font-weight: 700; text-align: right; opacity: 0.8; }

/* ---- GAIN ANIMATION — centered, descends ---- */
#gain-anim {
  position: fixed;
  top: 158px;
  left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 6px; align-items: center;
  z-index: 500; pointer-events: none;
  width: max-content;
}
.gain-pop {
  background: var(--cp-bg); border: 1px solid var(--cp-cyan); color: var(--cp-cyan);
  padding: 5px 16px; font-size: 15px; font-weight: 700;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  animation: dropFade 1.5s ease-out forwards;
  box-shadow: 0 0 12px rgba(0,240,255,0.25); text-shadow: 0 0 4px rgba(0,240,255,0.5);
  white-space: nowrap;
}
@keyframes dropFade {
  0%   { opacity: 0; transform: translateY(0px);  }
  15%  { opacity: 1; transform: translateY(0px);  }
  65%  { opacity: 1; transform: translateY(8px);  }
  100% { opacity: 0; transform: translateY(55px); }
}

/* ---- CONTENT ---- */
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 158px 16px 90px; }
::-webkit-scrollbar { width: 0px; }

/* ---- NAV ---- */
#nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; background: var(--cp-bg);
  display: flex; z-index: 1000; padding: 10px; gap: 5px;
  border-top: 1px solid var(--cp-border);
}
.nb { flex: 1; background: var(--cp-panel); border: none; color: var(--cp-muted); cursor: pointer; padding: 12px 0; font-size: 12px; font-weight: 700; letter-spacing: 1px; font-family: inherit; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); transition: 0.2s; }
.nb.on { background: var(--cp-yellow); color: #000; }

.sec { display: none; }
.sec.on { display: block; animation: fade 0.2s ease-out; }
@keyframes fade { 0% { opacity: 0; } 100% { opacity: 1; } }

/* ---- SECTION HEADERS ---- */
.cp-header-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0 15px; }
.cp-stripe { height: 18px; width: 40px; background: repeating-linear-gradient(-45deg, var(--cp-yellow), var(--cp-yellow) 6px, transparent 6px, transparent 10px); transform: skew(-20deg); }
.cp-htitle { background: var(--cp-yellow); color: #000; font-size: 16px; font-weight: 700; padding: 2px 15px; letter-spacing: 1px; }

/* ---- QUEST ITEMS ---- */
.qi { display: flex; align-items: stretch; background: var(--cp-yellow); color: #000; margin-bottom: 12px; cursor: pointer; user-select: none; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); transition: 0.1s; }
.qi:active { transform: scale(0.98); }
.qi.dn { background: var(--cp-panel); color: var(--cp-muted); border-left: 2px solid var(--cp-cyan); }
.qi-content { padding: 14px 16px; flex: 1; }
.qt { font-size: 18px; font-weight: 600; margin-bottom: 2px; line-height: 1.1; display: flex; justify-content: space-between; }
.qt-arrow { font-weight: 900; opacity: 0.7; font-size: 20px; line-height: 0.8; }
.qdesc { font-size: 11px; font-weight: 700; color: #555; text-transform: none; margin-bottom: 6px; letter-spacing: 0; }
.qi.dn .qdesc { color: var(--cp-muted); opacity: 0.6; }
.qr { font-size: 13px; font-weight: 700; opacity: 0.9; }
.qi.dn .qt { text-decoration: line-through; opacity: 0.6; }

/* ---- EXPEDITION ITEMS ---- */
.ex { background: var(--cp-panel); border: 1px solid var(--cp-border); padding: 16px; margin-bottom: 12px; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
.ex.dn { opacity: 0.6; border-color: transparent; }
.ex.boss { border-color: var(--cp-yellow); border-left: 4px solid var(--cp-yellow); }
.et { font-size: 16px; font-weight: 600; line-height: 1.2; margin-bottom: 4px; }
.ex .qdesc { color: var(--cp-muted); opacity: 0.8; margin-bottom: 12px; }
.er { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; }
.erw { font-size: 13px; color: var(--cp-cyan); font-weight: 600; }
.ebtn { background: var(--cp-yellow); border: none; padding: 6px 16px; font-size: 14px; font-weight: 700; color: #000; cursor: pointer; font-family: inherit; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); white-space: nowrap; }
.ebtn.cancel { background: transparent; border: 1px solid var(--cp-muted); color: var(--cp-muted); }
.ebtn:active { background: #fff; }
.ex.boss .ebtn { background: var(--cp-red); color: white; }
.lk { opacity: 0.2; pointer-events: none; }

/* ---- PROGRESS ---- */
.pb { height: 4px; background: rgba(20,29,38,0.8); margin-bottom: 20px; }
.pbf { height: 100%; background: var(--cp-yellow); transition: width 0.4s; }
.ph { display: flex; justify-content: space-between; margin-bottom: 8px; }
.ph span { font-size: 13px; font-weight: 600; color: var(--cp-text); }

/* ---- ACCORDION ---- */
.acc-hdr {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--cp-yellow); color: #000;
  padding: 11px 16px; margin: 18px 0 0;
  cursor: pointer; user-select: none;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  font-size: 15px; font-weight: 700; letter-spacing: 1px;
  transition: opacity 0.1s;
}
.acc-hdr:active { opacity: 0.85; }
.acc-hdr-left { display: flex; align-items: center; gap: 10px; }
.acc-badge { background: rgba(0,0,0,0.18); padding: 1px 8px; font-size: 11px; font-weight: 700; clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); }
.acc-arrow { font-size: 10px; opacity: 0.7; }
.acc-body { padding-top: 12px; }
.acc-body.closed { display: none; }

/* ---- SHOP ---- */
.shbal { font-size: 28px; font-weight: 700; color: var(--cp-yellow); margin-bottom: 15px; text-align: center; }
.shop-filters { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
.shop-filters::-webkit-scrollbar { display: none; }
.sf-btn { background: var(--cp-panel); border: 1px solid var(--cp-border); color: var(--cp-muted); padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; white-space: nowrap; clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px); transition: 0.15s; }
.sf-btn.on { background: var(--cp-yellow); color: #000; border-color: var(--cp-yellow); }
.shi { display: flex; align-items: center; justify-content: space-between; background: var(--cp-panel); padding: 14px 16px; margin-bottom: 10px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
.shn { font-size: 15px; font-weight: 600; line-height: 1.2; }
.shi .qdesc { margin-bottom: 0; margin-top: 4px; color: var(--cp-muted); }
.shc { font-size: 15px; color: var(--cp-yellow); font-weight: 700; margin-right: 15px; white-space: nowrap; }
.shbtn { background: var(--cp-bg); border: 1px solid var(--cp-border); padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--cp-text); cursor: pointer; font-family: inherit; clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px); white-space: nowrap; }
.shbtn.np { color: var(--cp-muted); border-color: transparent; cursor: default; }
.shbtn:not(.np) { background: var(--cp-cyan); color: #000; border: none; }

/* ---- WEIGHT / GUITAR INPUTS ---- */
.wrow { display: flex; gap: 10px; margin-top: 15px; }
.winp { flex: 1; background: var(--cp-bg); border: 1px solid var(--cp-border); padding: 10px 15px; color: var(--cp-text); font-size: 16px; font-family: inherit; font-weight: 600; outline: none; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }

.wsave { background: var(--cp-yellow); border: none; padding: 10px 20px; color: #000; font-weight: 700; cursor: pointer; font-size: 14px; font-family: inherit; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }
.wi { font-size: 13px; color: var(--cp-text); font-weight: 600; }

/* ---- STATS ---- */
.sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
.sc { background: var(--cp-panel); padding: 20px; text-align: center; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
.sv { font-size: 36px; font-weight: 700; color: var(--cp-cyan); line-height: 1; }
.sl { font-size: 12px; color: var(--cp-muted); font-weight: 700; margin-top: 5px; }
.scamp { background: var(--cp-panel); padding: 15px; margin-bottom: 12px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
.scr { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 600; }

#tc { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; width: calc(100% - 32px); max-width: 400px; pointer-events: none; }
.ts { padding: 15px 20px; font-size: 14px; font-weight: 700; background: var(--cp-bg); border-left: 4px solid var(--cp-cyan); color: var(--cp-text); clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: fade 0.3s; }
.ts.gold { border-color: var(--cp-yellow); color: var(--cp-yellow); }
.ts.err { border-color: var(--cp-red); color: var(--cp-red); }

/* ---- MODAL ---- */
#modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 24, 0.9); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(3px); }

.modal-box { background: var(--cp-panel); border: 2px solid var(--cp-yellow); width: 100%; max-width: 350px; padding: 20px; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
.modal-title { color: var(--cp-yellow); font-size: 18px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
.modal-text { color: var(--cp-text); font-size: 14px; margin-bottom: 25px; font-weight: 600; white-space: pre-line; }
.modal-btns { display: flex; gap: 10px; }
.btn-ok { flex: 1; background: var(--cp-yellow); color: #000; border: none; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }

.btn-ok:active { background: #fff; }
.btn-cancel:active { background: rgba(255,0,60,0.2); }
</style>
</head>

// ─── RUNTIME STATE ───────────────────────────────────────────────────────────
let S = {};
let shopFilter = 'all';
const accordionState = {}; // key → true(open) | false(closed); undefined = open by default
let confirmAction = null;
let syncTimer = null;

// ─── DEEP MERGE ───────────────────────────────────────────────────────────────
// Starts from the latest DS (adds new items/fields), then overlays saved user state.
function deepMerge(defaults, saved) {
  if (!saved) return JSON.parse(JSON.stringify(defaults));
  const r = JSON.parse(JSON.stringify(defaults));

  // Player fields (new keys like streak default to DS values if missing in save)
  if (saved.player) r.player = { ...r.player, ...saved.player };

  // Top-level primitives
  ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent']
    .forEach(k => { if (saved[k] !== undefined) r[k] = saved[k]; });

  // Arrays: keep all DS items (incl. new ones), restore saved done/state
  ['dailies','weeklies','portfolio','memoire','poids','guitare','shop'].forEach(key => {
    if (saved[key] && Array.isArray(saved[key])) {
      r[key] = r[key].map(def => {
        const sv = saved[key].find(s => s.id === def.id);
        return sv ? { ...def, done: sv.done !== undefined ? sv.done : def.done } : def;
      });
    }
  });

  return r;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showConfirm(title, text, action) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent  = text;
  confirmAction = action;
  document.getElementById('modal-overlay').classList.add('on');
}
function closeModal()    { document.getElementById('modal-overlay').classList.remove('on'); confirmAction = null; }
function executeConfirm(){ if (confirmAction) confirmAction(); closeModal(); }

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(st) {
  const ui = document.getElementById('sync-ui'), txt = document.getElementById('sync-txt');
  ui.className = 'sync-status ' + st.toLowerCase();
  txt.textContent = st;
}
function triggerSync() {
  setSyncStatus('SYNCHING');
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(S), headers:{'Content-Type':'text/plain;charset=utf-8'} })
      .then(r => setSyncStatus(r.ok ? 'SYNCHED' : 'OFFLINE'))
      .catch(() => setSyncStatus('OFFLINE'));
  }, 2500);
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function load() {
  try {
    const d = localStorage.getItem(KEY);
    S = deepMerge(DS, d ? JSON.parse(d) : null);
  } catch(e) {
    S = JSON.parse(JSON.stringify(DS));
  }
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); triggerSync(); }

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function today()  { const n=new Date(); return `${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())}`; }
function p2(n)    { return String(n).padStart(2,'0'); }
function weekId() {
  const d=new Date(), day=d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const y=d.getFullYear(), s=new Date(y,0,1);
  return y+'-W'+Math.ceil((((d-s)/86400000)+1)/7);
}

// ─── DAILY RESET + STREAK ────────────────────────────────────────────────────
function checkReset() {
  const td=today(), wid=weekId();
  if (S.lastDate !== td) {
    if (S.lastDate) {
      S.daysPlayed = (S.daysPlayed||0) + 1;
      // Streak: maintain if ≥ 70% dailies completed
      const frac = S.dailies.filter(d=>d.done).length / S.dailies.length;
      S.player.streak = frac >= 0.7 ? (S.player.streak||0) + 1 : 0;
    }
    S.dailies.forEach(d => d.done = false);
    S.lastDate = td;
  }
  if (S.lastWeekId !== wid) {
    S.weeklies.forEach(w => w.done = false);
    S.practiceWeek = 0;
    S.lastWeekId = wid;
  }
  save();
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'ts' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('tc').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showGain(rep, ed) {
  const el = document.createElement('div');
  el.className = 'gain-pop';
  el.textContent = `+${rep} REP` + (ed > 0 ? ` // +${ed} E$` : '');
  document.getElementById('gain-anim').appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function addXP(xp) {
  S.player.xp += xp;
  while (S.player.xp >= S.player.level * 100 && S.player.level < 50) {
    S.player.xp -= S.player.level * 100;
    S.player.level++;
    toast('STREET CRED UP : LEVEL ' + S.player.level, 'gold');
  }
}

// ─── HEADER ──────────────────────────────────────────────────────────────────
function rHdr() {
  const p = S.player, need = p.level * 100, pct = Math.min(100, Math.round(p.xp/need*100));
  document.getElementById('hlv').textContent     = 'LEVEL '+p.level+' / CORPO';
  document.getElementById('hip').textContent     = p.ip;
  document.getElementById('shb').textContent     = p.ip;
  document.getElementById('hstreak').textContent = '🔥 '+(p.streak||0)+' JOURS';
  document.getElementById('hxb').style.width     = pct+'%';
  document.getElementById('hxl').textContent     = p.xp+' / '+need+' REP';
}

// ─── TASK LISTS ──────────────────────────────────────────────────────────────
function buildUI(arr, type) {
  return arr.map(d => `
    <div class="qi${d.done?' dn':''}" onclick="tTask('${type}','${d.id}')">
      <div class="qi-content">
        <div class="qt"><span>${d.t}</span><span class="qt-arrow">+</span></div>
        <div class="qdesc">// ${d.desc}</div>
        <div class="qr">+${d.xp} REP${d.ip>0?` // +${d.ip} E$`:''}</div>
      </div>
    </div>`).join('');
}

function rDailies() {
  const done = S.dailies.filter(d=>d.done).length;
  document.getElementById('dt').textContent = `MAINTENANCE ${done}/${S.dailies.length}`;
  document.getElementById('dl').innerHTML   = buildUI(S.dailies, 'dailies');
}
function rHebdo() {
  const done = S.weeklies.filter(w=>w.done).length;
  document.getElementById('wt').textContent = `CONTRATS ${done}/${S.weeklies.length}`;
  document.getElementById('wl').innerHTML   = buildUI(S.weeklies, 'weeklies');
}

function tTask(type, id) {
  const it = S[type].find(d=>d.id===id); if (!it) return;
  if (!it.done) {
    it.done=true; addXP(it.xp); S.player.ip+=it.ip; S.totalDone=(S.totalDone||0)+1;
    showGain(it.xp, it.ip);
  } else {
    it.done=false; S.player.xp=Math.max(0,S.player.xp-it.xp); S.player.ip=Math.max(0,S.player.ip-it.ip); S.totalDone=Math.max(0,(S.totalDone||0)-1);
  }
  save();
  if (type==='dailies') rDailies(); else rHebdo();
  rHdr();
}

// ─── EXPEDITION LIST ─────────────────────────────────────────────────────────
function exList(items, key) {
  return items.map((ex, i) => {
    const locked = (key==='portfolio'||key==='memoire') && i>0 && !items[i-1].done;
    return `<div class="ex${ex.done?' dn':''}${ex.boss?' boss':''}${locked?' lk':''}">
      <div class="et">${ex.t}</div>
      <div class="qdesc">// ${ex.desc}</div>
      <div class="er">
        <div class="erw">+${ex.xp} REP // +${ex.ip} E$</div>
        ${ex.done
          ? `<button class="ebtn cancel" onclick="cancelEx('${key}','${ex.id}')">ANNULER</button>`
          : `<button class="ebtn" onclick="valEx('${key}','${ex.id}')">EXECUTER</button>`}
      </div>
    </div>`;
  }).join('');
}

function valEx(key, id) {
  const it = S[key].find(e=>e.id===id); if (!it||it.done) return;
  showConfirm('LANCEMENT PROTOCOLE', 'Exécuter : '+it.t+' ?', () => {
    it.done=true; addXP(it.xp); S.player.ip+=it.ip; S.totalDone=(S.totalDone||0)+1;
    showGain(it.xp, it.ip);
    toast(it.boss?'CIBLE NEUTRALISEE':'DONNEES EXTRAITES','gold');
    save(); rCamps(); rHdr();
  });
}
function cancelEx(key, id) {
  const it = S[key].find(e=>e.id===id); if (!it||!it.done) return;
  showConfirm('ANNULATION PROTOCOLE', 'Révoquer :\n'+it.t+' ?\n(La REP et les E$ seront déduits)', () => {
    it.done=false;
    S.player.xp=Math.max(0,S.player.xp-it.xp); S.player.ip=Math.max(0,S.player.ip-it.ip);
    S.totalDone=Math.max(0,(S.totalDone||0)-1);
    toast('PROTOCOLE REVOQUE','err');
    save(); rCamps(); rHdr();
  });
}

    <div class="ph"><span>${pfD}/${pfT} NODES</span><span>${pfP}% COMPILÉ</span></div>
    <div class="pb"><div class="pbf" style="width:${pfP}%"></div></div>

  const mD=S.memoire.filter(e=>e.done).length, mT=S.memoire.length, mP=Math.round(mD/mT*100);

  // Biométrie (milestones non-réversibles : aucun bouton cancel, set uniquement par logW)
  h += buildAcc('biometrie','BIOMETRIE',`${pLoss.toFixed(1)} KG`,`
    <div class="ex">
      <div class="wi">${S.weightStart
        ? `MASSE INIT : ${S.weightStart} KG &nbsp;|&nbsp; ACTUELLE : ${S.weightCurrent} KG &nbsp;|&nbsp; DIFF : ${pLoss.toFixed(1)} KG`
        : 'SCAN REQUIS : ENTRER MASSE INITIALE (KG)'}</div>
      <div class="wrow">
        <input class="winp" type="number" id="winp" placeholder="${S.weightCurrent||'MASSE'}" step="0.1">
        <button class="wsave" onclick="logW()">SAUVER</button>

    ${S.poids.map(m=>`
    <div class="ex${m.done?' dn':''}${m.boss?' boss':''}">

    </div>`).join('')}`);

  // Rockerboy
  const gD=S.guitare.filter(g=>g.done).length, gP=Math.round(gD/S.guitare.length*100);
  h += buildAcc('rockerboy','ROCKERBOY',`${gD}/${S.guitare.length}`,`

      <div style="font-size:14px;color:var(--cp-text);font-weight:700;margin-bottom:10px">SEQUENCE : ${gActive?gActive.t:'MAÎTRISE TOTALE'}</div>

        <button class="wsave" style="flex:1;padding:8px" onclick="logG(15)">15M</button>
        <button class="wsave" style="flex:1;padding:8px" onclick="logG(30)">30M</button>
        <button class="wsave" style="flex:1;padding:8px;background:var(--cp-cyan)" onclick="logG(60)">1H+</button>
      </div>
      <div style="font-size:12px;color:var(--cp-yellow);font-weight:700">SYNCHRO HEBDO : ${S.practiceWeek||0}</div>
    </div>
    ${exList(S.guitare,'guitare')}`);

// ─── WEIGHT ──────────────────────────────────────────────────────────────────
function logW() {
  const v = parseFloat(document.getElementById('winp').value);
  if (isNaN(v)||v<30||v>300) { toast('ERREUR : MASSE INVALIDE','err'); return; }
  if (!S.weightStart) S.weightStart = v;
  S.weightCurrent = v;
  const loss = Math.max(0, S.weightStart - v);
  // Milestones non-réversibles : on set done=true mais jamais done=false
  S.poids.forEach(m => {
    if (!m.done && loss >= m.kg) { m.done=true; addXP(m.xp); S.player.ip+=m.ip; showGain(m.xp,m.ip); }
  });
  save(); rCamps(); rHdr();
  toast('DONNÉES BIOMÉTRIQUES MAJ');
}

// ─── GUITAR ──────────────────────────────────────────────────────────────────
function logG(min) {
  const xp=min>=60?15:min>=30?10:5, ip=min>=60?1:0;
  addXP(xp); S.player.ip+=ip; S.practiceWeek=(S.practiceWeek||0)+1;
  save(); rCamps(); rHdr(); showGain(xp,ip);
}

function setShopFilter(cat) { shopFilter=cat; rShop(); }

function rShop() {
  document.getElementById('shb').textContent = S.player.ip;
  const cats=[{id:'all',lbl:'TOUT'},{id:'fun',lbl:'🎮 PLAISIR'},{id:'gear',lbl:'🔧 MATOS'},{id:'xp',lbl:'🌍 AVENTURE'}];
  const filters = `<div class="shop-filters">${cats.map(c=>`
    <button class="sf-btn${shopFilter===c.id?' on':''}" onclick="setShopFilter('${c.id}')">${c.lbl}</button>`).join('')}</div>`;

  const list = (shopFilter==='all' ? S.shop : S.shop.filter(s=>s.cat===shopFilter))
    .map(s => {
      const can = S.player.ip >= s.cost;
      return `<div class="shi">
        <div style="flex:1;margin-right:15px;">
          <div class="shn">${s.t}</div>
          <div class="qdesc">// ${s.desc}</div>
        </div>
        <span class="shc">${s.cost} E$</span>
        <button class="shbtn${can?'':' np'}" onclick="${can?`buyIt('${s.id}')`:''}">${can?'ACQUERIR':'FONDS REQUIS'}</button>
      </div>`;
    }).join('');

  document.getElementById('sl').innerHTML = filters + list;
}

function buyIt(id) {
  const it = S.shop.find(s=>s.id===id); if (!it||S.player.ip<it.cost) return;
  showConfirm('MARCHÉ NOIR','Transférer '+it.cost+' E$ pour acquérir :\n'+it.t+' ?', () => {
    S.player.ip -= it.cost;
    if (id==='s_mystery') {
      const loots=[
        {m:'HACK REUSSI : +30 E$',ip:30,xp:0},
        {m:'ECLAT MILITAIRE : +200 REP',ip:0,xp:200},
        {m:'PASS ACCES VIP : 1H BRAINDANCE GRATUITE',ip:0,xp:0},
        {m:'ERREUR TRANSFERT : REMBOURSEMENT 10 E$',ip:10,xp:0}
      ];
      const l=loots[Math.floor(Math.random()*loots.length)];
      if(l.ip)S.player.ip+=l.ip; if(l.xp)addXP(l.xp);
      toast(l.m,'gold');
    } else { toast('TRANSACTION VALIDEE','gold'); }
    save(); rShop(); rHdr();
  });
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function rStats() {
  const p = S.player;
  document.getElementById('stg').innerHTML=`
    <div class="sc"><div class="sv">${p.level}</div><div class="sl">STREET CRED</div></div>
    <div class="sc"><div class="sv">${p.ip}</div><div class="sl">EDDIES DISPO</div></div>
    <div class="sc"><div class="sv" style="color:var(--cp-yellow)">${p.streak||0}🔥</div><div class="sl">STREAK JOURS</div></div>
    <div class="sc"><div class="sv">${S.totalDone||0}</div><div class="sl">GIGS REMPLIS</div></div>`;

  document.getElementById('stc').innerHTML=[
    {n:'PORTFOLIO',items:S.portfolio},
    {n:'PROJET RELIC',items:S.memoire},
    {n:'ROCKERBOY',items:S.guitare},
  ].map(c=>{
    const d=c.items.filter(e=>e.done).length,p=Math.round(d/c.items.length*100);
    return `<div class="scamp">
      <div class="scr"><span style="color:var(--cp-yellow)">${c.n}</span><span>${d}/${c.items.length}</span></div>
      <div class="pb"><div class="pbf" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function go(tab) {
  checkReset();
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('content').scrollTop=0;
  if(tab==='d')      rDailies();
  else if(tab==='h') rHebdo();
  else if(tab==='c') rCamps();
  else if(tab==='s') rShop();
  else if(tab==='st')rStats();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load(); checkReset(); rHdr(); rDailies();
</script>
</body>
</html>
