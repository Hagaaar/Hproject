<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H PROJECT</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --y:#fcee0a; --bg:#0b1118; --pan:#141d26; --brd:#233242;
  --cy:#00f0ff; --rd:#ff003c; --tx:#e0e0e0; --mu:#6b7d8f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.15) 1px,transparent 1px);background-size:24px 24px;color:var(--tx)}
body{font-family:'Rajdhani',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.5px}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
#hw{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;filter:drop-shadow(0 8px 12px rgba(0,0,0,.85))}
#hd{background:var(--y);color:#000;padding:15px 20px 55px;clip-path:polygon(0 0,100% 0,100% calc(100% - 25px),99.3% calc(100% - 25px),99.3% calc(100% - 12.5px),99% calc(100% - 12.5px),99% calc(100% - 18px),99.3% calc(100% - 18px),99.3% calc(100% - 25px),97.5% calc(100% - 25px),97.5% calc(100% - 12.5px),97.2% calc(100% - 12.5px),97.2% calc(100% - 18px),97.5% calc(100% - 18px),97.5% calc(100% - 25px),94% calc(100% - 25px),94% calc(100% - 12.5px),93.2% calc(100% - 12.5px),93.2% calc(100% - 18px),94% calc(100% - 18px),94% calc(100% - 25px),50.8% calc(100% - 25px),50.8% calc(100% - 12.5px),49.2% calc(100% - 12.5px),50% calc(100% - 18.5px),50.8% calc(100% - 12.5px),50.8% calc(100% - 25px),50% calc(100% - 32.5px),49.2% calc(100% - 25px),33% calc(100% - 25px),28% calc(100% - 37.5px),26.2% calc(100% - 37.5px),26.2% calc(100% - 27.5px),25.9% calc(100% - 27.5px),25.9% calc(100% - 29.5px),26.2% calc(100% - 29.5px),26.2% calc(100% - 37.5px),24.7% calc(100% - 37.5px),24.7% calc(100% - 22.5px),24.4% calc(100% - 22.5px),24.4% calc(100% - 29.5px),24.7% calc(100% - 29.5px),24.7% calc(100% - 37.5px),23.2% calc(100% - 37.5px),23.2% calc(100% - 25.5px),22.9% calc(100% - 25.5px),22.9% calc(100% - 27.5px),23.2% calc(100% - 27.5px),23.2% calc(100% - 37.5px),21% calc(100% - 37.5px),17% calc(100% - 12.5px),11% calc(100% - 12.5px),9% calc(100% - 25px),0 calc(100% - 25px))}
.htop{font-size:12px;font-weight:700;opacity:.7;margin-bottom:10px;letter-spacing:1px}
.sync{position:absolute;top:15px;right:20px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:1px;color:#000}
.sdot{width:7px;height:7px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.sync.synched  .sdot{background:#27ae60;filter:drop-shadow(0 0 3px #27ae60) drop-shadow(0 0 6px rgba(39,174,96,.8))}
.sync.synching .sdot{background:#4da6ff;filter:drop-shadow(0 0 3px #4da6ff) drop-shadow(0 0 6px rgba(77,166,255,.8));animation:blink .8s infinite}
.sync.offline  .sdot{background:var(--rd);filter:drop-shadow(0 0 3px var(--rd))}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.h1{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.hname{font-size:28px;font-weight:700;line-height:1}
.hlv{font-size:13px;font-weight:600;opacity:.7}
.hrt{text-align:right}
.hip{font-size:22px;font-weight:700;line-height:1.1}
.hsk{font-size:12px;font-weight:700;opacity:.8;margin-top:2px;text-transform:none}
.xb{height:4px;background:rgba(0,0,0,.15);margin-bottom:4px;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.xbf{height:100%;background:#000;transition:width .5s}
.xl{font-size:11px;font-weight:700;text-align:right;opacity:.8}

/* NOUVEAU SYSTÈME DE GAINS (Flottant à droite de la tâche cliquée) */
.gain-float {
  position: fixed;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none; z-index: 2500;
  left: 50%; transform: translateX(-50%);
}
.gf-item {
  font-size: 16px; font-weight: 800; padding: 4px 10px;
  background: rgba(11,17,24,0.95); border: 1px solid currentColor;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  animation: gfPop 1s ease-out forwards;
}
.gf-rep { color: var(--cy); box-shadow: 0 0 8px rgba(0,240,255,.3); }
.gf-ed  { color: var(--y); box-shadow: 0 0 8px rgba(252,238,10,.3); }

@keyframes gfPop {
  0%   { opacity: 0; transform: translateY(5px) scale(0.8); }
  15%  { opacity: 1; transform: translateY(0) scale(1.1); }
  30%  { transform: scale(1); }
  80%  { opacity: 1; transform: translateY(-10px); }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* ANIMATION D'EXECUTION DE TÂCHE */
.cy-exec {
  animation: glitch-exec 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
  pointer-events: none;
}
@keyframes glitch-exec {
  0% { filter: hue-rotate(90deg) brightness(1.5); background: rgba(0,240,255,0.2); border-color: var(--cy); transform: scale(0.98); }
  15% { filter: hue-rotate(0) brightness(2); background: rgba(252,238,10,0.3); border-color: var(--y); transform: scale(1.02); }
  30% { transform: scale(1); opacity: 1; }
  100% { opacity: 0; transform: scale(0.9); }
}

/* CONTENT + NAV */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:158px 16px 90px}
::-webkit-scrollbar{width:0}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);display:flex;z-index:1000;padding:10px;gap:5px;border-top:1px solid var(--brd)}
.nb{flex:1;background:var(--pan);border:none;color:var(--mu);cursor:pointer;padding:17px 4px;font-size:10px;font-weight:700;letter-spacing:.8px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);transition:.2s}
.nb.on{background:var(--y);color:#000}
.sec{display:none}
.sec.on{display:block;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* SECTION HEADERS */
.cph{display:flex;align-items:center;justify-content:center;gap:10px;margin:20px 0 15px}
.cps{height:18px;width:40px;background:repeating-linear-gradient(-45deg,var(--y),var(--y) 6px,transparent 6px,transparent 10px);transform:skew(-20deg)}
.cpt{background:var(--y);color:#000;font-size:16px;font-weight:700;padding:2px 15px;letter-spacing:1px}

/* QUEST ITEMS */
.qi{display:flex;align-items:stretch;background:var(--y);color:#000;margin-bottom:12px;cursor:pointer;user-select:none;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);transition:.1s}
.qi:active{transform:scale(.98)}
.qi.dn{background:var(--pan);color:var(--mu);border-left:2px solid var(--cy)}
.qic{padding:16px 18px;flex:1}
.qt{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.2;display:flex;justify-content:space-between;gap:8px}
.qta{font-weight:900;opacity:.7;font-size:18px;line-height:1;flex-shrink:0}
.qd{font-size:11px;font-weight:700;color:#555;text-transform:none;margin-bottom:6px;letter-spacing:0}
.qi.dn .qd{color:var(--mu);opacity:.6}
.qr{font-size:13px;font-weight:700;opacity:.9}
.qi.dn .qt{text-decoration:line-through;opacity:.6}

/* EXPEDITION ITEMS */
.ex{background:var(--pan);border:1px solid var(--brd);padding:18px;margin-bottom:12px;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px)}
.ex.dn{opacity:.55;border-color:transparent}
.ex.boss{border-color:var(--y);border-left:4px solid var(--y)}
.et{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:3px}
.etc{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.5px;margin-bottom:10px}
.er{display:flex;justify-content:space-between;align-items:center;gap:10px}
.erw{font-size:12px;color:var(--cy);font-weight:600}
.ebtn{background:var(--y);border:none;padding:7px 18px;font-size:13px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);white-space:nowrap}
.ebtn.cancel{background:transparent;border:1px solid var(--mu);color:var(--mu)}
.ebtn:active{opacity:.8}
.ex.boss .ebtn{background:var(--rd);color:#fff}
.lk{opacity:.18;pointer-events:none}

/* PROGRESS */
.pb{height:4px;background:rgba(20,29,38,.8);margin-bottom:20px}
.pbf{height:100%;background:var(--y);transition:width .5s}
.ph{display:flex;justify-content:space-between;margin-bottom:8px}
.ph span{font-size:13px;font-weight:600}

/* ACCORDION */
.ach{display:flex;align-items:center;justify-content:space-between;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 0;cursor:pointer;user-select:none;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:700;letter-spacing:1px;transition:opacity .1s}
.ach:active{opacity:.85}
.achl{display:flex;align-items:center;gap:10px}
.acb{background:rgba(0,0,0,.18);padding:1px 8px;font-size:11px;font-weight:700;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.acbd{padding-top:12px}
.acbd.closed{display:none}

/* SHOP */
.shop-filters{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.shop-filters::-webkit-scrollbar{display:none}
.sfb{background:var(--pan);border:1px solid var(--brd);color:var(--mu);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:.15s}
.sfb.on{background:var(--y);color:#000;border-color:var(--y)}
.shi{display:flex;align-items:center;background:var(--pan);padding:14px 16px;margin-bottom:10px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);gap:12px}
.shi-info{flex:1;min-width:0}
.shin{font-size:14px;font-weight:600;line-height:1.2;text-transform:none;color:var(--tx)}
.shic{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
.shp{font-size:14px;color:var(--y);font-weight:700;white-space:nowrap;flex-shrink:0}
.shbtn{background:var(--bg);border:1px solid var(--brd);padding:8px 12px;font-size:11px;font-weight:700;color:var(--tx);cursor:pointer;font-family:inherit;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);white-space:nowrap;flex-shrink:0}
.shbtn.np{color:var(--mu);border-color:transparent;cursor:default}
.shbtn.ok{background:var(--cy);color:#000;border:none}
.sh-sect{font-size:11px;font-weight:700;color:var(--y);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(252,238,10,.3)}
.shi-b{display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;cursor:pointer;background:linear-gradient(110deg,rgba(252,238,10,.14) 0%,rgba(252,238,10,.05) 100%);border:1px solid var(--y);border-left:4px solid var(--y);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);animation:bPulse 2.8s ease-in-out infinite;position:relative;overflow:hidden}
.shi-b::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(252,238,10,.1),transparent);animation:bShimmer 2.8s ease-in-out infinite}
@keyframes bPulse{0%,100%{border-color:var(--y)}50%{border-color:rgba(252,238,10,.4)}}
@keyframes bShimmer{0%{left:-100%}50%,100%{left:150%}}
.shi-b .shi-info{flex:1;min-width:0}
.shi-b .shin{color:#fff;font-size:15px;font-weight:700}
.shi-b .shic{color:rgba(252,238,10,.6)}
.ubtn{background:var(--y);border:none;color:#000;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);letter-spacing:.5px}
.ubtn:active{background:#fff}
.shi-b.using{animation:bExit .1s ease-out forwards !important;pointer-events:none}
@keyframes bExit{0%{opacity:1;transform:scaleY(1)}30%{background:rgba(252,238,10,.35);transform:scaleY(1.04)}100%{opacity:0;transform:scaleY(0)}}
/* INPUTS */
.wrow{display:flex;gap:10px;margin-top:15px}
.winp{flex:1;background:var(--bg);border:1px solid var(--brd);padding:10px 15px;color:var(--tx);font-size:16px;font-family:inherit;font-weight:600;outline:none;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.winp:focus{border-color:var(--y)}
.wsave{background:var(--y);border:none;padding:10px 20px;color:#000;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:25px}
.sc{background:var(--pan);padding:20px;text-align:center;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px)}
.sv{font-size:34px;font-weight:700;color:var(--cy);line-height:1}
.sl{font-size:11px;color:var(--mu);font-weight:700;margin-top:5px}
.scamp{background:var(--pan);padding:15px;margin-bottom:12px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.scr{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;font-weight:600}

/* TOAST (Déplacé en bas au-dessus du menu) */
#tc{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:400px;pointer-events:none}
.ts{padding:14px 18px;font-size:13px;font-weight:700;background:var(--bg);border-left:4px solid var(--cy);color:var(--tx);clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);box-shadow:0 5px 15px rgba(0,0,0,.8);animation:tsSlideUp .3s ease-out forwards}
.ts.gold{border-color:var(--y);color:var(--y)}
.ts.err{border-color:var(--rd);color:var(--rd)}
@keyframes tsSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* MODAL */
#mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,17,24,.9);z-index:3000;display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(3px)}
#mo.on{display:flex;animation:fadeIn .2s ease-out}
.mbox{background:var(--pan);border:2px solid var(--y);width:100%;max-width:350px;padding:20px;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);box-shadow:0 10px 30px rgba(0,0,0,.8)}
.mt{color:var(--y);font-size:18px;font-weight:700;margin-bottom:10px;letter-spacing:1px}
.mx{color:var(--tx);font-size:14px;margin-bottom:25px;font-weight:600;white-space:pre-line;text-transform:none}
.mb{display:flex;gap:10px}
.bok{flex:1;background:var(--y);color:#000;border:none;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bca{flex:1;background:transparent;color:var(--rd);border:1px solid var(--rd);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.bok:active{background:#fff}
.bca:active{background:rgba(255,0,60,.2)}

/* USED OVERLAY */
.used-ov{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center;animation: uOvFade 2.8s ease-out forwards;
@keyframes uOvFade{0%{background:rgba(11,17,24,0)}12%{background:rgba(11,17,24,.88)}72%{background:rgba(11,17,24,.88);opacity:1}100%{background:rgba(11,17,24,0);opacity:0}}
.used-scan{position:fixed;left:0;right:0;height:3px;background:var(--y);box-shadow:0 0 18px 6px var(--y),0 0 40px 10px rgba(252,238,10,.4);animation: uScan 1.1s cubic-bezier(.4,0,1,1) forwards;
@keyframes uScan{0%{top:-3px;opacity:1}100%{top:100%;opacity:.2}}
.used-in{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.used-lbl{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:var(--y);letter-spacing:6px;text-shadow:0 0 20px var(--y),0 0 50px rgba(252,238,10,.5);animation:uGlitch 1s ease-out forwards}
@keyframes uGlitch{0%{opacity:0;transform:translateX(-6px) skewX(-5deg);clip-path:inset(0 0 60% 0)}8%{opacity:1;transform:translateX(4px) skewX(3deg);clip-path:inset(0)}12%{transform:translateX(-2px) skewX(-1deg)}16%{transform:translateX(0)}20%{clip-path:inset(25% 0 0 0);transform:translateX(5px)}24%{clip-path:inset(0);transform:translateX(0)}30%{clip-path:inset(50% 0 15% 0);transform:translateX(-3px)}34%{clip-path:inset(0);transform:translateX(0)}65%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-14px)}}
.used-nm{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--cy);letter-spacing:2px;text-shadow:0 0 10px var(--cy);animation:uNm 1s ease-out forwards}
@keyframes uNm{0%{opacity:0}20%{opacity:1}70%{opacity:1}100%{opacity:0}}
.used-c{position:fixed;width:24px;height:24px;border-color:var(--y);border-style:solid;opacity:0;animation:uCo 1.4s ease-out forwards}
.used-c.tl{top:20px;left:20px;border-width:2px 0 0 2px}
.used-c.tr{top:20px;right:20px;border-width:2px 2px 0 0}
.used-c.bl{bottom:80px;left:20px;border-width:0 0 2px 2px}
.used-c.br{bottom:80px;right:20px;border-width:0 2px 2px 0}
@keyframes uCo{0%,10%{opacity:0}20%{opacity:.7}70%{opacity:.7}100%{opacity:0}}

/* LEVEL UP OVERLAY (SANS FLOU) */
.lvl-ov {
  position: fixed; inset: 0; z-index: 9500; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: lvOv 3.5s ease-out forwards; 
  background: rgba(0,0,0,0.85); /* Fond noir semi-transparent appliqué directement */
}

@keyframes lvOv {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  85%  { opacity: 1; }
  100% { opacity: 0; }
}

.lvl-badge-wrap {
  position: relative; width: 180px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  animation: badgePop 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.lvl-hex-bg {
  position: absolute; inset: 0; background: var(--y);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  box-shadow: 0 0 30px rgba(252,238,10,.6);
  animation: hexGlitch 3s infinite;
}

.lvl-hex-in {
  position: absolute; inset: 4px; background: #000;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(252,238,10,.05) 2px, rgba(252,238,10,.05) 4px);
}

.lvl-label { font-size: 12px; font-weight: 700; color: var(--tx); letter-spacing: 3px; margin-bottom: 5px; opacity: 0.8; }
.lvl-num { 
  font-size: 75px; font-weight: 700; color: var(--y); line-height: 0.9; 
  text-shadow: 0 0 20px var(--y); 
  animation: numGlitch 3.5s ease-out forwards; 
}
.lvl-sub {
  font-size: 18px; font-weight: 700; color: var(--cy); letter-spacing: 8px; margin-top: 20px;
  text-shadow: 0 0 10px var(--cy); animation: subSlide 3.5s ease-out forwards; text-transform: uppercase;

function migrate() {
  try {
    const old = localStorage.getItem('cp_rlg_v8');
    if (!old) return null;
    const d = JSON.parse(old);
    const out = JSON.parse(JSON.stringify(DS));
    if (d.player) out.player = {...out.player, ...d.player};
    ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent']
      .forEach(k => { if (d[k] !== undefined) out[k] = d[k]; });
    ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k => {
      if (d[k] && Array.isArray(d[k])) {
        out[k] = out[k].map(def => {
          const sv = d[k].find(x => x.id === def.id);
          return sv ? {...def, done: !!sv.done} : def;
        });
      }
    });
    return out;
  } catch(e) { return null; }
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      S = JSON.parse(JSON.stringify(DS));
      if (saved.player) S.player = {...S.player, ...saved.player};
      ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent']
        .forEach(k => { if (saved[k] !== undefined) S[k] = saved[k]; });
      ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k => {
        if (saved[k] && Array.isArray(saved[k])) {
          S[k] = S[k].map(def => {
            const sv = saved[k].find(x => x.id === def.id);
            return sv ? {...def, done: !!sv.done} : def;
          });
        }
      });
      if (saved.shop && Array.isArray(saved.shop)) {
        S.shop = S.shop.map(def => {
          const sv = saved.shop.find(x => x.id === def.id);
          return sv ? {...def, bought: !!sv.bought} : def;
        });
      }
    } else {
      const migrated = migrate();
      S = migrated || JSON.parse(JSON.stringify(DS));
    }
  } catch(e) {
    S = JSON.parse(JSON.stringify(DS));
  }
  if (!S.shop || S.shop.length < DS.shop.length) {
    S.shop = DS.shop.map(def => {
      const sv = (S.shop||[]).find(x => x.id === def.id);
      return sv ? {...def, bought: !!sv.bought} : {...def};
    });
  }
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); triggerSync(); }

function setSy(st) {
  const u = document.getElementById('syu'), t = document.getElementById('sytx');
  u.className = 'sync ' + st; t.textContent = st.toUpperCase();
}
function triggerSync() {
  setSy('synching');
  if (syncTmr) clearTimeout(syncTmr);
  syncTmr = setTimeout(() => {
    fetch(SURL, {method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain;charset=utf-8'}})
      .then(r => setSy(r.ok ? 'synched' : 'offline'))
      .catch(() => setSy('offline'));
  }, 2500);
}

function today() { const n=new Date(); return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate()); }
function p2(n)   { return String(n).padStart(2,'0'); }
function weekId(){ const d=new Date(),day=d.getDay()||7; d.setDate(d.getDate()+4-day); const y=d.getFullYear(),s=new Date(y,0,1); return y+'-W'+Math.ceil((((d-s)/86400000)+1)/7); }

function checkReset() {
  const td=today(), wid=weekId();
  if (S.lastDate !== td) {
    if (S.lastDate) {
      S.daysPlayed = (S.daysPlayed||0)+1;
      const frac = S.dailies.filter(d=>d.done).length / S.dailies.length;
      S.player.streak = frac >= 0.7 ? (S.player.streak||0)+1 : 0;
    }
    S.dailies.forEach(d => d.done=false);
    S.lastDate = td;
  }
  if (S.lastWeekId !== wid) {
    S.weeklies.forEach(w => w.done=false);
    S.practiceWeek = 0;
    S.lastWeekId = wid;
  }
  save();
}

function showConfirm(title, text, action, lbl) {
  document.getElementById('mo-t').textContent  = title;
  document.getElementById('mo-x').textContent  = text;

  cfmAction = action;
  document.getElementById('mo').classList.add('on');
}
function closeModal()  { document.getElementById('mo').classList.remove('on'); cfmAction=null; }
function execConfirm() { if (cfmAction) cfmAction(); closeModal(); }

function animVal(id, from, to) {
  const el = document.getElementById(id); if (!el) return;
  if (from===to) { el.textContent=to; return; }
  const dur=450, t0=performance.now();
  const tick = now => {
    const p = Math.min((now-t0)/dur, 1);
    el.textContent = Math.round(from + (to-from)*p);
    if (p<1) requestAnimationFrame(tick); else el.textContent=to;
  };
  requestAnimationFrame(tick);
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'ts'+(type?' '+type:'');
  el.textContent = msg;
  document.getElementById('tc').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showGain(rep, ed, e) {
  const c = document.createElement('div');
  c.className = 'gain-float';
  let top = 130;
  if (e && e.target) {
    const el = e.target.closest('.qi, .ex, .scamp, .wrow, .ach, button');
    if (el) top = Math.max(20, el.getBoundingClientRect().top - 10);
  }
  c.style.top = top + 'px';
  if (rep > 0) c.innerHTML += '<div class="gf-item gf-rep">+' + rep + ' REP</div>';
  if (ed > 0)  c.innerHTML += '<div class="gf-item gf-ed">+' + ed + ' E$</div>';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 1000);
}

  setTimeout(() => ov.remove(), 3500);
}

function addXP(xp) {
  S.player.xp += xp;
  while (S.player.xp >= S.player.level*100 && S.player.level<50) {
    S.player.xp -= S.player.level*100;
    S.player.level++;
    showLevelUp(S.player.level);
  }
}

function rHdr() {
  const p=S.player, need=p.level*100, pct=Math.min(100,Math.round(p.xp/need*100));
  document.getElementById('hlv').textContent = 'LEVEL '+p.level+' / CORPO';
  document.getElementById('hsk').textContent = (p.streak||0)+' j STRIKE';
  document.getElementById('xbf').style.width = pct+'%';
  document.getElementById('hxm').textContent = need;
  animVal('hip', prevIp, p.ip);
  animVal('hxv', prevXp, p.xp);
  prevIp=p.ip; prevXp=p.xp;
}

  return arr.map(d =>

function tTask(type, id, e) {
  const it=S[type].find(d=>d.id===id); if(!it) return;
  if (!it.done) {
    it.done=true; addXP(it.xp); S.player.ip+=it.ip; S.totalDone=(S.totalDone||0)+1;
    showGain(it.xp, it.ip, e);
  } else {
    it.done=false; S.player.xp=Math.max(0,S.player.xp-it.xp);
    S.player.ip=Math.max(0,S.player.ip-it.ip); S.totalDone=Math.max(0,(S.totalDone||0)-1);
  }
  save(); prevIp=S.player.ip; prevXp=S.player.xp;
  if (type==='dailies') rDailies(); else rHebdo();
  rHdr();
}

function exList(items, key) {
  return items.map((ex,i) => {
    const locked=(key==='portfolio'||key==='memoire')&&i>0&&!items[i-1].done;
    return '<div class="ex'+(ex.done?' dn':'')+(ex.boss?' boss':'')+(locked?' lk':'')+'" id="task-'+ex.id+'">'+
      '<div class="et">'+ex.desc+'</div>'+
      '<div class="etc">// '+ex.t+'</div>'+
      '<div class="er">'+
        '<div class="erw">+'+ex.xp+' REP / +'+ex.ip+' E$</div>'+
        (ex.done
          ? '<button class="ebtn cancel" onclick="cancelEx(\''+key+'\',\''+ex.id+'\', event)">ANNULER</button>'
          : '<button class="ebtn" onclick="valEx(\''+key+'\',\''+ex.id+'\', event)">EXECUTER</button>')+
      '</div>'+
    '</div>';
  }).join('');
}

function valEx(key, id, e) {
  if (e) e.stopPropagation();
  const it = S[key].find(x => x.id === id); 
  if (!it || it.done) return;
  
  const card = e ? e.target.closest('.ex') : null;
  if (card) card.classList.add('cy-exec');
  
  it.done = true; addXP(it.xp); S.player.ip += it.ip; S.totalDone = (S.totalDone || 0) + 1;
  showGain(it.xp, it.ip, e);
  toast(it.boss ? 'OBJECTIF ATTEINT' : 'ETAPE VALIDEE', 'gold');
  save();
  
  setTimeout(() => { rCamps(); rHdr(); }, 600);
}

function cancelEx(key, id, e) {
  if (e) e.stopPropagation();
  const it = S[key].find(x => x.id === id); 
  if (!it || !it.done) return;
  
  it.done = false; S.player.xp = Math.max(0, S.player.xp - it.xp);
  S.player.ip = Math.max(0, S.player.ip - it.ip); S.totalDone = Math.max(0, (S.totalDone || 0) - 1);
  toast('REVOQUE', 'err'); 
  save(); rCamps(); rHdr();
}

function toggleAcc(k) { accSt[k]=accSt[k]===true?false:true; rCamps(); }
function buildAcc(k, title, badge, content) {
  const open=accSt[k]===true;
  return '<div class="ach" onclick="toggleAcc(\''+k+'\')">'+
      '<div class="achl"><span>'+title+'</span>'+(badge?'<span class="acb">'+badge+'</span>':'')+
      '</div><span style="font-size:10px;opacity:.7">'+(open?'&#9650;':'&#9660;')+'</span></div>'+
    '<div class="acbd'+(open?'':' closed')+'">'+content+'</div>';
}

function rCamps() {
  const pLoss=(S.weightStart&&S.weightCurrent)?Math.max(0,S.weightStart-S.weightCurrent):0;
  const gActive=S.guitare.find(g=>!g.done);
  let h='';
  const pfD=S.portfolio.filter(e=>e.done).length,pfT=S.portfolio.length,pfP=Math.round(pfD/pfT*100);
  h+=buildAcc('portfolio','PORTFOLIO',pfD+'/'+pfT,
    '<div class="ph"><span>'+pfD+'/'+pfT+' ETAPES</span><span>'+pfP+'% COMPLETE</span></div>'+
    '<div class="pb"><div class="pbf" style="width:'+pfP+'%"></div></div>'+exList(S.portfolio,'portfolio'));
  const mD=S.memoire.filter(e=>e.done).length,mT=S.memoire.length,mP=Math.round(mD/mT*100);
  h+=buildAcc('memoire','MEMOIRE HMONP',mD+'/'+mT,
    '<div class="ph"><span>'+mD+'/'+mT+' ETAPES</span><span>'+mP+'% COMPLETE</span></div>'+
    '<div class="pb"><div class="pbf" style="width:'+mP+'%"></div></div>'+exList(S.memoire,'memoire'));
  h+=buildAcc('biometrie','BIOMETRIE',pLoss.toFixed(1)+' KG',
    '<div class="ex"><div style="font-size:13px;font-weight:600;color:var(--tx)">'+
      (S.weightStart?'INIT: '+S.weightStart+' KG | ACTUEL: '+S.weightCurrent+' KG | DIFF: '+pLoss.toFixed(1)+' KG':'ENTRER MASSE INITIALE (KG)')+
    '</div><div class="wrow"><input class="winp" type="number" id="winp" placeholder="'+(S.weightCurrent||'MASSE')+'" step="0.1"><button class="wsave" onclick="logW(event)">SAUVER</button></div></div>'+
    S.poids.map(m=>'<div class="ex'+(m.done?' dn':'')+(m.boss?' boss':'')+'">'+
      '<div class="et">'+m.desc+'</div><div class="etc">// '+m.t+'</div>'+
      '<div class="er"><div class="erw">+'+m.xp+' REP / +'+m.ip+' E$</div>'+
      '<span style="font-size:11px;font-weight:700;color:'+(m.done?'var(--cy)':'var(--mu)')+'">'+
        (m.done?'OK':'INACTIF')+'</span></div></div>').join(''));
  const gD=S.guitare.filter(g=>g.done).length,gP=Math.round(gD/S.guitare.length*100);
  h+=buildAcc('silverhand','SILVERHAND',gD+'/'+S.guitare.length,
    '<div class="ph"><span>'+gD+'/'+S.guitare.length+' PALIERS</span><span>'+gP+'% COMPLETE</span></div>'+
    '<div class="pb"><div class="pbf" style="width:'+gP+'%"></div></div>'+
    '<div class="ex"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--tx)">'+
      (gActive?gActive.desc:'MAITRISE TOTALE')+'</div>'+
    '<div style="display:flex;gap:10px;margin-bottom:12px">'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px" onclick="logG(15, event)">15 MIN</button>'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px" onclick="logG(30, event)">30 MIN</button>'+
      '<button class="wsave" style="flex:1;padding:8px;font-size:13px;background:var(--cy)" onclick="logG(60, event)">1H+</button>'+
    '</div><div style="font-size:11px;font-weight:700;color:var(--y)">SESSIONS CETTE SEMAINE : '+(S.practiceWeek||0)+'</div></div>'+
    exList(S.guitare,'guitare'));
  document.getElementById('cl').innerHTML=h;
}
function logW(e) {
  const v=parseFloat(document.getElementById('winp').value);
  if(isNaN(v)||v<30||v>300){toast('MASSE INVALIDE','err');return;}
  if(!S.weightStart) S.weightStart=v;
  S.weightCurrent=v;
  const loss=Math.max(0,S.weightStart-v);
  S.poids.forEach(m=>{ if(!m.done&&loss>=m.kg){m.done=true;addXP(m.xp);S.player.ip+=m.ip;showGain(m.xp,m.ip,e);} });
  save();rCamps();rHdr();toast('DONNEES BIOMETRIQUES MAJ');
}
function logG(min, e) {
  const xp=min>=60?15:min>=30?10:5, ip=min>=60?1:0;
  addXP(xp);S.player.ip+=ip;S.practiceWeek=(S.practiceWeek||0)+1;
  save();rCamps();rHdr();showGain(xp,ip,e);
}

function setShopFilter(c) { shopFilter=c; rShop(); }
function rShop() {
  const bought=S.shop.filter(s=>s.bought);
  let h='';
  if (bought.length>0) {
    h+='<div class="sh-sect">ACHETE</div>'+
      bought.map(s=>
        '<div class="shi-b" data-sid="'+s.id+'" onclick="useItem(\''+s.id+'\')">'+
          '<div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div>'+
          '<button class="ubtn">UTILISE</button>'+
        '</div>'
      ).join('')+'<div style="height:8px"></div>';
  }
  const cats=[{id:'all',l:'TOUT'},{id:'fun',l:'PLAISIR'},{id:'gear',l:'MATOS'},{id:'xp',l:'AVENTURE'}];
  h+='<div class="shop-filters">'+cats.map(c=>'<button class="sfb'+(shopFilter===c.id?' on':'')+'" onclick="setShopFilter(\''+c.id+'\')">'+c.l+'</button>').join('')+'</div>';
  const items=(shopFilter==='all'?S.shop:S.shop.filter(s=>s.cat===shopFilter)).filter(s=>!s.bought);
  h+=items.map(s=>{
    const can=S.player.ip>=s.cost;
    return '<div class="shi">'+
      '<div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div>'+
      '<span class="shp">'+s.cost+' E$</span>'+
      '<button class="shbtn'+(can?' ok':' np')+'" onclick="'+(can?'buyIt(\''+s.id+'\')':'')+'">'+(can?'ACHETER':'FONDS REQUIS')+'</button>'+
    '</div>';
  }).join('');
  document.getElementById('sl').innerHTML=h;
}
function buyIt(id) {
  const it=S.shop.find(s=>s.id===id); if(!it||S.player.ip<it.cost) return;
  showConfirm('BLACK MARKET','Depenser '+it.cost+' E$ pour :\n'+it.desc+' ?',()=>{
    S.player.ip-=it.cost;
    if (id==='sm') {
      const lo=[{m:'HACK : +30 E$',ip:30,xp:0},{m:'ECLAT : +200 REP',ip:0,xp:200},{m:'PASS VIP : 1H GAMING',ip:0,xp:0},{m:'ERREUR : REMBOURSEMENT 10 E$',ip:10,xp:0}];
      const l=lo[Math.floor(Math.random()*lo.length)];
      if(l.ip)S.player.ip+=l.ip; if(l.xp)addXP(l.xp);
      toast(l.m,'gold');
    } else { it.bought=true; toast('ACHETE — appuie sur UTILISE quand profite','gold'); }
    save();rShop();rHdr();
  },'ACHETER');
}
function useItem(id) {
  const el=document.querySelector('[data-sid="'+id+'"]');
  const it=S.shop.find(s=>s.id===id);
  if(!el||!it) return;
  el.classList.add('using');
  const ov=document.createElement('div'); ov.className='used-ov';
  ov.innerHTML='<div class="used-scan"></div>'+
    '<div class="used-c tl"></div><div class="used-c tr"></div>'+
    '<div class="used-c bl"></div><div class="used-c br"></div>'+
    '<div class="used-in"><div class="used-lbl">UTILISE</div><div class="used-nm">'+it.desc+'</div></div>';
  document.body.appendChild(ov);
  setTimeout(() => { it.bought = false; save(); rShop(); }, 1040);
  setTimeout(() => ov.remove(), 3000);
}

function rStats() {
  const p=S.player;
  document.getElementById('stg').innerHTML=
    '<div class="sc"><div class="sv">'+p.level+'</div><div class="sl">STREET CRED</div></div>'+
    '<div class="sc"><div class="sv">'+p.ip+'</div><div class="sl">EDDIES DISPO</div></div>'+
    '<div class="sc"><div class="sv" style="color:var(--y)">'+(p.streak||0)+' j</div><div class="sl">STRIKE</div></div>'+
    '<div class="sc"><div class="sv">'+(S.totalDone||0)+'</div><div class="sl">GIGS REMPLIS</div></div>';
  document.getElementById('stc').innerHTML=[
    {n:'PORTFOLIO',items:S.portfolio},{n:'MEMOIRE HMONP',items:S.memoire},{n:'SILVERHAND',items:S.guitare}
  ].map(c=>{
    const d=c.items.filter(e=>e.done).length,p2=Math.round(d/c.items.length*100);
    return '<div class="scamp"><div class="scr"><span style="color:var(--y)">'+c.n+'</span><span>'+d+'/'+c.items.length+'</span></div>'+
      '<div class="pb"><div class="pbf" style="width:'+p2+'%"></div></div></div>';
  }).join('');
}

function go(tab) {
  checkReset();
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('content').scrollTop=0;
  if(tab==='d')rDailies();
  else if(tab==='h')rHebdo();
  else if(tab==='c')rCamps();
  else if(tab==='s')rShop();
  else if(tab==='st')rStats();
}

load();
prevIp=S.player.ip; prevXp=S.player.xp;
checkReset();
rHdr();
rDailies();
</script>
</body>
</html>
