<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H PROJECT - TERMINAL LOCKED</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--y:#fcee0a;--bg:#0b1118;--pan:#141d26;--brd:#233242;--cy:#00f0ff;--rd:#ff003c;--tx:#e0e0e0;--mu:#6b7d8f;--gn:#00ff66}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.15) 1px,transparent 1px);background-size:24px 24px;color:var(--tx)}
body{font-family:'Rajdhani',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.5px}

/* ─── AUTH ─── */
#auth-screen{position:fixed;inset:0;z-index:10000;background:var(--bg);background-image:radial-gradient(rgba(252,238,10,.08) 1px,transparent 1px);background-size:20px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;pointer-events:all;-webkit-user-select:none;user-select:none}
.auth-box{width:100%;max-width:280px;background:rgba(11,17,24,0.97);padding:35px 20px 25px;text-align:center;clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);border:1px solid rgba(252,238,10,0.2);box-shadow:0 0 40px rgba(0,0,0,0.9),0 0 20px rgba(252,238,10,0.05);display:flex;flex-direction:column}
.auth-title{color:var(--y);font-size:20px;font-weight:900;letter-spacing:3px;margin-bottom:2px;text-shadow:0 0 12px rgba(252,238,10,.6)}
.auth-sub{color:var(--mu);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:25px}
#auth-pin-display{height:40px;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.auth-action-area{position:relative;height:245px;width:100%;display:flex;justify-content:center}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:180px;position:absolute;top:0}
.key{aspect-ratio:1/1;background:rgba(20,29,38,.8);border:1px solid var(--brd);color:var(--mu);font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:all 0.1s ease;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);user-select:none}
.key:active,.key.pressed{background:rgba(252,238,10,.15);color:var(--y);border-color:var(--y);box-shadow:0 0 15px var(--y),inset 0 0 10px rgba(252,238,10,.2);transform:scale(0.95)}
.key-0{grid-column:2}
#hacker-load{display:none;position:absolute;top:0;width:180px;font-family:'Courier New',Courier,monospace;color:#c0c0c0;font-size:13px;line-height:1.8;text-align:left;letter-spacing:0px;text-shadow:none;white-space:nowrap}
.cursor{display:inline-block;width:2px;height:1em;background-color:#c0c0c0;vertical-align:text-bottom;margin-left:2px;animation:blinkCursor 0.8s step-end infinite;box-shadow:none}
@keyframes blinkCursor{0%,100%{opacity:1}50%{opacity:0}}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1px solid var(--mu);background:transparent;transition:background 0.15s, border-color 0.15s, box-shadow 0.15s}
.pin-dot.filled{background:var(--y);border-color:var(--y);box-shadow:0 0 8px var(--y),0 0 16px rgba(252,238,10,.4)}

/* ─── BTN EXECUTED → + immédiat grand → tourne en ✕ ─── */
.btn-lbl{position:absolute;opacity:1;transform:scale(1);transition:opacity 0.15s,transform 0.15s}
.qi.dn .btn-lbl,.ex.dn .btn-lbl{opacity:0;transform:scale(0.4);transition:opacity 0.12s ease 0s,transform 0.12s ease 0s}
.btn-plus{
  position:absolute;
  font-size:44px;font-weight:300;color:#000;
  opacity:0;
  line-height:1;
  font-family:'Rajdhani',sans-serif;
  transform:rotate(0deg);
}
.btn-x{display:none}
@keyframes plusToX{
  0%   {opacity:0;transform:rotate(0deg)}
  6%   {opacity:1;transform:rotate(0deg)}
  28%  {opacity:1;transform:rotate(45deg)}
  100% {opacity:1;transform:rotate(45deg)}
}
.qi.dn .btn-plus,.ex.dn .btn-plus{
  animation: plusToX 2.2s ease-out forwards;
}
.qi.dn .qi-btn:hover .btn-plus,.ex.dn .qi-btn:hover .btn-plus{color:#000}
.qi.dn .qi-btn,.ex.dn .qi-btn{pointer-events:auto;cursor:pointer}
.ex.inactive-w{border-color:var(--brd);filter:grayscale(100%);opacity:0.6}
.ex.inactive-w::before{background:var(--pan)}
.ex.inactive-w .qi-btn{color:var(--mu);display:flex;justify-content:center;align-items:center}

/* ─── MAIN APP ─── */
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
#hw{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;min-width:350px;max-width:430px;z-index:100;filter:drop-shadow(0 8px 12px rgba(0,0,0,.85))}
#hd{
  background:var(--y);
  color:#000;
  padding:15px 20px 24px;
  -webkit-clip-path:polygon(0% 0%, 100% 0%, 100% 100%, calc(100% - 15px) 100%, calc(100% - 15px) calc(100% - 8px), calc(100% - 18px) calc(100% - 8px), calc(100% - 18px) 100%, calc(100% - 26px) 100%, calc(100% - 26px) calc(100% - 8px), calc(100% - 28px) calc(100% - 8px), calc(100% - 28px) 100%, calc(100% - 33px) 100%, calc(100% - 33px) calc(100% - 8px), calc(100% - 38px) calc(100% - 8px), calc(100% - 38px) 100%, calc(100% - 47px) 100%, calc(100% - 47px) calc(100% - 8px), calc(100% - 49px) calc(100% - 8px), calc(100% - 49px) 100%, calc(66.6% + 15px) 100%, 66.6% calc(100% - 10px), calc(66.6% - 15px) 100%, 185px 100%, 170px calc(100% - 12px), 35px calc(100% - 12px), 20px 100%, 0% 100%);
  clip-path:polygon(0% 0%, 100% 0%, 100% 100%, calc(100% - 15px) 100%, calc(100% - 15px) calc(100% - 8px), calc(100% - 18px) calc(100% - 8px), calc(100% - 18px) 100%, calc(100% - 26px) 100%, calc(100% - 26px) calc(100% - 8px), calc(100% - 28px) calc(100% - 8px), calc(100% - 28px) 100%, calc(100% - 33px) 100%, calc(100% - 33px) calc(100% - 8px), calc(100% - 38px) calc(100% - 8px), calc(100% - 38px) 100%, calc(100% - 47px) 100%, calc(100% - 47px) calc(100% - 8px), calc(100% - 49px) calc(100% - 8px), calc(100% - 49px) 100%, calc(66.6% + 15px) 100%, 66.6% calc(100% - 10px), calc(66.6% - 15px) 100%, 185px 100%, 170px calc(100% - 12px), 35px calc(100% - 12px), 20px 100%, 0% 100%);
}
.htop{font-size:12px;font-weight:700;opacity:.7;margin-bottom:4px;letter-spacing:1px}
.sync{position:absolute;top:15px;right:20px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:1px;color:#000}
.sdot{width:7px;height:7px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.sync.synched .sdot{background:#27ae60;filter:drop-shadow(0 0 3px #27ae60) drop-shadow(0 0 6px rgba(39,174,96,.8))}
.sync.synching .sdot{background:#4da6ff;filter:drop-shadow(0 0 3px #4da6ff) drop-shadow(0 0 6px rgba(77,166,255,.8));animation:blink .8s infinite}
.sync.offline .sdot{background:var(--rd);filter:drop-shadow(0 0 3px var(--rd))}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hlv{font-size:12px;font-weight:700;opacity:.7;margin-bottom:6px;letter-spacing:.5px;color:#000}
.h1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hname{font-size:38px;font-weight:700;line-height:1}
.hip-container{display:flex;align-items:baseline;gap:6px}
.hip-val{font-size:38px;font-weight:700;line-height:1;color:#000}
.hip-cur{font-size:38px;font-weight:300;color:#000;opacity:.8}
.xp-block{margin-top:0}
.xp-bottom-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.xp-rep-val{font-size:12px;font-weight:800;color:#000;opacity:.75;letter-spacing:.3px}
.xb{height:8px;background:rgba(0,0,0,.18);clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.xbf{height:100%;background:#000;transition:width .5s}
.streak-badge{display:flex;align-items:baseline;gap:4px;font-size:12px;font-weight:800;color:#000;opacity:.75;letter-spacing:.3px}

/* ─── GAIN FLOTTANT ─── */
.gain-float{position:fixed;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;z-index:2500;left:50%;transform:translateX(-50%);top:50px}
.gf-item{font-size:16px;font-weight:800;padding:4px 10px;background:rgba(11,17,24,.95);border:1px solid currentColor;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);animation:gfPop 1s ease-out forwards}
.gf-rep{color:var(--cy);box-shadow:0 0 8px rgba(0,240,255,.3)}
.gf-ed{color:var(--y);box-shadow:0 0 8px rgba(252,238,10,.3)}
@keyframes gfPop{0%{opacity:0;transform:translateY(10px) scale(0.8)}15%{opacity:1;transform:translateY(0) scale(1.1)}30%{opacity:1;transform:translateY(-2px) scale(1)}65%{opacity:1;transform:translateY(-6px)}100%{opacity:0;transform:translateY(-12px)}}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:158px 16px 120px}
::-webkit-scrollbar{width:0}

/* ─── NAV ─── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--bg);
  display:flex;z-index:1000;
  padding:0 10px 18px;
  gap:5px;
  
  align-items:flex-start;border-top:2px solid var(--y);
}
.nb{
  flex:1;
  background:var(--pan);
  border:none;
  color:var(--mu);
  cursor:pointer;
  padding:16px 4px 16px;
  font-size:10px;font-weight:800;letter-spacing:.8px;
  font-family:inherit;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);
  transition:.2s;
  position:relative;
  z-index:1;
  margin-top:0;
}
.nb.on{
  background:var(--y);
  color:#000;
  padding-top:16px;
  padding-bottom:20px;
  margin-top:-2px;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);
  z-index:2;
}

.sec{display:none}
.sec.on{display:block;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cph{display:flex;align-items:center;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 15px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px}
.cph.cph-search{justify-content:space-between;padding:8px 16px;font-weight:900;letter-spacing:2px}
.cph-title{flex:1}
.header-search{position:relative;width:150px}
.header-search input{width:100%;background:rgba(0,0,0,0.1);border:none;color:#000;padding:6px 26px 6px 10px;font-family:inherit;font-weight:800;font-size:12px;outline:none;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);transition:background 0.2s}
.header-search input::placeholder{color:rgba(0,0,0,0.4)}
.header-search input:focus{background:rgba(0,0,0,0.18)}
.search-action{position:absolute;right:6px;top:50%;transform:translateY(-50%);cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;border:none;padding:0;color:#000;opacity:0.7}
.search-action:hover{opacity:1}
.search-action svg{width:14px;height:14px}
.no-results{text-align:center;padding:30px 10px;color:var(--mu);font-size:14px;font-weight:700;letter-spacing:1px}
.no-results span{color:var(--rd);font-size:20px;display:block;margin-bottom:5px}

.qi,.ex{display:flex;position:relative;overflow:hidden;background:rgba(252,238,10,.05);border:1px solid var(--y);margin-bottom:12px;cursor:pointer;padding:0;clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);transition:border-color .67s ease}
.qi:not(.no-btn):active,.ex:not(.no-btn):active{transform:scale(.98)}
.qi.dn,.ex.dn{border-color:var(--gn);pointer-events:none}
.qi::before,.ex::before{content:'';position:absolute;top:0;right:0;bottom:0;width:95px;background:var(--y);z-index:0;transition:background-color .67s ease,width 1.33s cubic-bezier(.25,1,.5,1) .67s}
.qi.dn::before,.ex.dn::before{background:var(--gn);width:100%}
.qi.no-btn::before,.ex.no-btn::before{display:none}
.qic,.ex-content{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
.qt,.et{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.2;display:flex;justify-content:space-between;gap:8px;transition:color .2s .8s}
.qd,.etc{font-size:11px;font-weight:700;color:#777;text-transform:none;margin-bottom:6px;letter-spacing:0;transition:color .2s .8s}
.etc{color:var(--mu);text-transform:uppercase;margin-bottom:10px}
.qr,.erw{font-size:13px;font-weight:800;opacity:.9;transition:color .2s .8s}
.erw{color:var(--cy)}
.qi.dn .qt,.ex.dn .et{color:#000}
.qi.dn .qd,.ex.dn .etc{color:#111;font-weight:800;opacity:.8}
.qi.dn .qr,.ex.dn .erw{color:#000}
.ex.boss{border-left:4px solid var(--y)}
.ex.boss.dn{border-left:4px solid var(--gn)}
.lk{opacity:.25;pointer-events:none;filter:grayscale(100%)}
.qi-btn{width:95px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#000;letter-spacing:1px}
.ach{display:flex;align-items:center;justify-content:space-between;background:var(--y);color:#000;padding:11px 16px;margin:18px 0 0;cursor:pointer;user-select:none;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);font-size:14px;font-weight:800;letter-spacing:1px;transition:opacity .1s}
.ach:active{opacity:.85}
.achl{display:flex;align-items:center;gap:10px;flex:1}
.ach-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.acb{
  font-size:13px;font-weight:900;color:#000;letter-spacing:1px;
  border-left:3px solid rgba(0,0,0,0.35);
  padding-left:10px;
  opacity:.85;
  font-variant-numeric:tabular-nums;
}
.ach-arrow{font-size:9px;opacity:.55;flex-shrink:0}
.acbd{padding-top:12px}
.acbd.closed{display:none}
.pb{height:4px;background:rgba(20,29,38,.8);margin-bottom:20px}
.pbf{height:100%;background:var(--y);transition:width .5s}
.ph{display:flex;justify-content:space-between;margin-bottom:8px}
.ph span{font-size:13px;font-weight:600}

/* BIOMETRICS ROADMAP — SVG parallelogram tickets */
.bio-roadmap{margin:0}
.bio-road-svg-wrap{width:100%;overflow:visible}

/* SHOP */
.shop-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.sfb{background:var(--pan);border:1px solid var(--brd);color:var(--mu);padding:7px 4px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;flex:1 1 calc(33.333% - 6px);text-align:center;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:.15s}
.sfb.on{background:var(--y);color:#000;border-color:var(--y)}
.shi{display:flex;align-items:center;background:var(--pan);padding:14px 16px;margin-bottom:10px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);gap:12px;border:1px solid transparent}
.shi:hover{border-color:rgba(252,238,10,0.2)}
.shi-info{flex:1;min-width:0}
.shin{font-size:14px;font-weight:700;line-height:1.2;text-transform:none;color:var(--tx)}
.shic{font-size:10px;font-weight:800;color:var(--mu);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
.shp{font-size:18px;color:var(--y);font-weight:800;white-space:nowrap;flex-shrink:0}
.shbtn{background:var(--bg);border:1px solid var(--brd);padding:8px 12px;font-size:11px;font-weight:800;color:var(--tx);cursor:pointer;font-family:inherit;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);white-space:nowrap;flex-shrink:0}
.shbtn.np{color:rgba(255,255,255,0.25);background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.05);cursor:not-allowed;pointer-events:none}
.shbtn.ok{background:var(--cy);color:#000;border:none}
.shbtn.ok:active{background:#fff;color:#000}
.sh-sect{font-size:11px;font-weight:800;color:var(--y);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(252,238,10,.3)}
.shi-b{display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;cursor:pointer;background:linear-gradient(110deg,rgba(252,238,10,.14) 0%,rgba(252,238,10,.05) 100%);border:1px solid var(--y);border-left:4px solid var(--y);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);animation:bPulse 2.8s ease-in-out infinite;position:relative;overflow:hidden}
.shi-b::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(252,238,10,.1),transparent);animation:bShimmer 2.8s ease-in-out infinite}
@keyframes bPulse{0%,100%{border-color:var(--y)}50%{border-color:rgba(252,238,10,.4)}}
@keyframes bShimmer{0%{left:-100%}50%,100%{left:150%}}
.shi-b .shi-info{flex:1;min-width:0}
.shi-b .shin{color:#fff;font-size:15px;font-weight:700}
.shi-b .shic{color:rgba(252,238,10,.6)}
.ubtn{background:var(--y);border:none;color:#000;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);letter-spacing:.5px}
.ubtn:active{background:#fff}
.shi-b.using{animation:bExit 3s ease-out forwards !important;pointer-events:none}
@keyframes bExit{0%{opacity:1;transform:scaleY(1)}30%{background:rgba(252,238,10,.35);transform:scaleY(1.04)}100%{opacity:0;transform:scaleY(0)}}
.wrow{display:flex;gap:10px;margin-top:15px}
.winp{flex:1;background:var(--bg);border:1px solid var(--brd);padding:10px 15px;color:var(--tx);font-size:16px;font-family:inherit;font-weight:600;outline:none;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.winp:focus{border-color:var(--y)}
.wsave{background:var(--y);border:none;padding:10px 20px;color:#000;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}

/* STATS */
#s-st{padding-top:0px}
.st-hero{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(110deg,rgba(252,238,10,.12) 0%,rgba(252,238,10,.04) 100%);border:1px solid rgba(252,238,10,.4);border-left:4px solid var(--y);padding:10px 14px;margin-bottom:8px;margin-top:-8px;clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);position:relative;overflow:hidden}
.st-hero::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(252,238,10,.03) 3px,rgba(252,238,10,.03) 4px);pointer-events:none}
.st-hero-label{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--y);opacity:.7}
.st-hero-lv{font-size:56px;font-weight:900;color:var(--y);line-height:.9;text-shadow:0 0 20px rgba(252,238,10,.5),0 0 50px rgba(252,238,10,.2)}
.st-hero-right{text-align:right}
.st-hero-class{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:1px}
.st-hero-xp{font-size:13px;font-weight:800;color:var(--y);margin-top:4px}
.st-hero-xpbar{width:90px;height:5px;background:rgba(252,238,10,.15);margin-top:4px;margin-left:auto;clip-path:polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%)}
.st-hero-xpfill{height:100%;background:var(--y);transition:width .5s}
.st-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.st-kpi{background:linear-gradient(135deg,rgba(20,29,38,.95) 0%,rgba(11,17,24,1) 100%);border:1px solid rgba(0,240,255,.2);border-top:2px solid var(--cy);padding:8px 10px;clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);position:relative;overflow:hidden}

<script>
const SURL='https://script.google.com/macros/s/AKfycbzOSoS7cruRVFTl4MZdwbCVrCNRT0hGAPFA7CKNDdFTxD16CU7Bozuv2YPK7O9FJQQc/exec';
const KEY='cp_rlg_v9';

// ─── AUTH ───
let pinBuffer='';
let isAuthChecking=false;

document.addEventListener('DOMContentLoaded',()=>{
  const display = document.getElementById('auth-pin-display');
  for(let i=0; i<5; i++){
    const d = document.createElement('div');
    d.className = 'pin-dot';
    display.appendChild(d);
  }

  if(sessionStorage.getItem('cp_auth')==='true'){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.pointerEvents='all';
  }
});

function updatePinDisplay(){
  const dots = document.querySelectorAll('#auth-pin-display .pin-dot');
  dots.forEach((dot, index) => {
    if(index < pinBuffer.length) {
      dot.classList.add('filled');
    } else {
      dot.classList.remove('filled');
    }
  });
}

function pressKey(k){
  if(isAuthChecking)return;
  pinBuffer+=k;
  updatePinDisplay();
  if(pinBuffer.length===5){isAuthChecking=true;submitPin();}
}

function deleteKey(){
  if(isAuthChecking)return;
  if(pinBuffer.length>0){pinBuffer=pinBuffer.slice(0,-1);updatePinDisplay();}
}

function submitPin(){
  const startTime=Date.now();
  const minAnimTime=3000;
  let fetchResult=null;
  let animDone=false;
  let animPrintedHTML='';

  fetch(SURL,{method:'POST',body:JSON.stringify({action:'auth',pin:pinBuffer}),headers:{'Content-Type':'text/plain;charset=utf-8'}})
    .then(r=>r.text())
    .then(text=>{fetchResult=(text.trim()==='AUTH_SUCCESS');checkBothDone();})
    .catch(()=>{fetchResult=false;checkBothDone();});

  const terminal=document.getElementById('hacker-load');
  const keypad=document.getElementById('auth-keypad');
  keypad.style.display='none';
  terminal.style.display='block';

  const lines=[
    {t:'> PINGING LOCAL SUBNET', spd:18, pause:180},
    {t:'> BREACHING BLACK ICE',  spd:28, pause:420},
    {t:'> UPLOADING DAEMON',     spd:12, pause:250},
    {t:'> NEUROPORT SYNC',       spd:22, pause:300},
  ];
  let currentLine=0,currentChar=0,printedHTML='';

  function typeWriter(){
    if(currentLine<lines.length){
      const line=lines[currentLine];
      const isLast=(currentLine===lines.length-1);
      if(currentChar<line.t.length){
        const partial=line.t.substring(0,currentChar+1);
        terminal.innerHTML=printedHTML+partial+"<span class='cursor'></span>";
        currentChar++;
        setTimeout(typeWriter, line.spd + Math.floor(Math.random()*12));
      }else{
        if(isLast){
          terminal.innerHTML=printedHTML+line.t+"<span class='cursor'></span>";
          animDone=true;
          animPrintedHTML=printedHTML+line.t+'<br>';
          setTimeout(checkBothDone, line.pause);
        }else{
          printedHTML+=line.t+'<br>';
          terminal.innerHTML=printedHTML+"<span class='cursor'></span>";
          currentLine++;currentChar=0;
          setTimeout(typeWriter, line.pause);
        }
      }
    }
  }

  function checkBothDone(){
    if(!animDone||fetchResult===null)return;
    const elapsed=Date.now()-startTime;
    if(elapsed<minAnimTime){setTimeout(finalizeAccess,minAnimTime-elapsed);}
    else{finalizeAccess();}
  }

  function finalizeAccess(){
    if(fetchResult===true){
      terminal.innerHTML=animPrintedHTML+`<span style="color:#c0c0c0;font-family:'Courier New',Courier,monospace;text-shadow:none;">> ACCESS GRANTED</span>`;
      sessionStorage.setItem('cp_auth','true');
      setTimeout(()=>{
        const screen=document.getElementById('auth-screen');
        screen.style.opacity='0';
        setTimeout(()=>{screen.style.display='none';},450);
      },2500);
    }else{
      terminal.innerHTML=animPrintedHTML+`<span style="color:var(--rd);font-family:'Courier New',Courier,monospace;text-shadow:none;">> ACCESS FAILED</span>`;
      setTimeout(()=>{
        terminal.style.display='none';
        terminal.innerHTML='';
        keypad.style.display='grid';
        pinBuffer='';
        isAuthChecking=false;
        updatePinDisplay();
      }, 1500);
    }
  }
  typeWriter();
}

function migrate(){
  try{
    const old=localStorage.getItem('cp_rlg_v8');
    if(!old)return null;
    const d=JSON.parse(old),out=JSON.parse(JSON.stringify(DS));
    if(d.player)out.player={...out.player,...d.player};
    ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent'].forEach(k=>{if(d[k]!==undefined)out[k]=d[k];});
    ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k=>{
      if(d[k]&&Array.isArray(d[k]))out[k]=out[k].map(def=>{const sv=d[k].find(x=>x.id===def.id);return sv?{...def,done:!!sv.done}:def;});
    });
    return out;
  }catch(e){return null;}
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){
      const saved=JSON.parse(raw);
      S=JSON.parse(JSON.stringify(DS));
      if(saved.player)S.player={...S.player,...saved.player};
      ['lastDate','lastWeekId','totalDone','daysPlayed','practiceWeek','weightStart','weightCurrent','weightLog'].forEach(k=>{if(saved[k]!==undefined)S[k]=saved[k];});
      if(!S.weightLog)S.weightLog=[];
      ['dailies','weeklies','portfolio','memoire','poids','guitare'].forEach(k=>{
        if(saved[k]&&Array.isArray(saved[k]))S[k]=S[k].map(def=>{const sv=saved[k].find(x=>x.id===def.id);return sv?{...def,done:!!sv.done}:def;});
      });
      if(saved.shop&&Array.isArray(saved.shop))S.shop=S.shop.map(def=>{const sv=saved.shop.find(x=>x.id===def.id);return sv?{...def,bought:!!sv.bought}:def;});
      if(saved.mysteryPending)S.mysteryPending=saved.mysteryPending;
    }else{S=migrate()||JSON.parse(JSON.stringify(DS));}
  }catch(e){S=JSON.parse(JSON.stringify(DS));}
  if(!S.shop||S.shop.length<DS.shop.length)S.shop=DS.shop.map(def=>{const sv=(S.shop||[]).find(x=>x.id===def.id);return sv?{...def,bought:!!sv.bought}:{...def};});
  if(!S.weightLog)S.weightLog=[];
}

function save(){localStorage.setItem(KEY,JSON.stringify(S));triggerSync();}
function setSy(st){document.getElementById('syu').className='sync '+st;document.getElementById('sytx').textContent=st.toUpperCase();}
function triggerSync(){
  setSy('synching');
  if(syncTmr)clearTimeout(syncTmr);
  syncTmr=setTimeout(()=>{
    fetch(SURL,{method:'POST',body:JSON.stringify(S),headers:{'Content-Type':'text/plain;charset=utf-8'}})
      .then(r=>setSy(r.ok?'synched':'offline')).catch(()=>setSy('offline'));
  },2500);
}

function today(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function weekId(){const d=new Date(),day=d.getDay()||7;d.setDate(d.getDate()+4-day);const y=d.getFullYear(),s=new Date(y,0,1);return y+'-W'+Math.ceil((((d-s)/86400000)+1)/7);}

function checkReset(){
  const td=today(),wid=weekId();
  if(S.lastDate!==td){
    if(S.lastDate){S.daysPlayed=(S.daysPlayed||0)+1;const frac=S.dailies.filter(d=>d.done).length/S.dailies.length;S.player.streak=frac>=0.7?(S.player.streak||0)+1:0;}
    S.dailies.forEach(d=>d.done=false);S.lastDate=td;
  }
  if(S.lastWeekId!==wid){S.weeklies.forEach(w=>w.done=false);S.practiceWeek=0;S.lastWeekId=wid;}
  save();
}

function animVal(id,from,to){
  const el=document.getElementById(id);if(!el)return;
  if(from===to){el.textContent=to;return;}
  const dur=450,t0=performance.now();
  const tick=now=>{const p=Math.min((now-t0)/dur,1);el.textContent=Math.round(from+(to-from)*p);if(p<1)requestAnimationFrame(tick);else el.textContent=to;};
  requestAnimationFrame(tick);
}

}

  // Canvas pour l'animation glitch du chiffre
  const CW = 200, CH = 200;
  const glitchCanvas = document.createElement('canvas');
  glitchCanvas.width  = CW * 2; // retina
  glitchCanvas.height = CH * 2;
  glitchCanvas.style.cssText = 'width:' + CW + 'px;height:' + CH + 'px;';
  glitchCanvas.className = 'cyber-hex-canvas';
  halo.appendChild(glitchCanvas);

  const tChoom = document.createElement('div');
  tChoom.className = 'lvl-txt-choom';
  tChoom.textContent = 'KEEP UP CHOOM !';

  ov.appendChild(tCongrats);
  ov.appendChild(tReach);
  ov.appendChild(halo);
  ov.appendChild(tChoom);
  document.body.appendChild(ov);

  // ── Glitch engine ────────────────────────
  setTimeout(()=>{
    const gc  = glitchCanvas.getContext('2d');
    const GW  = glitchCanvas.width;
    const GH  = glitchCanvas.height;
    const TEXT = String(lvl);
    const FONT_SZ = 240;
    const FONT = '900 ' + FONT_SZ + 'px "Rajdhani", Arial Black, sans-serif';

    // Offscreen bitmap du chiffre avec glow
    const ofc  = document.createElement('canvas');
    ofc.width  = GW; ofc.height = GH;
    const oCtx = ofc.getContext('2d');
    oCtx.shadowColor = '#00f0ff';
    oCtx.shadowBlur  = 28;
    oCtx.font         = FONT;
    oCtx.textBaseline = 'middle';
    oCtx.textAlign    = 'center';
    oCtx.fillStyle    = '#00f0ff';
    oCtx.fillText(TEXT, GW / 2, GH / 2);

    glitchCanvas.style.opacity = '1';

    // Timeline
    const CALM_START  = 0;
    const CLEAR_START = 4000;
    const CLEAR_END   = 5000;
    let startTime = null;

    function globalEnvelope(now) {
      const t = now - startTime;
      if (t >= CLEAR_START) return 0;
      const p = t / CLEAR_START;
      const q = 0.5 + p * 0.5;
      const eased = q < 0.5 ? 2*q*q : -1+(4-2*q)*q;
      return 1 - eased;
    }

    let slices = [];
    function buildSlices(brokenness) {
      slices = [];
      const numCuts = 3 + Math.floor(brokenness * 12);
      const cuts = [0];
      for (let i = 0; i < numCuts; i++) cuts.push(Math.random() * GH);
      cuts.push(GH);
      cuts.sort((a,b) => a-b);
      for (let i = 0; i < cuts.length-1; i++) {
        const y0 = cuts[i], y1 = cuts[i+1];
        if (y1-y0 < 1) continue;
        const big = Math.random() < brokenness * 0.5;
        const dx = big ? (Math.random()-.5)*brokenness*GW*0.18 : (Math.random()-.5)*brokenness*18;
        const dy = big ? (Math.random()-.5)*brokenness*GH*0.18 : (Math.random()-.5)*brokenness*3;
        const alpha = big ? Math.max(0, 1-Math.random()*brokenness*1.3) : 1;
        const chroma = Math.random() < brokenness * 0.85;
        if (chroma && big) {
          slices.push({y0,y1,dx:dx+(Math.random()-.5)*16,dy:dy+(Math.random()-.5)*5,alpha:alpha*.85,r:255,g:0,b:0});
          slices.push({y0,y1,dx:dx-(Math.random()-.5)*16,dy:dy+(Math.random()-.5)*5,alpha:alpha*.85,r:0,g:255,b:255});
        } else {
          slices.push({y0,y1,dx,dy,alpha,r:0,g:240,b:255});
        }
      }
    }

    function drawFrame(intensity) {
      gc.clearRect(0,0,GW,GH);
      // Base text — apparaît au fur et à mesure que chaos diminue
      const baseAlpha = Math.max(0, 1 - intensity * 1.1);
      gc.globalAlpha = baseAlpha;
      gc.drawImage(ofc, 0, 0);
      gc.globalAlpha = 1;

      if (intensity > 0.005) {
        gc.globalCompositeOperation = 'screen';
        for (const s of slices) {
          const sy = Math.round(s.y0);
          const sh = Math.max(1, Math.round(s.y1-s.y0));
          const tmp = document.createElement('canvas');
          tmp.width = GW; tmp.height = sh;
          const tc = tmp.getContext('2d');
          tc.drawImage(ofc, 0, -sy);
          if (s.r !== 0 || s.g !== 240 || s.b !== 255) {
            tc.globalCompositeOperation = 'source-atop';
            tc.fillStyle = 'rgb('+s.r+','+s.g+','+s.b+')';
            tc.fillRect(0,0,GW,sh);
          }
          gc.globalAlpha = s.alpha;
          gc.drawImage(tmp, s.dx, sy+s.dy, GW, sh);
        }
        gc.globalCompositeOperation = 'source-over';
        gc.globalAlpha = 1;
      }
    }

    // State machine
    const PH = {IDLE:0,BREAKING:1,HOLD:2,REASSEMBLE:3};
    let phase=PH.IDLE, phaseStart=0, intensity=0, idleDuration=0;
    let microTimer=0, microIntensity=0;
    function computeIdle(env){ return (80+Math.random()*200)+(1-env)*(500+Math.random()*1500); }

    let lastNow = null;
    let rafId = null;

    function update(now) {
      if (!startTime) startTime = now;
      const dt = lastNow ? now-lastNow : 0;
      lastNow = now;
      const env = globalEnvelope(now);

      if (now-startTime > CLEAR_END) {
        cancelAnimationFrame(rafId);
        // Affiche le chiffre propre final avec glow
        gc.clearRect(0,0,GW,GH);
        gc.shadowColor = '#00f0ff';
        gc.shadowBlur  = 30;
        gc.font        = FONT;
        gc.textBaseline = 'middle';
        gc.textAlign   = 'center';
        gc.fillStyle   = '#00f0ff';
        gc.fillText(TEXT, GW/2, GH/2);
        return;
      }

      switch(phase) {
        case PH.IDLE:
          microTimer -= dt;
          if (microTimer <= 0) {
            microIntensity = env*(0.05+Math.random()*0.15);
            if (env<0.1) microIntensity*=0.3;
            microTimer = 40+Math.random()*120;
          } else { microIntensity *= 0.78; }
          intensity = microIntensity;
          if (now-phaseStart > idleDuration) {
            if (env>0.05) { phase=PH.BREAKING; phaseStart=now; }
            else { phaseStart=now; idleDuration=computeIdle(env); }
          }
          break;
        case PH.BREAKING:
          const breakDur=60+Math.random()*100;
          const raw=(now-phaseStart)/breakDur;
          intensity=Math.min(1,raw)*env;
          if (raw>=1){ phase=PH.HOLD; phaseStart=now; }
          break;
        case PH.HOLD:
          intensity=env;
          const holdDur=40+Math.random()*160*env;
          if (now-phaseStart>holdDur){ phase=PH.REASSEMBLE; phaseStart=now; }
          break;
        case PH.REASSEMBLE:
          const dur=120+Math.random()*200;
          intensity=Math.max(0,env-(now-phaseStart)/dur*env);
          if (now-phaseStart>=dur){ phase=PH.IDLE; phaseStart=now; idleDuration=computeIdle(env); intensity=0; }
          break;
      }

      if (intensity>0.008) buildSlices(intensity);
      else slices=[];

      drawFrame(intensity);
      rafId = requestAnimationFrame(update);
    }

    rafId = requestAnimationFrame(update);
  }, 0);

  setTimeout(()=>{ ov.remove(); }, 8000);
}

function tTask(type,id,e){
  const it=S[type].find(d=>d.id===id);if(!it)return;
  const el=document.getElementById('task-'+id);
  if(!it.done){
    it.done=true;addXP(it.xp);S.player.ip+=it.ip;S.totalDone=(S.totalDone||0)+1;
    showGain(it.xp,it.ip,e);save();rHdr();
    if(el)el.classList.add('dn');
    updateCount(type);
  }else{
    it.done=false;S.player.xp=Math.max(0,S.player.xp-it.xp);S.player.ip=Math.max(0,S.player.ip-it.ip);
    S.totalDone=Math.max(0,(S.totalDone||0)-1);save();rHdr();
    if(el)el.classList.remove('dn');
    updateCount(type);
  }
}

function rCamps(){
  const pLoss=(S.weightStart&&S.weightCurrent)?Math.max(0,S.weightStart-S.weightCurrent):0;
  const gActive=S.guitare.find(g=>!g.done);let h='';
  
  // ── BIOMETRICS EN PREMIER ──
  const wLog=(S.weightLog||[]).slice(-10);let chartSvg='';
  if(wLog.length>=2){
    const vals=wLog.map(e=>e.v);
    const mn=Math.min(...vals)-0.5, mx=Math.max(...vals)+0.5;
    const W=340, H=110, PAD=22; 
    const toX=(i)=>PAD+(i/(vals.length-1))*(W-PAD*2);
    const toY=(v)=>H-35-((v-mn)/(mx-mn))*(H-50);
    const pts=vals.map((v,i)=>toX(i)+','+toY(v)).join(' ');
    const fillPts=toX(0)+','+(H)+' '+pts+' '+toX(vals.length-1)+','+(H);

    const mkLbl=(x,y,val,dStr,anchor)=>{
      // anchor='start' = premier point (gauche), anchor='end' = dernier point (droite)
      let ta = anchor==='start'?'start':'end';
      let dx = anchor==='start'? 6 : -6;
      let dForm = dStr;
      if(dStr && dStr.includes('-')){
        let p = dStr.split('-');
        dForm = p[2]+'/'+p[1];
      }
      return '<g transform="translate('+(x+dx)+','+(y+18)+')">'
      +'<text x="0" y="0" font-size="14" fill="#00ff66" font-weight="900" text-anchor="'+ta+'" font-family="Rajdhani,sans-serif">'+val.toFixed(1)+'</text>'
      +'<text x="0" y="12" font-size="10" fill="#6b7d8f" font-weight="700" text-anchor="'+ta+'" font-family="Rajdhani,sans-serif">'+dForm+'</text>'
      +'</g>';
    };

    let innerMinMax = '';
    let actualMax = Math.max(...vals);
    let actualMin = Math.min(...vals);
    let maxDrawn=false, minDrawn=false;
    
    for(let i=1; i<vals.length-1; i++){
      if(vals[i] === actualMax && !maxDrawn){
         innerMinMax += '<text x="'+toX(i)+'" y="'+(toY(vals[i])-8)+'" font-size="10" fill="#00ff66" opacity="0.8" font-weight="800" text-anchor="middle" font-family="Rajdhani,sans-serif">'+vals[i].toFixed(1)+'</text>';
         maxDrawn=true;
      }
      if(vals[i] === actualMin && !minDrawn && vals[i] !== actualMax){
         innerMinMax += '<text x="'+toX(i)+'" y="'+(toY(vals[i])+14)+'" font-size="10" fill="#00ff66" opacity="0.8" font-weight="800" text-anchor="middle" font-family="Rajdhani,sans-serif">'+vals[i].toFixed(1)+'</text>';
         minDrawn=true;
      }
    }

    chartSvg='<div style="background:var(--pan);padding:10px 4px 8px">'+

      '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block;overflow:visible;padding:0 8px">'+
      '<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00ff66" stop-opacity=".3"/><stop offset="100%" stop-color="#00ff66" stop-opacity="0"/></linearGradient></defs>'+
      '<polyline points="'+fillPts+'" fill="url(#wg)" stroke="none"/>'+
      '<polyline points="'+pts+'" fill="none" stroke="#00ff66" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
      innerMinMax +
      '<circle cx="'+toX(0)+'" cy="'+toY(vals[0])+'" r="3.5" fill="#0b1118" stroke="#00ff66" stroke-width="1.5"/>'+
      mkLbl(toX(0), toY(vals[0]), vals[0], wLog[0].d, 'start')+
      '<circle cx="'+toX(vals.length-1)+'" cy="'+toY(vals[vals.length-1])+'" r="3.5" fill="#0b1118" stroke="#00ff66" stroke-width="1.5"/>'+
      mkLbl(toX(vals.length-1), toY(vals[vals.length-1]), vals[vals.length-1], wLog[wLog.length-1].d, 'end')+
      '</svg></div>';
  }
  
  const bioD=S.poids.filter(m=>m.done).length;
  h+=buildAcc('biometrie','BIOMETRICS',buildSegBadge(bioD,10,'#00cc55','0,204,85'),
    '<div style="background:var(--pan);padding:12px 12px 0">'+
    '<div class="wrow" style="align-items:stretch;gap:8px;">'+
    '<button onclick="adjustW(-0.5)" ontouchstart="" style="background:rgba(252,238,10,0.08);border:1px solid rgba(252,238,10,0.25);color:var(--y);padding:0;width:44px;min-height:44px;font-size:28px;font-weight:300;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;">−</button>'+
    '<input class="winp" type="number" inputmode="decimal" id="winp" placeholder="MASS" value="'+(S.weightCurrent?S.weightCurrent.toFixed(1):'')+'" step="0.5" onblur="const v=parseFloat(this.value); if(!isNaN(v)) this.value=v.toFixed(1);" style="flex:1;min-width:0;font-size:22px;font-weight:700;text-align:center;-webkit-appearance:none;appearance:none;background:rgba(252,238,10,0.06);border-color:rgba(252,238,10,0.2)">'+
    '<button onclick="adjustW(0.5)" ontouchstart="" style="background:rgba(252,238,10,0.08);border:1px solid rgba(252,238,10,0.25);color:var(--y);padding:0;width:44px;min-height:44px;font-size:28px;font-weight:300;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;">+</button>'+
    '<button class="wsave" onclick="logW(event)" style="padding:10px 14px;font-size:14px;flex-shrink:0;min-width:70px;">ADD</button></div>'+
    '</div>'+
    (wLog.length>=2 ? chartSvg+buildBioRoadmap(pLoss) : ''));

  const pfD=S.portfolio.filter(e=>e.done).length,pfT=S.portfolio.length,pfP=Math.round(pfD/pfT*100);
  h+=buildAcc('portfolio','PORTFOLIO',buildSegBadge(pfD,pfT),exList(S.portfolio,'portfolio'),pfP);
  const mD=S.memoire.filter(e=>e.done).length,mT=S.memoire.length,mP=Math.round(mD/mT*100);
  h+=buildAcc('memoire','HMONP THESIS',buildSegBadge(mD,mT),exList(S.memoire,'memoire'),mP);
  const gD=S.guitare.filter(g=>g.done).length,gP=Math.round(gD/S.guitare.length*100);
  h+=buildAcc('silverhand','SILVERHAND',buildSegBadge(gD,4,'#a870d8','168,112,216'),
    '<div style="padding:0 12px 8px">'+
    '<div style="font-size:13px;font-weight:800;color:var(--y);margin-bottom:12px">SESSIONS THIS WEEK : '+(S.practiceWeek||0)+'</div>'+
    '<div style="display:flex;gap:6px;margin-bottom:4px">'+
    '<button class="wsave" style="flex:1;padding:8px;font-size:11px" onclick="logG(10,event)">10 MIN</button>'+
    '<button class="wsave" style="flex:1;padding:8px;font-size:11px" onclick="logG(15,event)">15 MIN</button>'+
    '<button class="wsave" style="flex:1;padding:8px;font-size:11px" onclick="logG(20,event)">20 MIN</button>'+
    '<button class="wsave" style="flex:1;padding:8px;font-size:11px;background:var(--cy)" onclick="logG(30,event)">30+ MIN</button>'+
    '</div></div>'+
    exList(S.guitare,'guitare'),gP);
  document.getElementById('cl').innerHTML=h;
}

function adjustW(delta){
  const inp=document.getElementById('winp');
  const cur=parseFloat(inp.value)||S.weightCurrent||80;
  inp.value=(Math.round((cur+delta)*10)/10).toFixed(1);
}
function logW(e){
  const v=parseFloat(document.getElementById('winp').value);
  if(isNaN(v)||v<30||v>300){toast('INVALID MASS','err');return;}
  if(!S.weightStart)S.weightStart=v;S.weightCurrent=v;
  if(!S.weightLog)S.weightLog=[];S.weightLog.push({d:today(),v:v});
  if(S.weightLog.length>30)S.weightLog=S.weightLog.slice(-30);
  const loss=Math.max(0,(S.weightStart||v)-v);
  S.poids.forEach(m=>{if(!m.done&&loss>=m.kg){m.done=true;addXP(m.xp);S.player.ip+=m.ip;showGain(m.xp,m.ip,e);}});
  save();rCamps();rHdr();toast('BIOMETRICS UPDATED');
}
function logG(min,e){
  const xp=min>=30?15:min>=20?10:min>=15?7:5,ip=min>=30?5:0;
  addXP(xp);S.player.ip+=ip;S.practiceWeek=(S.practiceWeek||0)+1;save();rCamps();rHdr();showGain(xp,ip,e);
}

let showAddForm=false;
function handleSearch(){
  const inp=document.getElementById('shop-search');
  const mag=document.getElementById('icon-mag');
  const cross=document.getElementById('icon-cross');
  if(inp&&mag&&cross){
    if(inp.value.trim().length>0){mag.style.display='none';cross.style.display='block';}
    else{mag.style.display='block';cross.style.display='none';}
  }
  rShop();
}
function clearSearch(){
  const inp=document.getElementById('shop-search');
  if(inp&&inp.value.trim().length>0){inp.value='';handleSearch();}
  else if(inp){inp.focus();}
}
function setShopFilter(c){shopFilter=c;rShop();}
function toggleAddShop(){showAddForm=!showAddForm;rShop();setTimeout(()=>{const el=document.getElementById('asi-desc');if(el)el.focus();},50);}
function saveShopItem(){
  const desc=(document.getElementById('asi-desc').value||'').trim();
  const cost=parseInt(document.getElementById('asi-cost').value||'0');
  const cat=document.getElementById('asi-cat').value||'fun';
  if(!desc||isNaN(cost)||cost<1){toast('FILL ALL FIELDS','err');return;}
  S.shop.push({id:'cu_'+Date.now(),t:'CUSTOM',desc:desc,cost:cost,cat:cat,custom:true});
  showAddForm=false;save();rShop();toast('ITEM ADDED TO BLACK MARKET','gold');
}
function removeCustomItem(id){S.shop=S.shop.filter(s=>s.id!==id);save();rShop();toast('ITEM REMOVED','err');}

function rShop(){
  const searchInput=document.getElementById('shop-search');
  const searchQ=searchInput?searchInput.value.toLowerCase().trim():'';
  const isNumSearch=/^\d+$/.test(searchQ);
  const searchNum=parseInt(searchQ,10);
  const bought=S.shop.filter(s=>s.bought),mp=S.mysteryPending||[];let h='';
  
  if(bought.length>0||mp.length>0){
    h+='<div class="sh-sect">PURCHASED</div>';
    mp.forEach(r=>{
      const isErr=r.type==='error';
      if(isErr){
        h+='<div style="display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:12px;cursor:pointer;background:linear-gradient(110deg,rgba(255,0,60,.22) 0%,rgba(255,0,60,.08) 100%);border:1px solid var(--rd);border-left:4px solid var(--rd);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);position:relative;overflow:hidden" data-mid="'+r.uid+'" onclick="useMystery(\''+r.uid+'\')">'+
          '<div style="flex:1;min-width:0"><div class="shin" style="color:var(--rd);text-shadow:0 0 8px rgba(255,0,60,.4)">'+r.desc+'</div><div class="shic" style="color:rgba(255,60,60,.5)">MYSTERY STASH — TAP TO REVEAL</div></div>'+
          '<button style="background:var(--rd);border:none;color:#fff;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);letter-spacing:.5px;flex-shrink:0;box-shadow:0 0 10px rgba(255,0,60,.4)">USE</button></div>';
      }else{
        h+='<div class="shi-b" data-mid="'+r.uid+'" onclick="useMystery(\''+r.uid+'\')"><div class="shi-info"><div class="shin">'+r.desc+'</div><div class="shic">MYSTERY STASH — TAP TO REVEAL</div></div><button class="ubtn">USE</button></div>';
      }
    });
    h+=bought.map(s=>'<div class="shi-b" data-sid="'+s.id+'" onclick="useItem(\''+s.id+'\')"><div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div><button class="ubtn">USE</button><button style="background:none;border:none;color:var(--rd);font-size:18px;font-weight:800;cursor:pointer;padding:0 4px;flex-shrink:0" onclick="event.stopPropagation();cancelPurchase(\''+s.id+'\')">✕</button></div>').join('');
    h+='<div style="height:8px"></div>';
  }
  
  // NOUVELLES CATÉGORIES ICI
  const cats=[{id:'all',l:'ALL'},{id:'fun',l:'FUN'},{id:'gear',l:'GEAR'},{id:'body',l:'BODY'},{id:'out',l:'OUT'},{id:'travel',l:'TRAVEL'}];
  h+='<div class="shop-filters">'+cats.map(c=>'<button class="sfb'+(shopFilter===c.id?' on':'')+'" onclick="setShopFilter(\''+c.id+'\')">'+c.l+'</button>').join('')+'</div>';
  
  const filteredItems=S.shop.filter(s=>{
    if(s.bought)return false;
    const matchCat=(shopFilter==='all'||s.cat===shopFilter);
    let matchSearch=false;
    if(searchQ===''){matchSearch=true;}
    else if(isNumSearch){matchSearch=s.cost<=searchNum;}
    else{matchSearch=s.desc.toLowerCase().includes(searchQ)||s.t.toLowerCase().includes(searchQ);}
    return matchCat&&matchSearch;
  });
  
  if(filteredItems.length===0&&searchQ!==''){
    h+='<div class="no-results"><span>⚠</span>NO MATCHING FILES IN DATABASE</div>';
  }else{
    h+=filteredItems.map(s=>{
      const can=S.player.ip>=s.cost;
      return '<div class="shi"><div class="shi-info"><div class="shin">'+s.desc+'</div><div class="shic">'+s.t+'</div></div>'+
        '<span class="shp">'+s.cost+' E$</span>'+
        '<button class="shbtn'+(can?' ok':' np')+'" onclick="'+(can?'buyIt(\''+s.id+'\')':'')+'">BUY</button>'+
        (s.custom?'<button style="background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0" onclick="removeCustomItem(\''+s.id+'\')">✕</button>':'')+'</div>';
    }).join('');
  }
  
  h+='<div style="margin-top:18px"><button onclick="toggleAddShop()" style="width:100%;background:'+(showAddForm?'rgba(252,238,10,.1)':'transparent')+';border:1px solid var(--y);color:var(--y);padding:12px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)">'+(showAddForm?'✕ CANCEL':'+ ADD ITEM TO BLACK MARKET')+'</button>';
  
  if(showAddForm){
    h+='<div style="margin-top:10px;padding:14px;background:var(--pan);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)">'+
      '<input id="asi-desc" class="winp" placeholder="ITEM DESCRIPTION" style="width:100%;margin-bottom:8px;text-transform:none">'+
      '<div style="display:flex;gap:8px;margin-bottom:10px"><input id="asi-cost" class="winp" type="number" placeholder="COST E$" min="1" style="flex:1">'+
      '<select id="asi-cat" style="flex:0 0 90px;background:var(--bg);border:1px solid var(--brd);color:var(--tx);padding:10px 8px;font-size:14px;font-family:inherit;font-weight:700;outline:none;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)">'+
      '<option value="fun">FUN</option><option value="gear">GEAR</option><option value="body">BODY</option><option value="out">OUT</option><option value="travel">TRAVEL</option></select></div>'+
      '<button class="wsave" style="width:100%" onclick="saveShopItem()">SAVE TO MARKET</button></div>';
  }
  h+='</div>';
  document.getElementById('sl').innerHTML=h;
}

function cancelPurchase(id){const it=S.shop.find(s=>s.id===id);if(!it)return;it.bought=false;S.player.ip+=it.cost;save();rShop();rHdr();toast('PURCHASE CANCELED','err');}

function buyIt(id){
  const it=S.shop.find(s=>s.id===id);
  if(!it||S.player.ip<it.cost)return;
  const modalContent='<div style="font-size:22px;font-weight:800;color:#f0f0f0;text-align:center;margin-bottom:6px;line-height:1.1;">'+it.desc+'</div><div style="font-size:12px;font-weight:700;color:var(--mu);text-align:center;margin-bottom:15px;letter-spacing:1px;">// '+it.t+'</div><div style="font-size:38px;font-weight:900;color:var(--y);text-align:center;margin:10px 0;text-shadow:0 0 15px rgba(252,238,10,0.4);">'+it.cost+' E$</div>';
  showConfirm('PURCHASE CONFIRMATION',modalContent,()=>{
    S.player.ip-=it.cost;
    if(id==='sm'){
      if(!S.mysteryPending)S.mysteryPending=[];
      const lo=[{type:'hack',desc:'HACK +150 E$',ip:150,xp:0},{type:'eclat',desc:'ECLAT +200 REP',ip:0,xp:200},{type:'pass',desc:'VIP ENTERTAINMENT PASS',ip:0,xp:0},{type:'error',desc:'ERROR -50 E$',ip:-50,xp:0}];
      const l=lo[Math.floor(Math.random()*lo.length)];
      S.mysteryPending.push({uid:'m_'+Date.now()+'_'+Math.random().toString(36).slice(2),type:l.type,desc:l.desc,ip:l.ip,xp:l.xp});
      toast('MYSTERY STASH OBTAINED — tap USE to reveal','gold');
    }else{
      it.bought=true;showCongrats(it.desc);
    }
    save();rShop();rHdr();
  },'BUY');
}

function useItem(id){
  const el=document.querySelector('[data-sid="'+id+'"]'),it=S.shop.find(s=>s.id===id);if(!el||it===undefined)return;
  el.classList.add('using');
  setTimeout(()=>{it.bought=false;save();rShop();},3120);
  showUsedOverlay(it.desc);
}

function useMystery(uid){
  const el=document.querySelector('[data-mid="'+uid+'"]'),idx=(S.mysteryPending||[]).findIndex(r=>r.uid===uid);
  if(idx===-1)return;
  const r=S.mysteryPending[idx];
  if(el)el.classList.add('using');
  if(r.ip>0)S.player.ip+=r.ip;
  if(r.ip<0)S.player.ip=Math.max(0,S.player.ip+r.ip);
  if(r.xp)addXP(r.xp);
  S.mysteryPending.splice(idx,1);
  save();rShop();rHdr();
  if(r.type==='error'){showBadLuckOverlay();}else{showUsedOverlay(r.desc);}
}

function buildSegs(done,total){
  let s='';for(let i=0;i<total;i++)s+='<div class="seg '+(i<done?'done-seg':'empty-seg')+'"></div>';
  return '<div class="scamp-segs">'+s+'</div>';
}

function rStats(){
  const p=S.player,need=p.level*100,pct=Math.min(100,Math.round(p.xp/need*100));
  const cats=[
    {key:'portfolio',name:'PORTFOLIO',cls:'cat-portfolio',items:S.portfolio},
    {key:'memoire',name:'THESIS',cls:'cat-memoire',items:S.memoire},
    {key:'guitare',name:'SILVERHAND',cls:'cat-guitar',items:S.guitare},
    {key:'poids',name:'BIOMETRICS',cls:'cat-bio',items:S.poids},
  ];
  let h='<div class="st-hero"><div class="st-hero-left"><div class="st-hero-label">STREET CRED</div><div class="st-hero-lv">'+p.level+'</div></div><div class="st-hero-right"><div class="st-hero-class">CORPO CLASS</div><div class="st-hero-xp">'+p.xp+' / '+need+' REP</div><div class="st-hero-xpbar"><div class="st-hero-xpfill" style="width:'+pct+'%"></div></div></div></div>';
  h+='<div class="st-kpi-row"><div class="st-kpi"><div class="st-kpi-val">'+p.ip+'</div><div class="st-kpi-lbl">FUNDS E$</div></div><div class="st-kpi gold"><div class="st-kpi-val">'+(p.streak||0)+'</div><div class="st-kpi-lbl">DAY STREAK</div></div><div class="st-kpi"><div class="st-kpi-val">'+(S.totalDone||0)+'</div><div class="st-kpi-lbl">CONTRACTS</div></div></div>';
  h+='<div class="st-camp-label">CAMPAIGN STATUS</div>';
  h+=cats.map(c=>{
    const done=c.items.filter(e=>e.done),d=done.length,t=c.items.length;
    const pct=t>0?Math.round((d/t)*100):0;
    const catXp=done.reduce((s,e)=>s+(e.xp||0),0),catIp=done.reduce((s,e)=>s+(e.ip||0),0);
    return '<div class="scamp '+c.cls+'"><div class="scamp-top"><div class="scamp-name">'+c.name+'</div><div class="scamp-pct">'+pct+'%</div></div>'+buildSegs(d,t)+'<div class="scamp-bot"><div class="scamp-stat"><div class="scamp-stat-lbl">PROGRESS</div><div class="scamp-stat-val">'+d+'/'+t+'</div></div><div class="scamp-stat"><div class="scamp-stat-lbl">REP</div><div class="scamp-stat-val rep">+'+catXp+'</div></div><div class="scamp-stat"><div class="scamp-stat-lbl">FUNDS</div><div class="scamp-stat-val funds">+'+catIp+'</div></div></div></div>';
  }).join('');
  h+='<div style="margin-top:20px;padding-bottom:4px"><button onclick="resetAll()" style="width:100%;background:var(--rd);border:none;color:#fff;padding:14px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)">SYSTEM PURGE — RESET ALL DATA</button></div>';
  document.getElementById('st-all').innerHTML=h;
}

function resetAll(){
  const dangerContent='<div class="danger-icon"><svg width="64" height="58" viewBox="0 0 64 58"><polygon points="32,2 62,56 2,56" fill="none" stroke="#ff003c" stroke-width="3.5" stroke-linejoin="round"/><text x="32" y="47" font-size="28" font-weight="900" fill="#ff003c" text-anchor="middle" font-family="Rajdhani,sans-serif">!</text></svg></div><p style="margin:0;line-height:1.55">This will permanently erase: Level · XP · E$ · Streak · All missions · All campaigns · Weight log · Shop items. This cannot be undone.</p>';
  showConfirm('WARNING',dangerContent,()=>{
    const customItems=S.shop.filter(s=>s.custom);
    S=JSON.parse(JSON.stringify(DS));
    S.lastDate=today();S.lastWeekId=weekId();
    customItems.forEach(it=>S.shop.push(it));
    save();prevIp=0;prevXp=0;
    rHdr();go('st');toast('ALL DATA PURGED','err');
  },'CONFIRM PURGE',true);
}

function go(tab){
  checkReset();
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('content').scrollTop=0;
  if(tab==='d')rDailies();else if(tab==='h')rHebdo();else if(tab==='c')rCamps();else if(tab==='s')rShop();else if(tab==='st')rStats();
}

load();prevIp=S.player.ip;prevXp=S.player.xp;
checkReset();rHdr();rDailies();

function pullFromCloud(){
  document.getElementById('sytx').textContent='PULLING...';
  document.getElementById('syu').className='sync synching';
  fetch(SURL)
    .then(r=>r.json())
    .then(cloudData=>{
      if(cloudData&&cloudData.player){
        S=cloudData;
        localStorage.setItem(KEY,JSON.stringify(S));
        prevIp=S.player.ip;
        prevXp=S.player.xp;
        checkReset();
        rHdr();
        const activeTab=document.querySelector('.nb.on');
        if(activeTab){const activeTabId=activeTab.id.replace('nb-','');go(activeTabId);}
        setSy('synched');
      }else{setSy('synched');}
    })
    .catch(err=>{console.error("Cloud pull failed",err);setSy('offline');});
}

// données chargées pendant auth
document.getElementById('syu').addEventListener('click',pullFromCloud);
</script>
